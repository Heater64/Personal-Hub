<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 Snake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-mid: #14141f;
            --panel: rgba(255,255,255,0.04);
            --panel-border: rgba(255,255,255,0.08);
            --ink: #ece9e4;
            --ash: #8b889a;
            --coral: #c65a3a;
            --coral-dark: #9a4530;
            --gold: #ffd166;
            --green: #5fd08a;
            --red: #ff5d5d;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, var(--bg-mid), var(--bg-deep));
            color: var(--ink);
            font-family: var(--font-body);
        }

        .game-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            text-align: center;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .game-header h1 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .game-header .subtitle {
            color: var(--ash);
            font-size: 0.7rem;
            margin: 0;
            width: 100%;
            text-align: center;
        }

        .toolbar {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            color: var(--ink);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:hover { border-color: var(--coral); color: var(--coral); }

        .score-display {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0 14px;
            flex-wrap: wrap;
        }

        .score-item {
            background: var(--panel);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            min-width: 52px;
        }

        .score-item .label {
            font-size: 0.45rem;
            color: var(--ash);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .score-item .value {
            font-size: 1.05rem;
            font-weight: 700;
            font-family: var(--font-display);
        }
        .score-item .value.gold { color: var(--gold); }
        .score-item .value.green { color: var(--green); }
        .score-item .value.white { color: var(--ink); }
        .score-item .value.red { color: var(--red); }

        .canvas-wrap {
            position: relative;
            max-width: 480px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1/1;
            background: #0a0a12;
            border-radius: 18px;
            border: 1px solid var(--panel-border);
            touch-action: none;
            display: block;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }

        .controls-hint {
            color: var(--ash);
            font-size: 0.65rem;
            margin: 10px 0;
            opacity: 0.5;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn-ghost {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            padding: 10px 22px;
            border-radius: 40px;
            color: var(--ink);
            cursor: pointer;
            font-size: 0.75rem;
            font-family: var(--font-body);
            transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: var(--coral); color: var(--coral); }

        .btn-primary {
            background: var(--coral);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 24px;
            border: 1px solid var(--panel-border);
            border-radius: 40px;
            color: var(--ash);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--coral); color: var(--coral); transform: translateX(-3px); }

        .game-message {
            position: fixed; inset: 0; background: rgba(6,6,8,0.92);
            backdrop-filter: blur(16px); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px;
        }
        .game-message.show { display: flex; }

        .game-message-content {
            background: linear-gradient(180deg, rgba(26,26,30,0.98), rgba(14,14,18,0.98));
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 32px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: modalPop 0.35s cubic-bezier(0.34,1.4,0.64,1);
        }

        .game-message-content .icon { font-size: 2.8rem; margin-bottom: 10px; }
        .game-message-content h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            margin: 0 0 6px;
            color: var(--ink);
        }
        .game-message-content p {
            color: var(--ash);
            margin: 0 0 18px;
            line-height: 1.5;
            font-size: 0.85rem;
        }
        .game-message-content .btn-primary {
            background: var(--coral);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: all 0.2s;
        }
        .game-message-content .btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -20px);
            background: rgba(20,20,26,0.95);
            border: 1px solid var(--panel-border);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: var(--ink);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 150;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }

        .combo-display {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255,209,102,0.4);
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            font-family: var(--font-display);
            white-space: nowrap;
        }
        .combo-display.show {
            opacity: 1;
            transform: translate(-50%, -60%) scale(1.08);
        }

        @media (max-width: 480px) {
            .game-message-content { padding: 24px 18px; }
            .score-item { padding: 4px 8px; min-width: 44px; }
            .score-item .value { font-size: 0.9rem; }
            .game-header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🐍 Snake</h1>
            <div class="toolbar">
                <button class="icon-btn" id="pauseBtn" title="Pausa">⏸️</button>
            </div>
            <span class="subtitle">Come la comida · No choques</span>
        </div>

        <div class="score-display">
            <div class="score-item"><div class="label">Puntuación</div><div class="value gold" id="scoreDisplay">0</div></div>
            <div class="score-item"><div class="label">Récord</div><div class="value green" id="highScoreDisplay">0</div></div>
            <div class="score-item"><div class="label">Longitud</div><div class="value white" id="lengthDisplay">3</div></div>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
        </div>

        <div class="controls-hint">⬆ ⬇ ⬅ ➡ · WASD · Toca y arrastra</div>

        <div class="actions">
            <button class="btn-primary" id="startBtn">▶ Jugar</button>
            <button class="btn-ghost" id="resetBtn">🔄 Reiniciar</button>
        </div>

        <a href="/pages/calendario.html" class="back-btn">← Volver al calendario</a>
    </div>

    <div class="toast" id="toast"></div>
    <div class="combo-display" id="comboDisplay"></div>

    <div class="game-message" id="gameMessage">
        <div class="game-message-content">
            <div class="icon" id="msgIcon">💀</div>
            <h2 id="msgTitle">¡Game Over!</h2>
            <p id="msgText">Has perdido. Puntuación: 0</p>
            <button class="btn-primary" id="msgBtn">Reintentar</button>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            // ==============================================================
            // SNAKE - VERSIÓN CON MOVIMIENTO FLUIDO Y VELOCIDAD AJUSTADA
            // ==============================================================

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width,
                H = canvas.height;
            const GRID = 20;
            const COLS = W / GRID,
                ROWS = H / GRID;

            // --- Estado del juego ---
            let snake = [];
            let direction = 'right';
            let nextDirection = 'right';
            let food = null;
            let specialFood = null;
            let score = 0;
            let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
            let isPlaying = false;
            let paused = false;
            let speed = 180; // ms por movimiento - INICIO MÁS LENTO
            let particles = [];
            let comboCount = 0;
            let comboTimeout = null;
            let lastUpdateTime = 0;

            // --- Movimiento fluido ---
            let prevPositions = [];
            let lerpFactor = 0;

            // --- Referencias DOM ---
            const scoreDisplay = document.getElementById('scoreDisplay');
            const highScoreDisplay = document.getElementById('highScoreDisplay');
            const lengthDisplay = document.getElementById('lengthDisplay');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            const pauseBtn = document.getElementById('pauseBtn');

            highScoreDisplay.textContent = highScore;

            // --- Inicializar ---
            function initGame() {
                const startX = 12,
                    startY = 12;
                snake = [
                    { x: startX, y: startY },
                    { x: startX - 1, y: startY },
                    { x: startX - 2, y: startY }
                ];
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                speed = 180; // VELOCIDAD INICIAL MÁS LENTA
                comboCount = 0;
                particles = [];
                specialFood = null;
                prevPositions = [];
                lerpFactor = 0;
                document.getElementById('comboDisplay').classList.remove('show');
                spawnFood();
                isPlaying = false;
                paused = false;
                pauseBtn.textContent = '⏸️';
                startBtn.textContent = '▶ Jugar';
                startBtn.style.opacity = '1';
                updateUI();
            }

            // --- Spawn comida ---
            function spawnFood() {
                let pos;
                let attempts = 0;
                do {
                    pos = {
                        x: Math.floor(Math.random() * COLS),
                        y: Math.floor(Math.random() * ROWS)
                    };
                    attempts++;
                } while (
                    (snake.some(s => s.x === pos.x && s.y === pos.y) ||
                        (specialFood && pos.x === specialFood.x && pos.y === specialFood.y)) &&
                    attempts < 200
                );
                food = pos;

                if (score > 0 && score % 5 === 0 && Math.random() < 0.3 && !specialFood) {
                    let spPos;
                    let spAttempts = 0;
                    do {
                        spPos = {
                            x: Math.floor(Math.random() * COLS),
                            y: Math.floor(Math.random() * ROWS)
                        };
                        spAttempts++;
                    } while (
                        (snake.some(s => s.x === spPos.x && s.y === spPos.y) ||
                            (spPos.x === food.x && spPos.y === food.y)) &&
                        spAttempts < 100
                    );
                    if (spAttempts < 100) {
                        specialFood = spPos;
                        showToast('🌟 ¡Comida especial! +3 puntos');
                    }
                }
            }

            // --- Actualizar UI ---
            function updateUI() {
                scoreDisplay.textContent = score;
                highScoreDisplay.textContent = highScore;
                lengthDisplay.textContent = snake.length;
            }

            function showToast(text) {
                const el = document.getElementById('toast');
                el.textContent = text;
                el.classList.add('show');
                clearTimeout(window._toastTimeout);
                window._toastTimeout = setTimeout(() => el.classList.remove('show'), 1400);
            }

            function showCombo(count) {
                if (count < 2) return;
                const el = document.getElementById('comboDisplay');
                el.textContent = `🔥 ${count}x COMBO`;
                el.classList.add('show');
                clearTimeout(comboTimeout);
                comboTimeout = setTimeout(() => el.classList.remove('show'), 700);
            }

            // --- Partículas ---
            function spawnParticles(x, y, color, count = 10) {
                const cx = x * GRID + GRID / 2;
                const cy = y * GRID + GRID / 2;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.5 + Math.random() * 2.5;
                    particles.push({
                        x: cx,
                        y: cy,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        decay: 0.015 + Math.random() * 0.025,
                        size: 2 + Math.random() * 4,
                        color
                    });
                }
            }

            // --- Dibujar con interpolación fluida ---
            function draw(alpha) {
                ctx.clearRect(0, 0, W, H);

                ctx.fillStyle = '#0a0a12';
                ctx.fillRect(0, 0, W, H);

                ctx.strokeStyle = 'rgba(255,255,255,0.02)';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= COLS; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * GRID, 0);
                    ctx.lineTo(i * GRID, H);
                    ctx.stroke();
                }
                for (let i = 0; i <= ROWS; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * GRID);
                    ctx.lineTo(W, i * GRID);
                    ctx.stroke();
                }

                // Partículas
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                // Comida especial
                if (specialFood) {
                    const pulse = 1 + Math.sin(Date.now() / 300) * 0.08;
                    const cx = specialFood.x * GRID + GRID / 2;
                    const cy = specialFood.y * GRID + GRID / 2;
                    const r = GRID / 2 - 2;
                    ctx.shadowColor = 'rgba(255, 209, 102, 0.5)';
                    ctx.shadowBlur = 20;

                    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.5);
                    grad.addColorStop(0, 'rgba(255, 215, 0, 0.15)');
                    grad.addColorStop(1, 'rgba(255, 215, 0, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r * 1.5 * pulse, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(cx, cy, r * pulse, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    ctx.fillStyle = '#fff8e0';
                    ctx.font = `${GRID * 0.5}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⭐', cx, cy + 1);
                }

                // Comida normal
                if (food) {
                    const cx = food.x * GRID + GRID / 2;
                    const cy = food.y * GRID + GRID / 2;
                    const r = GRID / 2 - 3;
                    ctx.shadowColor = 'rgba(255, 77, 77, 0.4)';
                    ctx.shadowBlur = 15;

                    const grad = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, 0, cx, cy, r);
                    grad.addColorStop(0, '#ff6b6b');
                    grad.addColorStop(1, '#cc2233');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.beginPath();
                    ctx.arc(cx - r * 0.25, cy - r * 0.25, r * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Serpiente con interpolación
                const segmentCount = snake.length;
                const positions = [];
                for (let i = 0; i < segmentCount; i++) {
                    const seg = snake[i];
                    const prev = prevPositions[i] || seg;
                    const x = prev.x + (seg.x - prev.x) * alpha;
                    const y = prev.y + (seg.y - prev.y) * alpha;
                    positions.push({ x, y });
                }

                for (let i = 0; i < positions.length; i++) {
                    const isHead = i === 0;
                    const progress = i / positions.length;
                    const pos = positions[i];

                    let color;
                    if (isHead) {
                        color = '#c65a3a';
                    } else {
                        const hue = 20 + (1 - progress) * 30;
                        const sat = 60 + (1 - progress) * 20;
                        const lig = 40 + (1 - progress) * 30;
                        color = `hsl(${hue}, ${sat}%, ${lig}%)`;
                    }

                    const x = pos.x * GRID + 1;
                    const y = pos.y * GRID + 1;
                    const size = GRID - 2;

                    if (isHead) {
                        ctx.shadowColor = 'rgba(198,90,58,0.3)';
                        ctx.shadowBlur = 15;
                    } else {
                        ctx.shadowColor = 'rgba(255,179,71,0.08)';
                        ctx.shadowBlur = 6;
                    }

                    const radius = isHead ? 6 : 4;
                    ctx.beginPath();
                    ctx.moveTo(x + radius, y);
                    ctx.lineTo(x + size - radius, y);
                    ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
                    ctx.lineTo(x + size, y + size - radius);
                    ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
                    ctx.lineTo(x + radius, y + size);
                    ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
                    ctx.lineTo(x, y + radius);
                    ctx.quadraticCurveTo(x, y, x + radius, y);
                    ctx.closePath();

                    ctx.fillStyle = color;
                    ctx.fill();

                    if (isHead) {
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = 'rgba(255,255,255,0.15)';
                        ctx.beginPath();
                        ctx.arc(x + size * 0.3, y + size * 0.3, size * 0.15, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = 'white';
                        let eyeOffsets = [];
                        switch (direction) {
                            case 'right':
                                eyeOffsets = [{ dx: size * 0.7, dy: size * 0.2 }, { dx: size * 0.7, dy: size * 0.6 }];
                                break;
                            case 'left':
                                eyeOffsets = [{ dx: size * 0.15, dy: size * 0.2 }, { dx: size * 0.15, dy: size * 0.6 }];
                                break;
                            case 'up':
                                eyeOffsets = [{ dx: size * 0.2, dy: size * 0.15 }, { dx: size * 0.6, dy: size * 0.15 }];
                                break;
                            case 'down':
                                eyeOffsets = [{ dx: size * 0.2, dy: size * 0.7 }, { dx: size * 0.6, dy: size * 0.7 }];
                                break;
                            default:
                                eyeOffsets = [{ dx: size * 0.7, dy: size * 0.2 }, { dx: size * 0.7, dy: size * 0.6 }];
                        }
                        for (const off of eyeOffsets) {
                            ctx.beginPath();
                            ctx.arc(x + off.dx, y + off.dy, size * 0.12, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.fillStyle = '#1a1a2a';
                            ctx.beginPath();
                            ctx.arc(x + off.dx + (direction === 'right' ? 2 : direction === 'left' ? -2 : 0),
                                y + off.dy + (direction === 'down' ? 2 : direction === 'up' ? -2 : 0),
                                size * 0.06, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.fillStyle = 'white';
                        }
                    }
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = 'rgba(255,255,255,0.04)';
                ctx.font = '10px Inter, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText(`Longitud: ${snake.length}`, 8, H - 6);

                if (paused && isPlaying) {
                    ctx.fillStyle = 'rgba(0,0,0,0.55)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ece9e4';
                    ctx.font = '600 20px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸️ Pausa', W / 2, H / 2);
                }

                if (!isPlaying && !paused) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.font = '600 16px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('▶ Presiona "Jugar"', W / 2, H / 2);
                }
            }

            // --- ANIMACIÓN FLUIDA ---
            let animFrameId = null;
            let lastFrameTime = 0;

            function animate(timestamp) {
                if (!lastFrameTime) lastFrameTime = timestamp;
                const delta = timestamp - lastFrameTime;
                lastFrameTime = timestamp;

                if (isPlaying && !paused) {
                    const step = delta / speed;
                    lerpFactor = Math.min(1, lerpFactor + step);

                    if (lerpFactor >= 1) {
                        lerpFactor = 0;
                        prevPositions = snake.map(s => ({ ...s }));
                        updateGame();
                        updateUI();
                    }
                }

                const alpha = isPlaying && !paused ? Math.min(1, lerpFactor) : 1;
                draw(alpha);

                animFrameId = requestAnimationFrame(animate);
            }

            // --- ACTUALIZAR LÓGICA ---
            function updateGame() {
                if (!isPlaying || paused) return;

                direction = nextDirection;

                const head = { ...snake[0] };
                switch (direction) {
                    case 'right':
                        head.x++;
                        break;
                    case 'left':
                        head.x--;
                        break;
                    case 'up':
                        head.y--;
                        break;
                    case 'down':
                        head.y++;
                        break;
                }

                if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                    gameOver();
                    return;
                }

                if (snake.some(s => s.x === head.x && s.y === head.y)) {
                    gameOver();
                    return;
                }

                snake.unshift(head);

                let ate = false;
                if (food && head.x === food.x && head.y === food.y) {
                    ate = true;
                    score++;
                    comboCount++;
                    showCombo(comboCount);
                    spawnParticles(food.x, food.y, '#ff6b6b', 15);

                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('snakeHighScore', highScore);
                        highScoreDisplay.textContent = highScore;
                        showToast('🏆 ¡Nuevo récord!');
                    }

                    // AUMENTAR VELOCIDAD GRADUALMENTE (más suave)
                    if (score % 5 === 0 && speed > 45) {
                        speed -= 5;
                        showToast(`⚡ Velocidad: ${Math.round(1000/speed)} mov/seg`);
                    }

                    spawnFood();
                }

                if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
                    ate = true;
                    score += 3;
                    comboCount += 2;
                    showCombo(comboCount);
                    spawnParticles(specialFood.x, specialFood.y, '#ffd700', 20);
                    specialFood = null;

                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('snakeHighScore', highScore);
                        highScoreDisplay.textContent = highScore;
                        showToast('🏆 ¡Nuevo récord!');
                    }
                }

                if (!ate) {
                    snake.pop();
                }
            }

            // --- Game Over ---
            function gameOver() {
                isPlaying = false;
                document.getElementById('comboDisplay').classList.remove('show');
                startBtn.textContent = '▶ Jugar';
                startBtn.style.opacity = '1';
                prevPositions = snake.map(s => ({ ...s }));
                showMessage('💀', '¡Game Over!', `Puntuación: ${score} · Longitud: ${snake.length}`);
            }

            // --- Mostrar mensaje ---
            function showMessage(icon, title, text) {
                document.getElementById('msgIcon').textContent = icon;
                document.getElementById('msgTitle').textContent = title;
                document.getElementById('msgText').textContent = text;
                document.getElementById('msgBtn').textContent = 'Reintentar';
                document.getElementById('gameMessage').classList.add('show');
            }

            function hideMessage() {
                document.getElementById('gameMessage').classList.remove('show');
            }

            document.getElementById('msgBtn').addEventListener('click', () => {
                hideMessage();
                resetGame();
                setTimeout(startGame, 200);
            });

            // --- START ---
            function startGame() {
                if (isPlaying) return;
                if (snake.length === 0) initGame();

                isPlaying = true;
                paused = false;
                lerpFactor = 0;
                pauseBtn.textContent = '⏸️';
                startBtn.textContent = '⏳ Jugando';
                startBtn.style.opacity = '0.6';
                prevPositions = snake.map(s => ({ ...s }));
            }

            // --- RESET ---
            function resetGame() {
                isPlaying = false;
                paused = false;
                pauseBtn.textContent = '⏸️';
                particles = [];
                specialFood = null;
                lerpFactor = 0;
                initGame();
                startBtn.textContent = '▶ Jugar';
                startBtn.style.opacity = '1';
            }

            // --- Pausa ---
            function togglePause() {
                if (!isPlaying) return;
                paused = !paused;
                pauseBtn.textContent = paused ? '▶️' : '⏸️';
                if (!paused) {
                    lerpFactor = 0;
                    prevPositions = snake.map(s => ({ ...s }));
                }
            }

            // --- Eventos ---
            startBtn.addEventListener('click', startGame);
            resetBtn.addEventListener('click', resetGame);
            pauseBtn.addEventListener('click', togglePause);

            document.addEventListener('keydown', (e) => {
                const key = e.key;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 'a', 'A', 's', 'S', 'd', 'D', ' '].includes(key)) {
                    e.preventDefault();
                }

                if (key === ' ' && isPlaying) {
                    togglePause();
                    return;
                }

                if (!isPlaying || paused) return;

                if ((key === 'ArrowUp' || key === 'w' || key === 'W') && direction !== 'down') {
                    nextDirection = 'up';
                } else if ((key === 'ArrowDown' || key === 's' || key === 'S') && direction !== 'up') {
                    nextDirection = 'down';
                } else if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && direction !== 'right') {
                    nextDirection = 'left';
                } else if ((key === 'ArrowRight' || key === 'd' || key === 'D') && direction !== 'left') {
                    nextDirection = 'right';
                }
            });

            // Controles táctiles
            let touchStartX = 0,
                touchStartY = 0;
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                touchStartX = (touch.clientX - rect.left) / rect.width * W;
                touchStartY = (touch.clientY - rect.top) / rect.height * H;
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isPlaying || paused || !touchStartX) return;
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const x = (touch.clientX - rect.left) / rect.width * W;
                const y = (touch.clientY - rect.top) / rect.height * H;

                const dx = x - touchStartX;
                const dy = y - touchStartY;
                const threshold = 15;

                if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > 0 && direction !== 'left') nextDirection = 'right';
                        else if (dx < 0 && direction !== 'right') nextDirection = 'left';
                    } else {
                        if (dy > 0 && direction !== 'up') nextDirection = 'down';
                        else if (dy < 0 && direction !== 'down') nextDirection = 'up';
                    }
                    touchStartX = x;
                    touchStartY = y;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                touchStartX = 0;
                touchStartY = 0;
            }, { passive: false });

            document.addEventListener('visibilitychange', () => {
                if (document.hidden && isPlaying) {
                    paused = true;
                    pauseBtn.textContent = '▶️';
                }
            });

            // --- INICIAR ---
            initGame();
            lastFrameTime = 0;
            animFrameId = requestAnimationFrame(animate);

            window.startGame = startGame;
            window.resetGame = resetGame;
            window.togglePause = togglePause;
        })();
    </script>
</body>
</html>
