<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('personalHub.theme');if(t){if(t==='auto'){t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}document.documentElement.setAttribute('data-theme',t)}})();</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-mid: #14141f;
            --panel: rgba(255,255,255,0.04);
            --panel-border: rgba(255,255,255,0.08);
            --ink: #ece9e4;
            --ash: #8b889a;
            --coral: #c65a3a;
            --coral-dark: #9a4530;
            --gold: #ffd166;
            --green: #5fd08a;
            --red: #ff5d5d;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, var(--bg-mid), var(--bg-deep));
            color: var(--ink);
            font-family: var(--font-body);
        }

        .game-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            text-align: center;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .game-header h1 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .game-header .subtitle {
            color: var(--ash);
            font-size: 0.7rem;
            margin: 0;
            width: 100%;
            text-align: center;
        }

        .toolbar {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            color: var(--ink);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:hover { border-color: var(--coral); color: var(--coral); }

        .score-display {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0 14px;
            flex-wrap: wrap;
        }

        .score-item {
            background: var(--panel);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            min-width: 52px;
        }

        .score-item .label {
            font-size: 0.45rem;
            color: var(--ash);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .score-item .value {
            font-size: 1.05rem;
            font-weight: 700;
            font-family: var(--font-display);
        }
        .score-item .value.gold { color: var(--gold); }
        .score-item .value.green { color: var(--green); }
        .score-item .value.white { color: var(--ink); }
        .score-item .value.red { color: var(--red); }

        .canvas-wrap {
            position: relative;
            max-width: 480px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1/1;
            background: radial-gradient(ellipse at center, #1a1a1a, #0a0a0a);
            border-radius: 18px;
            border: 1px solid var(--panel-border);
            touch-action: none;
            display: block;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .controls-hint {
            color: var(--ash);
            font-size: 0.65rem;
            margin: 10px 0;
            opacity: 0.5;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn-ghost {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            padding: 10px 22px;
            border-radius: 40px;
            color: var(--ink);
            cursor: pointer;
            font-size: 0.75rem;
            font-family: var(--font-body);
            transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: var(--coral); color: var(--coral); }

        .btn-primary {
            background: var(--coral);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 24px;
            border: 1px solid var(--panel-border);
            border-radius: 40px;
            color: var(--ash);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--coral); color: var(--coral); transform: translateX(-3px); }
        .game-back-nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
        .game-back-nav .back-btn { margin-top: 0; }

        .game-message {
            position: fixed; inset: 0; background: rgba(6,6,8,0.92);
            backdrop-filter: blur(16px); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px;
        }
        .game-message.show { display: flex; }

        .game-message-content {
            background: linear-gradient(180deg, rgba(26,26,30,0.98), rgba(14,14,18,0.98));
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 32px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: modalPop 0.35s cubic-bezier(0.34,1.4,0.64,1);
        }

        .game-message-content .icon { font-size: 2.8rem; margin-bottom: 10px; }
        .game-message-content h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            margin: 0 0 6px;
            color: var(--ink);
        }
        .game-message-content p {
            color: var(--ash);
            margin: 0 0 18px;
            line-height: 1.5;
            font-size: 0.85rem;
        }
        .game-message-content .btn-primary {
            background: var(--coral);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: all 0.2s;
        }
        .game-message-content .btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -20px);
            background: rgba(20,20,26,0.95);
            border: 1px solid var(--panel-border);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: var(--ink);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 150;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }

        .combo-display {
            position: fixed;
            top: 32%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255,209,102,0.4);
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            font-family: var(--font-display);
            white-space: nowrap;
        }
        .combo-display.show {
            opacity: 1;
            transform: translate(-50%, -60%) scale(1.08);
        }

        @media (max-width: 480px) {
            .game-message-content { padding: 24px 18px; }
            .score-item { padding: 4px 8px; min-width: 44px; }
            .score-item .value { font-size: 0.9rem; }
            .game-header h1 { font-size: 1.2rem; }
        }
    </style>

<body>
    <div class="game-container">
        <div class="game-header">
            <h1>⚖️ Equilibra la Torre</h1>
            <div class="toolbar">
                <button class="icon-btn" id="pauseBtn" title="Pausa">⏸️</button>
            </div>
            <span class="subtitle">Haz clic/toca para colocar el bloque</span>
        </div>

        <div class="score-display">
            <div class="score-item"><div class="label">Pisos</div><div class="value gold" id="scoreDisplay">0</div></div>
            <div class="score-item"><div class="label">Récord</div><div class="value green" id="highScoreDisplay">0</div></div>
            <div class="score-item"><div class="label">Racha</div><div class="value white" id="streakDisplay">0</div></div>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
        </div>

        <div class="controls-hint">🖱 Click o toque para colocar · ⬅ ➡ Mueve el mouse para guiar</div>

        <div class="actions">
            <button class="btn-primary" id="resetBtn">🔄 Reiniciar</button>
        </div>

        <div class="game-back-nav">
            <a href="/pages/juegos.html" class="back-btn">← Juegos</a>
            <a href="/pages/calendario.html" class="back-btn">← Calendario</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="combo-display" id="comboDisplay"></div>

    <div class="game-message" id="gameMessage">
        <div class="game-message-content">
            <div class="icon" id="msgIcon">💥</div>
            <h2 id="msgTitle">¡Torre caída!</h2>
            <p id="msgText">Has construido 0 pisos.</p>
            <button class="btn-primary" id="msgBtn">Reintentar</button>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            // ==============================================================
            // EQUILIBRA LA TORRE - VERSIÓN COMPLETA
            // ==============================================================

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width,
                H = canvas.height;

            // --- Estado del juego ---
            let blocks = [];
            let currentBlock = null;
            let score = 0;
            let highScore = parseInt(localStorage.getItem('torreHighScore')) || 0;
            let streak = 0;
            let maxStreak = 0;
            let gameRunning = true;
            let paused = false;
            let blockSpeed = 1.8;
            let animationId = null;
            let particles = [];
            let shakeAmount = 0;
            let perfectTimer = 0;
            let colorHue = 20;

            // --- Referencias DOM ---
            const scoreDisplay = document.getElementById('scoreDisplay');
            const highScoreDisplay = document.getElementById('highScoreDisplay');
            const streakDisplay = document.getElementById('streakDisplay');
            const resetBtn = document.getElementById('resetBtn');
            const pauseBtn = document.getElementById('pauseBtn');

            highScoreDisplay.textContent = highScore;

            // --- Inicializar bloque ---
            function initBlock(y) {
                const baseWidth = Math.max(18, 68 - score * 0.8);
                const width = baseWidth * (0.92 + Math.random() * 0.08);
                const x = Math.random() * (W - width - 30) + 15;
                const direction = Math.random() > 0.5 ? 1 : -1;
                const speed = blockSpeed + score * 0.04;

                currentBlock = {
                    x: x,
                    y: y || H - 28,
                    width: Math.max(12, width),
                    height: 18,
                    direction: direction,
                    speed: speed,
                    startX: x,
                    startWidth: width,
                    perfect: false
                };
            }

            // --- Colocar bloque ---
            function placeBlock(e) {
                if (!currentBlock || !gameRunning || paused) return;

                const prevBlock = blocks[blocks.length - 1];
                let newX = currentBlock.x;
                let newWidth = currentBlock.width;

                // Verificar colisión con el bloque anterior
                if (prevBlock) {
                    const overlapLeft = Math.max(currentBlock.x, prevBlock.x);
                    const overlapRight = Math.min(currentBlock.x + currentBlock.width, prevBlock.x + prevBlock.width);
                    const overlap = overlapRight - overlapLeft;

                    if (overlap < 4) {
                        gameOver();
                        return;
                    }

                    newX = overlapLeft;
                    newWidth = overlap;

                    // Perfecto (centrado exacto)
                    const centerDiff = Math.abs((currentBlock.x + currentBlock.width / 2) - (prevBlock.x + prevBlock.width / 2));
                    if (centerDiff < 3 && newWidth > prevBlock.width * 0.7) {
                        currentBlock.perfect = true;
                        perfectTimer = 20;
                        streak++;
                        if (streak > maxStreak) maxStreak = streak;
                        showToast('✨ ¡Perfecto! +' + (streak > 2 ? streak * 2 : 2));
                        spawnParticles(currentBlock.x + currentBlock.width / 2, currentBlock.y, '#ffd700', 20);
                        // Bonus extra por perfecto
                        score += streak > 2 ? streak : 1;
                    } else {
                        streak = 0;
                    }

                    // Reducir tamaño (pérdida por desalineación)
                    const shrink = 1 - (0.08 / (score + 2)) * 0.5;
                    newWidth = Math.max(8, newWidth * shrink);
                    newX += (overlap - newWidth) / 2;
                } else {
                    // Primer bloque siempre perfecto
                    currentBlock.perfect = true;
                    score = 1;
                    streak = 1;
                    spawnParticles(currentBlock.x + currentBlock.width / 2, currentBlock.y, '#ffd700', 15);
                }

                // Color basado en altura
                const hue = 20 + (score % 15) * 8;
                const sat = 60 + (score % 20) * 1.5;
                const lig = 35 + (score % 12) * 3;

                blocks.push({
                    x: newX,
                    y: currentBlock.y,
                    width: newWidth,
                    height: currentBlock.height,
                    color: `hsl(${hue}, ${Math.min(80, sat)}%, ${Math.min(65, lig)}%)`,
                    perfect: currentBlock.perfect || false
                });

                score++;
                streakDisplay.textContent = streak;
                scoreDisplay.textContent = score;

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('torreHighScore', highScore);
                    highScoreDisplay.textContent = highScore;
                    if (score % 5 === 0) {
                        showToast('🏆 ¡Nuevo récord! ' + highScore);
                    }
                }

                if (score % 3 === 0 && blockSpeed < 3.5) {
                    blockSpeed += 0.15;
                    showToast(`⚡ Velocidad: ${blockSpeed.toFixed(1)}`);
                }

                // Efecto de partículas al colocar
                spawnParticles(currentBlock.x + currentBlock.width / 2, currentBlock.y, '#ffb347', 8);

                initBlock(currentBlock.y - currentBlock.height - 1);
                draw();
            }

            // --- Partículas ---
            function spawnParticles(x, y, color, count = 10) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.5 + Math.random() * 2.5;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 0.5,
                        life: 1,
                        decay: 0.015 + Math.random() * 0.025,
                        size: 2 + Math.random() * 4,
                        color: color,
                        gravity: 0.04
                    });
                }
            }

            // --- Actualizar ---
            function update() {
                if (!gameRunning || paused) return;

                // Mover bloque actual
                if (currentBlock) {
                    currentBlock.x += currentBlock.speed * currentBlock.direction;
                    if (currentBlock.x + currentBlock.width > W - 2 || currentBlock.x < 2) {
                        currentBlock.direction *= -1;
                    }
                }

                // Actualizar partículas
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity || 0.03;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // Reducir shake
                if (shakeAmount > 0) shakeAmount *= 0.92;
                if (shakeAmount < 0.05) shakeAmount = 0;

                // Timer de "perfecto"
                if (perfectTimer > 0) perfectTimer--;

                draw();
            }

            // --- Dibujar ---
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // Fondo
                const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 50, W / 2, H / 2, W);
                bgGrad.addColorStop(0, '#1a1a22');
                bgGrad.addColorStop(1, '#0a0a0a');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Línea de base (suelo)
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
                ctx.fillRect(0, H - 2, W, 2);

                // Grid vertical sutil para ayudar a centrar
                ctx.strokeStyle = 'rgba(255,255,255,0.015)';
                ctx.lineWidth = 0.5;
                ctx.setLineDash([2, 6]);
                ctx.beginPath();
                ctx.moveTo(W / 2, 0);
                ctx.lineTo(W / 2, H);
                ctx.stroke();
                ctx.setLineDash([]);

                // --- Partículas ---
                for (const p of particles) {
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                // --- Bloques colocados ---
                for (let i = 0; i < blocks.length; i++) {
                    const b = blocks[i];
                    const isPerfect = b.perfect;
                    const alpha = 1 - (blocks.length - i - 1) * 0.003;

                    ctx.globalAlpha = Math.max(0.4, alpha);

                    // Sombra
                    ctx.shadowColor = `rgba(198,90,58,0.15)`;
                    ctx.shadowBlur = isPerfect ? 18 : 10;

                    // Bloque
                    ctx.fillStyle = b.color || '#c65a3a';
                    ctx.fillRect(b.x, b.y, b.width, b.height);

                    // Brillo superior
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.06)';
                    ctx.fillRect(b.x + 2, b.y + 1, b.width - 4, b.height * 0.25);

                    // Borde
                    ctx.strokeStyle = isPerfect ? 'rgba(255,215,0,0.2)' : 'rgba(255,255,255,0.04)';
                    ctx.lineWidth = isPerfect ? 1.5 : 0.5;
                    ctx.strokeRect(b.x, b.y, b.width, b.height);

                    // Efecto "perfecto"
                    if (isPerfect) {
                        ctx.shadowColor = 'rgba(255,215,0,0.1)';
                        ctx.shadowBlur = 15;
                        ctx.strokeStyle = 'rgba(255,215,0,0.1)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(b.x - 1, b.y - 1, b.width + 2, b.height + 2);
                        ctx.shadowBlur = 0;
                    }
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // --- Bloque actual ---
                if (currentBlock && gameRunning) {
                    const b = currentBlock;
                    const glow = 1 + Math.sin(Date.now() / 200) * 0.03;

                    // Sombra del bloque actual (proyectada hacia abajo)
                    ctx.shadowColor = 'rgba(255,179,71,0.15)';
                    ctx.shadowBlur = 20;

                    // Gradiente del bloque actual
                    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.height);
                    grad.addColorStop(0, '#ffcc80');
                    grad.addColorStop(0.3, '#ffb347');
                    grad.addColorStop(1, '#e8952a');
                    ctx.fillStyle = grad;
                    ctx.fillRect(b.x, b.y, b.width * glow, b.height);

                    ctx.shadowBlur = 0;

                    // Brillo superior
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(b.x + 2, b.y + 1, b.width * glow - 4, b.height * 0.2);

                    // Borde del bloque actual
                    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(b.x, b.y, b.width * glow, b.height);

                    // Línea de guía (sombra proyectada)
                    ctx.setLineDash([3, 5]);
                    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    const centerX = b.x + b.width / 2;
                    ctx.moveTo(centerX, b.y + b.height);
                    ctx.lineTo(centerX, b.y + b.height + 40);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // Indicador de "perfecto" (círculo superior)
                    if (blocks.length > 0) {
                        const prev = blocks[blocks.length - 1];
                        const prevCenter = prev.x + prev.width / 2;
                        const diff = Math.abs(centerX - prevCenter);
                        if (diff < 8) {
                            ctx.fillStyle = 'rgba(255,215,0,0.15)';
                            ctx.shadowColor = 'rgba(255,215,0,0.2)';
                            ctx.shadowBlur = 15;
                            ctx.beginPath();
                            ctx.arc(centerX, b.y - 6, 8, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                    }
                }

                // HUD en canvas
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
                ctx.font = '10px Inter, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText(`Pisos: ${score} · Racha: ${streak}`, 8, H - 6);

                if (paused && gameRunning) {
                    ctx.fillStyle = 'rgba(0,0,0,0.55)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ece9e4';
                    ctx.font = '600 20px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸️ Pausa', W / 2, H / 2);
                }

                if (!gameRunning && !paused) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.font = '600 16px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('💥 Torre caída', W / 2, H / 2);
                }
            }

            // --- Game Over ---
            function gameOver() {
                gameRunning = false;
                if (animationId) cancelAnimationFrame(animationId);
                shakeAmount = 8;
                spawnParticles(currentBlock.x + currentBlock.width / 2, currentBlock.y, '#ff4d4d', 25);
                showMessage('💥', '¡Torre caída!', `Has construido ${score} pisos · Racha máxima: ${maxStreak}`);
            }

            // --- Mostrar mensaje ---
            function showMessage(icon, title, text) {
                document.getElementById('msgIcon').textContent = icon;
                document.getElementById('msgTitle').textContent = title;
                document.getElementById('msgText').textContent = text;
                document.getElementById('msgBtn').textContent = 'Reintentar';
                document.getElementById('gameMessage').classList.add('show');
            }

            function hideMessage() {
                document.getElementById('gameMessage').classList.remove('show');
            }

            document.getElementById('msgBtn').addEventListener('click', () => {
                hideMessage();
                resetGame();
            });

            // --- Toast ---
            function showToast(text) {
                const el = document.getElementById('toast');
                el.textContent = text;
                el.classList.add('show');
                clearTimeout(window._toastTimeout);
                window._toastTimeout = setTimeout(() => el.classList.remove('show'), 1400);
            }

            // --- Reset ---
            function resetGame() {
                blocks = [];
                particles = [];
                score = 0;
                streak = 0;
                maxStreak = 0;
                blockSpeed = 1.8;
                gameRunning = true;
                paused = false;
                pauseBtn.textContent = '⏸️';
                shakeAmount = 0;
                perfectTimer = 0;
                scoreDisplay.textContent = '0';
                streakDisplay.textContent = '0';
                if (animationId) cancelAnimationFrame(animationId);
                initBlock(H - 28);
                draw();
                gameLoop();
            }

            // --- Pausa ---
            function togglePause() {
                if (!gameRunning) return;
                paused = !paused;
                pauseBtn.textContent = paused ? '▶️' : '⏸️';
                draw();
            }

            // --- Loop ---
            function gameLoop() {
                update();
                animationId = requestAnimationFrame(gameLoop);
            }

            // --- Eventos ---
            canvas.addEventListener('click', placeBlock);
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                placeBlock(e);
            }, { passive: false });

            // Tecla espacio para colocar
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (gameRunning && !paused) {
                        placeBlock(e);
                    }
                }
                if (e.key === 'p' || e.key === 'P') {
                    togglePause();
                }
            });

            // Mouse move para guiar el bloque (efecto visual)
            canvas.addEventListener('mousemove', (e) => {
                // No hacemos nada, pero podría usarse para controlar la dirección
            });

            resetBtn.addEventListener('click', resetGame);
            pauseBtn.addEventListener('click', togglePause);

            // Pausa automática
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && gameRunning) {
                    paused = true;
                    pauseBtn.textContent = '▶️';
                }
            });

            // --- Iniciar ---
            initBlock(H - 28);
            draw();
            gameLoop();

            window.resetGame = resetGame;
            window.togglePause = togglePause;
        })();
    </script>
