<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('personalHub.theme');if(t){if(t==='auto'){t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}document.documentElement.setAttribute('data-theme',t)}})();</script>

    <title>🕳️ Agujero Negro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-mid: #14141f;
            --panel: rgba(255,255,255,0.04);
            --panel-border: rgba(255,255,255,0.08);
            --ink: #ece9e4;
            --ash: #8b889a;
            --coral: #c65a3a;
            --coral-dark: #9a4530;
            --gold: #ffd166;
            --green: #5fd08a;
            --red: #ff5d5d;
            --purple: #6a4cff;
            --purple-glow: rgba(106, 76, 255, 0.3);
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, var(--bg-mid), var(--bg-deep));
            color: var(--ink);
            font-family: var(--font-body);
        }

        .game-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            text-align: center;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .game-header h1 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .game-header .subtitle {
            color: var(--ash);
            font-size: 0.75rem;
            margin: 0;
            width: 100%;
            text-align: center;
        }

        .score-display {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 12px 0 16px;
            flex-wrap: wrap;
        }

        .score-item {
            background: var(--panel);
            padding: 6px 14px;
            border-radius: 14px;
            border: 1px solid var(--panel-border);
            min-width: 56px;
        }

        .score-item .label {
            font-size: 0.5rem;
            color: var(--ash);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .score-item .value {
            font-size: 1.15rem;
            font-weight: 700;
            font-family: var(--font-display);
        }
        .score-item .value.gold { color: var(--gold); }
        .score-item .value.green { color: var(--green); }
        .score-item .value.purple { color: var(--purple); }
        .score-item .value.ink { color: var(--ink); }

        .canvas-wrap {
            position: relative;
            max-width: 480px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1/1;
            background: #0a0a12;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
            touch-action: none;
            display: block;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
            cursor: none;
        }

        .size-indicator {
            max-width: 320px;
            margin: 12px auto 0;
        }

        .size-bar-track {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .size-bar-fill {
            height: 100%;
            width: 10%;
            background: linear-gradient(90deg, var(--purple), #b388ff);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .size-label {
            font-size: 0.55rem;
            color: var(--ash);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 4px;
        }

        .controls-hint {
            color: var(--ash);
            font-size: 0.7rem;
            margin: 10px 0;
            opacity: 0.6;
        }

        .btn-ghost {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            padding: 10px 24px;
            border-radius: 40px;
            color: var(--ink);
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-body);
            transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: var(--coral); color: var(--coral); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
            padding: 10px 24px;
            border: 1px solid var(--panel-border);
            border-radius: 40px;
            color: var(--ash);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--coral); color: var(--coral); transform: translateX(-3px); }
        .game-back-nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
        .game-back-nav .back-btn { margin-top: 0; }

        .game-message {
            position: fixed; inset: 0; background: rgba(6,6,8,0.92);
            backdrop-filter: blur(16px); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px;
        }
        .game-message.show { display: flex; }

        .game-message-content {
            background: linear-gradient(180deg, rgba(26,26,30,0.98), rgba(14,14,18,0.98));
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 36px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: modalPop 0.35s cubic-bezier(0.34,1.4,0.64,1);
        }

        .game-message-content .icon { font-size: 3rem; margin-bottom: 12px; }
        .game-message-content h2 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            margin: 0 0 8px;
            color: var(--ink);
        }
        .game-message-content p {
            color: var(--ash);
            margin: 0 0 20px;
            line-height: 1.5;
            font-size: 0.9rem;
        }
        .game-message-content .btn-primary {
            background: var(--purple);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 0 24px var(--purple-glow);
        }
        .game-message-content .btn-primary:hover { background: #7b5fff; transform: translateY(-2px); }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -20px);
            background: rgba(20,20,26,0.95);
            border: 1px solid var(--panel-border);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: var(--ink);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 150;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }

        @media (max-width: 480px) {
            .game-message-content { padding: 28px 20px; }
            .score-item { padding: 4px 10px; min-width: 50px; }
            .score-item .value { font-size: 1rem; }
            .game-header h1 { font-size: 1.2rem; }
        }
    </style>

<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🕳️ Agujero Negro</h1>
            <span class="subtitle">Absorbe objetos y crece</span>
        </div>

        <div class="score-display">
            <div class="score-item"><div class="label">Masa</div><div class="value gold" id="scoreDisplay">0</div></div>
            <div class="score-item"><div class="label">Nivel</div><div class="value purple" id="levelDisplay">1</div></div>
            <div class="score-item"><div class="label">Récord</div><div class="value green" id="highScoreDisplay">0</div></div>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
        </div>

        <div class="size-indicator">
            <div class="size-bar-track">
                <div class="size-bar-fill" id="sizeBarFill" style="width:10%"></div>
            </div>
            <div class="size-label">Tamaño</div>
        </div>

        <div class="controls-hint">🖱️ Mueve el ratón · Toca y arrastra · WASD / Flechas</div>

        <div class="actions">
            <button class="btn-ghost" id="resetBtn">🔄 Reiniciar</button>
        </div>

        <div class="game-back-nav">
            <a href="/pages/juegos.html" class="back-btn">← Juegos</a>
            <a href="/pages/calendario.html" class="back-btn">← Calendario</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="game-message" id="gameMessage">
        <div class="game-message-content">
            <div class="icon" id="msgIcon">🕳️</div>
            <h2 id="msgTitle">¡Colapso gravitacional!</h2>
            <p id="msgText">Has absorbido 0 de masa</p>
            <button class="btn-primary" id="msgBtn">🔄 Volver a jugar</button>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;

            // --- Constants ---
            const OBJECT_TYPES = {
                star: { mass: 1, radius: 5, color: '#ffd166', glow: 'rgba(255,209,102,0.35)', label: '★' },
                planet: { mass: 3, radius: 9, color: '#4fc3f7', glow: 'rgba(79,195,247,0.35)', label: '●' },
                giant: { mass: 6, radius: 14, color: '#ff7043', glow: 'rgba(255,112,67,0.35)', label: '◆' },
                nebula: { mass: 10, radius: 18, color: '#ce93d8', glow: 'rgba(206,147,216,0.35)', label: '✦' },
            };
            const TYPE_KEYS = Object.keys(OBJECT_TYPES);

            // --- State ---
            let blackHole = { x: W / 2, y: H / 2, radius: 14, mass: 1 };
            let objects = [];
            let absorbedParticles = [];
            let pullParticles = [];
            let bgStars = [];
            let score = 0;
            let level = 1;
            let gameRunning = true;
            let gameOver = false;
            let mouseX = W / 2, mouseY = H / 2;
            let useMouseControl = false;
            let keysPressed = {};
            let spawnTimer = 0;
            let spawnInterval = 1.2;
            let maxObjects = 40;
            let flashEffect = 0;
            let highScore = parseInt(localStorage.getItem('agujeroNegroHighScore')) || 0;

            // --- Background stars ---
            function initBgStars() {
                bgStars = [];
                for (let i = 0; i < 150; i++) {
                    bgStars.push({
                        x: Math.random() * W, y: Math.random() * H,
                        r: Math.random() * 1.2 + 0.3,
                        a: Math.random() * 0.4 + 0.08,
                        speed: Math.random() * 0.12 + 0.02,
                    });
                }
            }
            initBgStars();

            // --- Spawn ---
            function spawnObject() {
                if (objects.length >= maxObjects) return;
                const typeKey = TYPE_KEYS[Math.floor(Math.random() * TYPE_KEYS.length)];
                const type = OBJECT_TYPES[typeKey];
                const r = type.radius;
                let x, y;
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { x = -r; y = Math.random() * H; }
                else if (side === 1) { x = W + r; y = Math.random() * H; }
                else if (side === 2) { x = Math.random() * W; y = -r; }
                else { x = Math.random() * W; y = H + r; }
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.3 + Math.random() * 0.5 + type.mass * 0.04;
                objects.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: r, mass: type.mass,
                    color: type.color, glow: type.glow, label: type.label,
                });
            }

            // --- Particles ---
            function createAbsorbParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 3;
                    absorbedParticles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        decay: 0.012 + Math.random() * 0.025,
                        r: 1.5 + Math.random() * 2.5,
                        color,
                    });
                }
            }

            function createPullParticles(obj) {
                const angle = Math.atan2(blackHole.y - obj.y, blackHole.x - obj.x);
                for (let i = 0; i < 2; i++) {
                    const offset = (Math.random() - 0.5) * 0.8;
                    pullParticles.push({
                        x: obj.x + (Math.random() - 0.5) * obj.radius,
                        y: obj.y + (Math.random() - 0.5) * obj.radius,
                        vx: Math.cos(angle + offset) * (0.3 + Math.random()),
                        vy: Math.sin(angle + offset) * (0.3 + Math.random()),
                        life: 1,
                        decay: 0.025 + Math.random() * 0.03,
                        r: 1 + Math.random() * 1.5,
                        color: obj.color,
                    });
                }
            }

            // --- Absorb ---
            function absorbObject(obj, i) {
                blackHole.mass += obj.mass;
                score += obj.mass;
                const newRadius = 14 + Math.sqrt(blackHole.mass * 3.5);
                blackHole.radius = Math.min(newRadius, 160);
                createAbsorbParticles(obj.x, obj.y, 10 + obj.mass * 2, obj.color);
                flashEffect = 0.12;
                objects.splice(i, 1);
                const newLevel = Math.floor(blackHole.mass / 15) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    spawnInterval = Math.max(0.35, 1.2 - level * 0.08);
                    maxObjects = Math.min(75, 40 + level * 4);
                    document.getElementById('levelDisplay').textContent = level;
                }
                updateUI();
            }

            // --- Update ---
            function update(dt) {
                if (!gameRunning || gameOver) return;

                if (useMouseControl) {
                    const dx = mouseX - blackHole.x;
                    const dy = mouseY - blackHole.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 1) {
                        const speed = 260 + 40 / Math.sqrt(blackHole.radius / 14);
                        const move = Math.min(speed * dt, dist);
                        blackHole.x += (dx / dist) * move;
                        blackHole.y += (dy / dist) * move;
                    }
                } else {
                    let dx = 0, dy = 0;
                    if (keysPressed['w'] || keysPressed['arrowup']) dy = -1;
                    if (keysPressed['s'] || keysPressed['arrowdown']) dy = 1;
                    if (keysPressed['a'] || keysPressed['arrowleft']) dx = -1;
                    if (keysPressed['d'] || keysPressed['arrowright']) dx = 1;
                    if (dx !== 0 || dy !== 0) {
                        const len = Math.sqrt(dx * dx + dy * dy);
                        const speed = 200 + 30 / Math.sqrt(blackHole.radius / 14);
                        blackHole.x += (dx / len) * speed * dt;
                        blackHole.y += (dy / len) * speed * dt;
                    }
                }

                blackHole.x = Math.max(blackHole.radius, Math.min(W - blackHole.radius, blackHole.x));
                blackHole.y = Math.max(blackHole.radius, Math.min(H - blackHole.radius, blackHole.y));

                spawnTimer += dt;
                if (spawnTimer >= spawnInterval) {
                    spawnTimer = 0;
                    spawnObject();
                }

                const gravityRadius = blackHole.radius * 4.5;

                for (let i = objects.length - 1; i >= 0; i--) {
                    const obj = objects[i];
                    const gdx = blackHole.x - obj.x;
                    const gdy = blackHole.y - obj.y;
                    const dist = Math.sqrt(gdx * gdx + gdy * gdy);

                    if (dist < gravityRadius && dist > 1) {
                        const pull = 100 * (blackHole.radius / 14) / (dist * 0.5 + 30);
                        obj.vx += (gdx / dist) * pull * dt;
                        obj.vy += (gdy / dist) * pull * dt;
                        if (Math.random() < 0.12) createPullParticles(obj);
                    }

                    const speed = Math.sqrt(obj.vx * obj.vx + obj.vy * obj.vy);
                    if (speed > 4) { obj.vx = (obj.vx / speed) * 4; obj.vy = (obj.vy / speed) * 4; }

                    obj.x += obj.vx;
                    obj.y += obj.vy;

                    if (obj.x < obj.radius) { obj.x = obj.radius; obj.vx *= -0.8; }
                    if (obj.x > W - obj.radius) { obj.x = W - obj.radius; obj.vx *= -0.8; }
                    if (obj.y < obj.radius) { obj.y = obj.radius; obj.vy *= -0.8; }
                    if (obj.y > H - obj.radius) { obj.y = H - obj.radius; obj.vy *= -0.8; }

                    const absDist = Math.sqrt((blackHole.x - obj.x) ** 2 + (blackHole.y - obj.y) ** 2);
                    if (absDist < blackHole.radius * 0.7 + obj.radius * 0.4) {
                        absorbObject(obj, i);
                    }
                }

                for (let i = absorbedParticles.length - 1; i >= 0; i--) {
                    const p = absorbedParticles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.vx *= 0.97; p.vy *= 0.97;
                    p.life -= p.decay;
                    if (p.life <= 0) absorbedParticles.splice(i, 1);
                }

                for (let i = pullParticles.length - 1; i >= 0; i--) {
                    const p = pullParticles[i];
                    const dx = blackHole.x - p.x;
                    const dy = blackHole.y - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 0) {
                        p.vx += (dx / dist) * 60 * dt;
                        p.vy += (dy / dist) * 60 * dt;
                    }
                    p.x += p.vx; p.y += p.vy;
                    p.vx *= 0.96; p.vy *= 0.96;
                    p.life -= p.decay;
                    if (p.life <= 0 || dist < blackHole.radius) pullParticles.splice(i, 1);
                }

                if (flashEffect > 0) flashEffect -= dt * 0.6;

                for (const star of bgStars) {
                    const parallax = 0.002;
                    star.x -= (blackHole.x - W / 2) * parallax * star.speed;
                    star.y -= (blackHole.y - H / 2) * parallax * star.speed;
                    if (star.x < 0) star.x += W;
                    if (star.x > W) star.x -= W;
                    if (star.y < 0) star.y += H;
                    if (star.y > H) star.y -= H;
                }
            }

            // --- Draw ---
            function draw() {
                ctx.clearRect(0, 0, W, H);

                const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.7);
                bgGrad.addColorStop(0, '#0c0c1e');
                bgGrad.addColorStop(1, '#0a0a12');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                for (const star of bgStars) {
                    ctx.globalAlpha = star.a;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                for (const obj of objects) {
                    const grad = ctx.createRadialGradient(obj.x, obj.y, 0, obj.x, obj.y, obj.radius * 3);
                    grad.addColorStop(0, obj.glow);
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(obj.x, obj.y, obj.radius * 3, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowColor = obj.glow;
                    ctx.shadowBlur = 12;
                    ctx.fillStyle = obj.color;
                    ctx.beginPath();
                    ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    ctx.fillStyle = 'rgba(255,255,255,0.35)';
                    ctx.font = `${obj.radius * 0.85}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(obj.label, obj.x + 0.5, obj.y + 0.5);
                }

                for (const p of pullParticles) {
                    ctx.globalAlpha = p.life * 0.5;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // --- Black Hole ---
                const bx = blackHole.x, by = blackHole.y, br = blackHole.radius;

                const outerGlow = ctx.createRadialGradient(bx, by, 0, bx, by, br * 5);
                outerGlow.addColorStop(0, 'rgba(106, 76, 255, 0.12)');
                outerGlow.addColorStop(0.4, 'rgba(106, 76, 255, 0.05)');
                outerGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = outerGlow;
                ctx.beginPath();
                ctx.arc(bx, by, br * 5, 0, Math.PI * 2);
                ctx.fill();

                // Accretion disk
                const time = Date.now() / 1000;
                for (let ring = 0; ring < 3; ring++) {
                    const rMin = br * (1.2 + ring * 0.3);
                    const rMax = br * (1.8 + ring * 0.4);
                    const rotation = time * (0.3 + ring * 0.15);
                    const slices = 36;
                    for (let i = 0; i < slices; i++) {
                        const a1 = (i / slices) * Math.PI * 2 + rotation;
                        const a2 = ((i + 0.6) / slices) * Math.PI * 2 + rotation;
                        const r1 = rMin + Math.sin(i * 1.7 + time * 2 + ring) * (rMax - rMin) * 0.5;
                        const r2 = rMin + Math.sin((i + 0.6) * 1.7 + time * 2 + ring) * (rMax - rMin) * 0.5;
                        const alpha = 0.06 + 0.1 * (0.5 + 0.5 * Math.sin(i * 0.8 + time * 1.5 + ring));
                        ctx.fillStyle = `rgba(160, 120, 255, ${alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(bx + Math.cos(a1) * r1, by + Math.sin(a1) * r1);
                        ctx.lineTo(bx + Math.cos(a2) * r2, by + Math.sin(a2) * r2);
                        ctx.lineTo(bx + Math.cos(a2) * rMax * 0.7, by + Math.sin(a2) * rMax * 0.7);
                        ctx.lineTo(bx + Math.cos(a1) * rMax * 0.7, by + Math.sin(a1) * rMax * 0.7);
                        ctx.closePath();
                        ctx.fill();
                    }
                }

                const shadowGrad = ctx.createRadialGradient(bx - br * 0.15, by - br * 0.15, 0, bx, by, br);
                shadowGrad.addColorStop(0, '#080810');
                shadowGrad.addColorStop(0.6, '#0c0c18');
                shadowGrad.addColorStop(1, '#161030');
                ctx.fillStyle = shadowGrad;
                ctx.beginPath();
                ctx.arc(bx, by, br, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = 'rgba(120, 90, 255, 0.25)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(bx, by, br * 0.92, 0, Math.PI * 2);
                ctx.stroke();

                for (const p of absorbedParticles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                if (flashEffect > 0) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${flashEffect * 0.25})`;
                    ctx.fillRect(0, 0, W, H);
                }
            }

            // --- UI ---
            function updateUI() {
                document.getElementById('scoreDisplay').textContent = score;
                document.getElementById('highScoreDisplay').textContent = highScore;
                const pct = Math.min(100, (blackHole.radius / 160) * 100);
                document.getElementById('sizeBarFill').style.width = pct + '%';
                if (blackHole.radius >= 160 && gameRunning && !gameOver) {
                    gameRunning = false;
                    gameOver = true;
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('agujeroNegroHighScore', String(score));
                    }
                    document.getElementById('msgIcon').textContent = '🌌';
                    document.getElementById('msgTitle').textContent = '¡Agujero negro supermasivo!';
                    document.getElementById('msgText').innerHTML =
                        `Has absorbido todo a tu alrededor<br>Masa total: <strong>${score}</strong> · Nivel <strong>${level}</strong>`;
                    document.getElementById('gameMessage').classList.add('show');
                    document.getElementById('msgBtn').textContent = '🔄 Volver a jugar';
                }
            }

            function showToast(text) {
                const el = document.getElementById('toast');
                el.textContent = text;
                el.classList.add('show');
                clearTimeout(window._toastTimeout);
                window._toastTimeout = setTimeout(() => el.classList.remove('show'), 1800);
            }

            function resetGame() {
                blackHole = { x: W / 2, y: H / 2, radius: 14, mass: 1 };
                objects = [];
                absorbedParticles = [];
                pullParticles = [];
                score = 0;
                level = 1;
                gameRunning = true;
                gameOver = false;
                spawnTimer = 0;
                spawnInterval = 1.2;
                maxObjects = 40;
                flashEffect = 0;
                document.getElementById('levelDisplay').textContent = '1';
                document.getElementById('scoreDisplay').textContent = '0';
                document.getElementById('highScoreDisplay').textContent = highScore;
                document.getElementById('sizeBarFill').style.width = '10%';
                document.getElementById('gameMessage').classList.remove('show');
                updateUI();
            }

            // --- Game loop ---
            let lastTime = 0;
            function gameLoop(timestamp) {
                const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
                lastTime = timestamp;
                update(dt);
                draw();
                requestAnimationFrame(gameLoop);
            }

            // --- Events ---
            // Mouse
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.clientX - rect.left) / rect.width * W;
                mouseY = (e.clientY - rect.top) / rect.height * H;
                useMouseControl = true;
            });

            // Touch
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                mouseX = (t.clientX - rect.left) / rect.width * W;
                mouseY = (t.clientY - rect.top) / rect.height * H;
                useMouseControl = true;
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                mouseX = (t.clientX - rect.left) / rect.width * W;
                mouseY = (t.clientY - rect.top) / rect.height * H;
                useMouseControl = true;
            }, { passive: false });

            // Keyboard
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd', ' '].includes(key) || e.key === ' ') {
                    e.preventDefault();
                }
                if (key === ' ' && gameOver) {
                    document.getElementById('msgBtn').click();
                    return;
                }
                if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) {
                    keysPressed[key] = true;
                    useMouseControl = false;
                }
            });

            document.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                delete keysPressed[key];
                if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'].includes(key)) {
                    e.preventDefault();
                }
            });

            // Buttons
            document.getElementById('resetBtn').addEventListener('click', resetGame);
            document.getElementById('msgBtn').addEventListener('click', () => {
                document.getElementById('gameMessage').classList.remove('show');
                resetGame();
            });

            // --- Start ---
            if (highScore > 0) document.getElementById('highScoreDisplay').textContent = highScore;
            resetGame();
            requestAnimationFrame(gameLoop);

            window.resetGame = resetGame;
        })();
    </script>
