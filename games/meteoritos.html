<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌌 Evita los Meteoritos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-mid: #14141f;
            --panel: rgba(255,255,255,0.04);
            --panel-border: rgba(255,255,255,0.08);
            --ink: #ece9e4;
            --ash: #8b889a;
            --coral: #c65a3a;
            --coral-dark: #9a4530;
            --gold: #ffd166;
            --green: #5fd08a;
            --red: #ff5d5d;
            --blue: #4a9eff;
            --purple: #9b59b6;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, var(--bg-mid), var(--bg-deep));
            color: var(--ink);
            font-family: var(--font-body);
        }

        .game-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            text-align: center;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .game-header h1 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .game-header .subtitle {
            color: var(--ash);
            font-size: 0.7rem;
            margin: 0;
            width: 100%;
            text-align: center;
        }

        .toolbar {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            color: var(--ink);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:hover { border-color: var(--coral); color: var(--coral); }
        .icon-btn.active { border-color: var(--gold); color: var(--gold); }

        .score-display {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0 14px;
            flex-wrap: wrap;
        }

        .score-item {
            background: var(--panel);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            min-width: 52px;
        }

        .score-item .label {
            font-size: 0.45rem;
            color: var(--ash);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .score-item .value {
            font-size: 1.05rem;
            font-weight: 700;
            font-family: var(--font-display);
        }
        .score-item .value.gold { color: var(--gold); }
        .score-item .value.green { color: var(--green); }
        .score-item .value.white { color: var(--ink); }
        .score-item .value.red { color: var(--red); }
        .score-item .value.blue { color: var(--blue); }

        .canvas-wrap {
            position: relative;
            max-width: 480px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1/1;
            background: radial-gradient(ellipse at center, #0a0a20, #000000);
            border-radius: 18px;
            border: 1px solid var(--panel-border);
            touch-action: none;
            display: block;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }

        .controls-hint {
            color: var(--ash);
            font-size: 0.65rem;
            margin: 10px 0;
            opacity: 0.5;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn-ghost {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            padding: 10px 22px;
            border-radius: 40px;
            color: var(--ink);
            cursor: pointer;
            font-size: 0.75rem;
            font-family: var(--font-body);
            transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: var(--coral); color: var(--coral); }

        .btn-primary {
            background: var(--coral);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 24px;
            border: 1px solid var(--panel-border);
            border-radius: 40px;
            color: var(--ash);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--coral); color: var(--coral); transform: translateX(-3px); }
        .game-back-nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
        .game-back-nav .back-btn { margin-top: 0; }

        .game-message {
            position: fixed; inset: 0; background: rgba(6,6,8,0.92);
            backdrop-filter: blur(16px); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px;
        }
        .game-message.show { display: flex; }

        .game-message-content {
            background: linear-gradient(180deg, rgba(26,26,30,0.98), rgba(14,14,18,0.98));
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 32px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: modalPop 0.35s cubic-bezier(0.34,1.4,0.64,1);
        }

        .game-message-content .icon { font-size: 2.8rem; margin-bottom: 10px; }
        .game-message-content h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            margin: 0 0 6px;
            color: var(--ink);
        }
        .game-message-content p {
            color: var(--ash);
            margin: 0 0 18px;
            line-height: 1.5;
            font-size: 0.85rem;
        }
        .game-message-content .btn-primary {
            background: var(--coral);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: all 0.2s;
        }
        .game-message-content .btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -20px);
            background: rgba(20,20,26,0.95);
            border: 1px solid var(--panel-border);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: var(--ink);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 150;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }

        @media (max-width: 480px) {
            .game-message-content { padding: 24px 18px; }
            .score-item { padding: 4px 8px; min-width: 44px; }
            .score-item .value { font-size: 0.9rem; }
            .game-header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🌌 Evita los Meteoritos</h1>
            <div class="toolbar">
                <button class="icon-btn" id="pauseBtn" title="Pausa">⏸️</button>
            </div>
            <span class="subtitle">Esquiva los meteoritos · Sobrevive</span>
        </div>

        <div class="score-display">
            <div class="score-item"><div class="label">Puntuación</div><div class="value gold" id="scoreDisplay">0</div></div>
            <div class="score-item"><div class="label">Récord</div><div class="value green" id="highScoreDisplay">0</div></div>
            <div class="score-item"><div class="label">Vidas</div><div class="value red" id="livesDisplay">❤️❤️❤️</div></div>
            <div class="score-item"><div class="label">Nivel</div><div class="value blue" id="levelDisplay">1</div></div>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
        </div>

        <div class="controls-hint">⬆ ⬇ ⬅ ➡ · WASD · Toca y arrastra</div>

        <div class="actions">
            <button class="btn-primary" id="startBtn">▶ Jugar</button>
            <button class="btn-ghost" id="resetBtn">🔄 Reiniciar</button>
        </div>

        <div class="game-back-nav">
            <a href="/pages/juegos.html" class="back-btn">← Juegos</a>
            <a href="/pages/calendario.html" class="back-btn">← Calendario</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="game-message" id="gameMessage">
        <div class="game-message-content">
            <div class="icon" id="msgIcon">💥</div>
            <h2 id="msgTitle">¡Impacto!</h2>
            <p id="msgText">Has sido alcanzado. Puntuación: 0</p>
            <button class="btn-primary" id="msgBtn">Reintentar</button>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            // ==============================================================
            // EVITA LOS METEORITOS - VERSIÓN COMPLETA
            // ==============================================================

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width,
                H = canvas.height;

            // --- Estado del juego ---
            let player = { x: W / 2, y: H - 70, r: 14 };
            let meteors = [];
            let particles = [];
            let powerups = [];
            let stars = [];
            let score = 0;
            let highScore = parseInt(localStorage.getItem('meteorHighScore')) || 0;
            let lives = 3;
            let level = 1;
            let isPlaying = false;
            let paused = false;
            let animFrameId = null;
            let keys = {};
            let spawnTimer = 0;
            let levelTimer = 0;
            let invincibleTimer = 0;
            let comboCount = 0;
            let lastMeteorTime = 0;
            let screenShake = 0;
            let engineGlow = 0;

            // --- Referencias DOM ---
            const scoreDisplay = document.getElementById('scoreDisplay');
            const highScoreDisplay = document.getElementById('highScoreDisplay');
            const livesDisplay = document.getElementById('livesDisplay');
            const levelDisplay = document.getElementById('levelDisplay');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            const pauseBtn = document.getElementById('pauseBtn');

            highScoreDisplay.textContent = highScore;

            // --- Generar estrellas ---
            function generateStars() {
                stars = [];
                for (let i = 0; i < 120; i++) {
                    stars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: Math.random() * 1.5 + 0.3,
                        speed: 0.2 + Math.random() * 0.5,
                        brightness: 0.3 + Math.random() * 0.7
                    });
                }
            }

            // --- Inicializar ---
            function initGame() {
                player.x = W / 2;
                player.y = H - 70;
                meteors = [];
                particles = [];
                powerups = [];
                score = 0;
                lives = 3;
                level = 1;
                spawnTimer = 0;
                levelTimer = 0;
                invincibleTimer = 0;
                comboCount = 0;
                screenShake = 0;
                isPlaying = false;
                paused = false;
                pauseBtn.textContent = '⏸️';
                startBtn.textContent = '▶ Jugar';
                startBtn.style.opacity = '1';
                generateStars();
                updateUI();
                draw();
            }

            // --- Spawn meteorito ---
            function spawnMeteor() {
                const size = 12 + Math.random() * 20 + level * 0.5;
                const speed = 1.5 + Math.random() * 2.5 + level * 0.15;
                const x = Math.random() * (W - 40) + 20;
                const angle = (Math.random() - 0.5) * 0.8;
                const type = Math.random();

                let color;
                let hp = 1;
                let points = 1;

                if (type < 0.15 && level > 2) {
                    // Meteorito grande (más puntos)
                    color = '#ff6b35';
                    hp = 2;
                    points = 3;
                } else if (type < 0.3 && level > 3) {
                    // Meteorito rápido (más peligroso)
                    color = '#ffd700';
                    hp = 1;
                    points = 2;
                } else {
                    color = ['#c65a3a', '#ff8a65', '#e8a84a', '#d4a373'][Math.floor(Math.random() * 4)];
                }

                meteors.push({
                    x: x,
                    y: -size,
                    r: size,
                    speed: speed,
                    angle: angle,
                    color: color,
                    hp: hp,
                    maxHp: hp,
                    points: points,
                    rotation: 0,
                    rotationSpeed: (Math.random() - 0.5) * 0.05,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: 0.02 + Math.random() * 0.03
                });
            }

            // --- Spawn power-up ---
            function spawnPowerup(x, y) {
                if (Math.random() > 0.12) return;
                const types = ['shield', 'speed', 'points'];
                const type = types[Math.floor(Math.random() * types.length)];
                const colors = {
                    shield: '#4a9eff',
                    speed: '#5fd08a',
                    points: '#ffd700'
                };
                const icons = {
                    shield: '🛡️',
                    speed: '⚡',
                    points: '⭐'
                };
                powerups.push({
                    x: x,
                    y: y,
                    r: 12,
                    type: type,
                    color: colors[type],
                    icon: icons[type],
                    speed: 1.5,
                    life: 200,
                    pulse: 0
                });
            }

            // --- Partículas ---
            function spawnParticles(x, y, color, count = 15, speed = 4) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const spd = 0.5 + Math.random() * speed;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * spd,
                        vy: Math.sin(angle) * spd - 0.5,
                        life: 1,
                        decay: 0.015 + Math.random() * 0.025,
                        size: 2 + Math.random() * 4,
                        color: color,
                        gravity: 0.02
                    });
                }
            }

            // --- Actualizar UI ---
            function updateUI() {
                scoreDisplay.textContent = score;
                highScoreDisplay.textContent = highScore;
                livesDisplay.textContent = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
                levelDisplay.textContent = level;
            }

            function showToast(text) {
                const el = document.getElementById('toast');
                el.textContent = text;
                el.classList.add('show');
                clearTimeout(window._toastTimeout);
                window._toastTimeout = setTimeout(() => el.classList.remove('show'), 1400);
            }

            // --- Dibujar ---
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // Fondo espacial
                const grad = ctx.createRadialGradient(W / 2, H / 2, 50, W / 2, H / 2, W);
                grad.addColorStop(0, '#0a0a2a');
                grad.addColorStop(0.5, '#06061a');
                grad.addColorStop(1, '#000000');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                // Estrellas (con parpadeo)
                const time = Date.now() / 1000;
                for (const star of stars) {
                    const alpha = star.brightness * (0.7 + 0.3 * Math.sin(time * 0.5 + star.x));
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Screen shake
                if (screenShake > 0) {
                    const shakeX = (Math.random() - 0.5) * screenShake * 2;
                    const shakeY = (Math.random() - 0.5) * screenShake * 2;
                    ctx.save();
                    ctx.translate(shakeX, shakeY);
                    screenShake *= 0.92;
                    if (screenShake < 0.1) screenShake = 0;
                }

                // Power-ups
                for (const p of powerups) {
                    p.pulse += 0.05;
                    const glow = 1 + Math.sin(p.pulse) * 0.1;
                    const r = p.r * glow;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = p.color + '40';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, r * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = p.color + '80';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.font = `${r * 1.2}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(p.icon, p.x, p.y + 1);
                }

                // Meteoritos
                for (const m of meteors) {
                    m.rotation += m.rotationSpeed;
                    const wobbleOffset = Math.sin(m.wobble) * 2;
                    m.wobble += m.wobbleSpeed;

                    const cx = m.x + wobbleOffset;
                    const cy = m.y;

                    // Sombra
                    ctx.shadowColor = 'rgba(255,150,50,0.15)';
                    ctx.shadowBlur = 20;

                    // Cuerpo del meteorito
                    const gradM = ctx.createRadialGradient(cx - m.r * 0.2, cy - m.r * 0.2, 0, cx, cy, m.r);
                    gradM.addColorStop(0, '#ffb347');
                    gradM.addColorStop(0.4, m.color);
                    gradM.addColorStop(1, '#4a2a1a');
                    ctx.fillStyle = gradM;
                    ctx.beginPath();
                    ctx.arc(cx, cy, m.r, 0, Math.PI * 2);
                    ctx.fill();

                    // Cráteres
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.beginPath();
                    ctx.arc(cx - m.r * 0.2, cy - m.r * 0.15, m.r * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(cx + m.r * 0.25, cy + m.r * 0.2, m.r * 0.15, 0, Math.PI * 2);
                    ctx.fill();

                    // Brillo
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.beginPath();
                    ctx.arc(cx - m.r * 0.25, cy - m.r * 0.25, m.r * 0.2, 0, Math.PI * 2);
                    ctx.fill();

                    // HP bar para meteoritos grandes
                    if (m.hp > 1) {
                        const barW = m.r * 1.2;
                        const barH = 3;
                        const barY = cy - m.r - 6;
                        ctx.fillStyle = 'rgba(0,0,0,0.5)';
                        ctx.fillRect(cx - barW / 2, barY, barW, barH);
                        ctx.fillStyle = '#4caf50';
                        ctx.fillRect(cx - barW / 2, barY, barW * (m.hp / m.maxHp), barH);
                    }
                }

                // Jugador (nave)
                if (invincibleTimer > 0 && Math.floor(invincibleTimer / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                const px = player.x,
                    py = player.y,
                    pr = player.r;

                // Escudo (si está activo)
                if (invincibleTimer > 0) {
                    ctx.shadowColor = '#4a9eff';
                    ctx.shadowBlur = 30;
                    ctx.strokeStyle = 'rgba(74, 158, 255, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(px, py, pr * 1.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                // Motor
                const engineSize = pr * 0.6 + Math.random() * 4;
                ctx.shadowColor = 'rgba(255,150,50,0.4)';
                ctx.shadowBlur = 20;
                const gradE = ctx.createRadialGradient(px, py + pr * 0.8, 0, px, py + pr * 0.8, engineSize * 1.5);
                gradE.addColorStop(0, 'rgba(255,200,100,0.8)');
                gradE.addColorStop(0.5, 'rgba(255,100,50,0.4)');
                gradE.addColorStop(1, 'rgba(255,50,0,0)');
                ctx.fillStyle = gradE;
                ctx.beginPath();
                ctx.arc(px, py + pr * 0.8, engineSize * 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Cuerpo de la nave
                ctx.shadowColor = 'rgba(198,90,58,0.3)';
                ctx.shadowBlur = 15;

                const gradP = ctx.createRadialGradient(px - pr * 0.2, py - pr * 0.2, 0, px, py, pr);
                gradP.addColorStop(0, '#ff8a65');
                gradP.addColorStop(0.6, '#c65a3a');
                gradP.addColorStop(1, '#8f3e2e');
                ctx.fillStyle = gradP;
                ctx.beginPath();
                ctx.moveTo(px, py - pr);
                ctx.lineTo(px - pr * 0.8, py + pr * 0.6);
                ctx.lineTo(px - pr * 0.3, py + pr * 0.3);
                ctx.lineTo(px, py + pr * 0.5);
                ctx.lineTo(px + pr * 0.3, py + pr * 0.3);
                ctx.lineTo(px + pr * 0.8, py + pr * 0.6);
                ctx.closePath();
                ctx.fill();

                // Ventana de la nave
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(100,200,255,0.3)';
                ctx.beginPath();
                ctx.arc(px, py - pr * 0.2, pr * 0.35, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(200,240,255,0.15)';
                ctx.beginPath();
                ctx.arc(px - pr * 0.1, py - pr * 0.3, pr * 0.12, 0, Math.PI * 2);
                ctx.fill();

                // Luces de la nave
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(px - pr * 0.5, py + pr * 0.3, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(px + pr * 0.5, py + pr * 0.3, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // Partículas
                for (const p of particles) {
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // Restaurar después del screen shake
                if (screenShake > 0) {
                    ctx.restore();
                }

                // HUD en canvas
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
                ctx.font = '10px Inter, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText(`Meteoritos: ${meteors.length} · Nivel ${level}`, 8, H - 6);

                if (paused && isPlaying) {
                    ctx.fillStyle = 'rgba(0,0,0,0.55)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ece9e4';
                    ctx.font = '600 20px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸️ Pausa', W / 2, H / 2);
                }

                if (!isPlaying && !paused) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.font = '600 16px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('▶ Presiona "Jugar"', W / 2, H / 2);
                }
            }

            // --- Actualizar juego ---
            function update() {
                if (!isPlaying || paused) return;

                // Movimiento del jugador
                const speed = 4.5 + level * 0.1;
                let dx = 0,
                    dy = 0;
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -speed;
                if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = speed;
                if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -speed;
                if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = speed;

                if (dx !== 0 && dy !== 0) {
                    dx *= 0.707;
                    dy *= 0.707;
                }

                player.x = Math.max(player.r, Math.min(W - player.r, player.x + dx));
                player.y = Math.max(player.r, Math.min(H - player.r, player.y + dy));

                // Reducir invencibilidad
                if (invincibleTimer > 0) invincibleTimer--;

                // Spawn meteoritos (más frecuente con nivel)
                spawnTimer++;
                const spawnRate = Math.max(15, 50 - level * 2);
                if (spawnTimer > spawnRate && meteors.length < 30 + level * 2) {
                    spawnMeteor();
                    spawnTimer = 0;
                    // Ocasionalmente spawnear múltiples
                    if (level > 3 && Math.random() < 0.15) {
                        spawnMeteor();
                    }
                }

                // Actualizar meteoritos
                for (let i = meteors.length - 1; i >= 0; i--) {
                    const m = meteors[i];
                    m.y += m.speed;
                    m.x += Math.sin(m.y * 0.01) * m.angle;

                    // Colisión con jugador
                    if (invincibleTimer === 0) {
                        const dx2 = player.x - m.x,
                            dy2 = player.y - m.y;
                        const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                        if (dist < player.r + m.r) {
                            // Impacto
                            lives--;
                            screenShake = 8;
                            spawnParticles(m.x, m.y, '#ff4d4d', 30, 6);
                            spawnParticles(player.x, player.y, '#ff8a65', 20, 5);
                            meteors.splice(i, 1);
                            invincibleTimer = 60;
                            updateUI();

                            if (lives <= 0) {
                                gameOver();
                                return;
                            }
                            showToast('💥 ¡Impacto!');
                            continue;
                        }
                    }

                    // Fuera de pantalla
                    if (m.y - m.r > H + 20) {
                        meteors.splice(i, 1);
                        continue;
                    }

                    // Colisión con power-ups
                    for (let j = powerups.length - 1; j >= 0; j--) {
                        const p = powerups[j];
                        const dx2 = m.x - p.x,
                            dy2 = m.y - p.y;
                        if (Math.sqrt(dx2 * dx2 + dy2 * dy2) < m.r + p.r) {
                            spawnParticles(p.x, p.y, p.color, 10);
                            powerups.splice(j, 1);
                            // Los meteoritos destruyen power-ups
                        }
                    }
                }

                // Actualizar power-ups
                for (let i = powerups.length - 1; i >= 0; i--) {
                    const p = powerups[i];
                    p.y += p.speed;
                    p.life--;

                    // Colisión con jugador
                    const dx2 = player.x - p.x,
                        dy2 = player.y - p.y;
                    if (Math.sqrt(dx2 * dx2 + dy2 * dy2) < player.r + p.r) {
                        // Recoger power-up
                        spawnParticles(p.x, p.y, p.color, 20);
                        if (p.type === 'shield') {
                            invincibleTimer = 120;
                            showToast('🛡️ ¡Escudo activado!');
                        } else if (p.type === 'speed') {
                            showToast('⚡ ¡Velocidad aumentada!');
                            // Efecto temporal (ya está implementado con level)
                        } else if (p.type === 'points') {
                            score += 5;
                            showToast('⭐ +5 puntos!');
                            updateUI();
                        }
                        powerups.splice(i, 1);
                        continue;
                    }

                    if (p.life <= 0 || p.y > H + 20) {
                        powerups.splice(i, 1);
                    }
                }

                // Actualizar partículas
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity || 0.02;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // Nivel
                levelTimer++;
                if (levelTimer > 600) { // Cada 10 segundos
                    levelTimer = 0;
                    if (level < 20) {
                        level++;
                        showToast(`🌌 Nivel ${level}`);
                        updateUI();
                    }
                }

                // Puntuación pasiva (sobrevivir)
                if (score % 10 === 0 && score > 0) {
                    // Cada 10 puntos, mensaje de combo
                }

                draw();
            }

            // --- Game Over ---
            function gameOver() {
                isPlaying = false;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('meteorHighScore', highScore);
                    highScoreDisplay.textContent = highScore;
                    showToast('🏆 ¡Nuevo récord!');
                }
                startBtn.textContent = '▶ Jugar';
                startBtn.style.opacity = '1';
                showMessage('💀', '¡Game Over!', `Puntuación: ${score} · Nivel: ${level}`);
            }

            // --- Mostrar mensaje ---
            function showMessage(icon, title, text) {
                document.getElementById('msgIcon').textContent = icon;
                document.getElementById('msgTitle').textContent = title;
                document.getElementById('msgText').textContent = text;
                document.getElementById('msgBtn').textContent = 'Reintentar';
                document.getElementById('gameMessage').classList.add('show');
            }

            function hideMessage() {
                document.getElementById('gameMessage').classList.remove('show');
            }

            document.getElementById('msgBtn').addEventListener('click', () => {
                hideMessage();
                resetGame();
                setTimeout(startGame, 200);
            });

            // --- START ---
            function startGame() {
                if (isPlaying) return;
                if (meteors.length === 0 && score === 0) {
                    initGame();
                }
                isPlaying = true;
                paused = false;
                pauseBtn.textContent = '⏸️';
                startBtn.textContent = '⏳ Jugando';
                startBtn.style.opacity = '0.6';
                if (invincibleTimer === 0) invincibleTimer = 30; // Escudo inicial
                draw();
            }

            // --- RESET ---
            function resetGame() {
                isPlaying = false;
                paused = false;
                pauseBtn.textContent = '⏸️';
                initGame();
                startBtn.textContent = '▶ Jugar';
                startBtn.style.opacity = '1';
            }

            // --- Pausa ---
            function togglePause() {
                if (!isPlaying) return;
                paused = !paused;
                pauseBtn.textContent = paused ? '▶️' : '⏸️';
                draw();
            }

            // --- Loop de animación ---
            function gameLoop() {
                update();
                animFrameId = requestAnimationFrame(gameLoop);
            }

            // --- Eventos ---
            startBtn.addEventListener('click', startGame);
            resetBtn.addEventListener('click', resetGame);
            pauseBtn.addEventListener('click', togglePause);

            document.addEventListener('keydown', (e) => {
                const key = e.key;
                keys[key] = true;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
                    e.preventDefault();
                }
                if (key === ' ' && isPlaying) {
                    togglePause();
                }
                if (key === 'p' || key === 'P') {
                    togglePause();
                }
            });

            document.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            // Controles táctiles (arrastre)
            let touchX = 0,
                touchY = 0;
            let isTouching = false;

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                touchX = (touch.clientX - rect.left) / rect.width * W;
                touchY = (touch.clientY - rect.top) / rect.height * H;
                isTouching = true;
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isPlaying || paused || !isTouching) return;
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const x = (touch.clientX - rect.left) / rect.width * W;
                const y = (touch.clientY - rect.top) / rect.height * H;

                const dx = x - touchX;
                const dy = y - touchY;
                const speed = 4.5 + level * 0.1;

                if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                    if (Math.abs(dx) > Math.abs(dy)) {
                        player.x += Math.sign(dx) * speed;
                    } else {
                        player.y += Math.sign(dy) * speed;
                    }
                    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
                    player.y = Math.max(player.r, Math.min(H - player.r, player.y));
                    touchX = x;
                    touchY = y;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                isTouching = false;
            }, { passive: false });

            // Pausa automática
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && isPlaying) {
                    paused = true;
                    pauseBtn.textContent = '▶️';
                }
            });

            // --- INICIAR ---
            generateStars();
            initGame();
            gameLoop();

            window.startGame = startGame;
            window.resetGame = resetGame;
            window.togglePause = togglePause;
        })();
    </script>
</body>
</html>
