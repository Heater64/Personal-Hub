<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('personalHub.theme');if(t){if(t==='auto'){t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}document.documentElement.setAttribute('data-theme',t)}})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏹 Tiro con Arco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-mid: #14141f;
            --panel: rgba(255,255,255,0.04);
            --panel-border: rgba(255,255,255,0.08);
            --ink: #ece9e4;
            --ash: #8b889a;
            --coral: #c65a3a;
            --coral-dark: #9a4530;
            --gold: #ffd166;
            --green: #5fd08a;
            --red: #ff5d5d;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, var(--bg-mid), var(--bg-deep));
            color: var(--ink);
            font-family: var(--font-body);
        }

        .game-container {
            max-width: 640px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            text-align: center;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .game-header h1 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .game-header .subtitle {
            color: var(--ash);
            font-size: 0.7rem;
            margin: 0;
            width: 100%;
            text-align: center;
        }

        .toolbar {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            color: var(--ink);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:hover { border-color: var(--coral); color: var(--coral); }

        .score-display {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0 14px;
            flex-wrap: wrap;
        }

        .score-item {
            background: var(--panel);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            min-width: 52px;
        }

        .score-item .label {
            font-size: 0.45rem;
            color: var(--ash);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .score-item .value {
            font-size: 1.05rem;
            font-weight: 700;
            font-family: var(--font-display);
        }
        .score-item .value.gold { color: var(--gold); }
        .score-item .value.green { color: var(--green); }
        .score-item .value.white { color: var(--ink); }
        .score-item .value.red { color: var(--red); }

        .canvas-wrap {
            position: relative;
            max-width: 640px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            max-width: 640px;
            aspect-ratio: 16/9;
            background: radial-gradient(ellipse at center, #1a2a3a, #0a0a12);
            border-radius: 18px;
            border: 1px solid var(--panel-border);
            touch-action: none;
            cursor: crosshair;
            display: block;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 12px 0;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--panel);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid var(--panel-border);
        }

        .control-group label {
            font-size: 0.65rem;
            color: var(--ash);
        }

        .control-group input[type="range"] {
            width: 80px;
            accent-color: var(--coral);
            background: transparent;
            height: 3px;
        }

        .control-group span {
            font-size: 0.75rem;
            color: var(--ink);
            min-width: 28px;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn-ghost {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            padding: 10px 22px;
            border-radius: 40px;
            color: var(--ink);
            cursor: pointer;
            font-size: 0.75rem;
            font-family: var(--font-body);
            transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: var(--coral); color: var(--coral); }

        .btn-primary {
            background: var(--coral);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 24px;
            border: 1px solid var(--panel-border);
            border-radius: 40px;
            color: var(--ash);
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--coral); color: var(--coral); transform: translateX(-3px); }
        .game-back-nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
        .game-back-nav .back-btn { margin-top: 0; }

        .game-message {
            position: fixed; inset: 0; background: rgba(6,6,8,0.92);
            backdrop-filter: blur(16px); display: none; align-items: center;
            justify-content: center; z-index: 2000; padding: 20px;
        }
        .game-message.show { display: flex; }

        .game-message-content {
            background: linear-gradient(180deg, rgba(26,26,30,0.98), rgba(14,14,18,0.98));
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 32px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: modalPop 0.35s cubic-bezier(0.34,1.4,0.64,1);
        }

        .game-message-content .icon { font-size: 2.8rem; margin-bottom: 10px; }
        .game-message-content h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            margin: 0 0 6px;
            color: var(--ink);
        }
        .game-message-content p {
            color: var(--ash);
            margin: 0 0 18px;
            line-height: 1.5;
            font-size: 0.85rem;
        }
        .game-message-content .btn-primary {
            background: var(--coral);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: all 0.2s;
        }
        .game-message-content .btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -20px);
            background: rgba(20,20,26,0.95);
            border: 1px solid var(--panel-border);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: var(--ink);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 150;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }

        .wind-indicator {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 0.7rem;
            color: var(--ash);
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
            pointer-events: none;
            font-family: var(--font-body);
        }

        @media (max-width: 480px) {
            .game-message-content { padding: 24px 18px; }
            .score-item { padding: 4px 8px; min-width: 44px; }
            .score-item .value { font-size: 0.9rem; }
            .game-header h1 { font-size: 1.2rem; }
            .control-group input[type="range"] { width: 60px; }
            .wind-indicator { font-size: 0.6rem; padding: 2px 8px; }
        }
    </style>

<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🏹 Tiro con Arco</h1>
            <div class="toolbar">
                <button class="icon-btn" id="pauseBtn" title="Pausa">⏸️</button>
            </div>
            <span class="subtitle">Ajusta ángulo y potencia · El viento afecta la flecha</span>
        </div>

        <div class="score-display">
            <div class="score-item"><div class="label">Puntos</div><div class="value gold" id="scoreDisplay">0</div></div>
            <div class="score-item"><div class="label">Disparos</div><div class="value white" id="shotsDisplay">0</div></div>
            <div class="score-item"><div class="label">Nivel</div><div class="value green" id="levelDisplay">1</div></div>
            <div class="score-item"><div class="label">Ronda</div><div class="value white" id="roundDisplay">0/5</div></div>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="640" height="360"></canvas>
            <div class="wind-indicator" id="windDisplay">🌬️ 0.0</div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Ángulo</label>
                <input type="range" id="angleSlider" min="10" max="80" value="45">
                <span id="angleValue">45°</span>
            </div>
            <div class="control-group">
                <label>Potencia</label>
                <input type="range" id="powerSlider" min="20" max="100" value="60">
                <span id="powerValue">60%</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" id="shootBtn">🎯 Disparar</button>
            <button class="btn-ghost" id="resetBtn">🔄 Reiniciar</button>
        </div>

        <div class="game-back-nav">
            <a href="/pages/juegos.html" class="back-btn">← Juegos</a>
            <a href="/pages/calendario.html" class="back-btn">← Calendario</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="game-message" id="gameMessage">
        <div class="game-message-content">
            <div class="icon" id="msgIcon">🏆</div>
            <h2 id="msgTitle">¡Ronda completada!</h2>
            <p id="msgText">Has acertado 5 disparos.</p>
            <button class="btn-primary" id="msgBtn">Siguiente nivel</button>
        </div>
    </div>

    <script>
        (() => {
            'use strict';

            // ==============================================================
            // TIRO CON ARCO - VERSIÓN COMPLETA
            // ==============================================================

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width,
                H = canvas.height;

            // --- Estado del juego ---
            let score = 0;
            let shots = 0;
            let level = 1;
            let roundShots = 0;
            const SHOTS_PER_ROUND = 5;
            let gameRunning = true;
            let paused = false;
            let rafId = null;

            // --- Elementos del juego ---
            let arrow = null;
            let particles = [];
            let wind = 0;
            let target = {
                x: W - 80,
                y: 60,
                radius: 28,
                ring: 8,
                speed: 0
            };
            let targetBaseX = W - 80;
            let targetBaseY = 60;
            let targetDirection = 1;

            // --- Referencias DOM ---
            const angleSlider = document.getElementById('angleSlider');
            const powerSlider = document.getElementById('powerSlider');
            const angleValue = document.getElementById('angleValue');
            const powerValue = document.getElementById('powerValue');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const shotsDisplay = document.getElementById('shotsDisplay');
            const levelDisplay = document.getElementById('levelDisplay');
            const roundDisplay = document.getElementById('roundDisplay');
            const windDisplay = document.getElementById('windDisplay');

            // --- Configuración de nivel ---
            function getLevelConfig(lvl) {
                return {
                    targetSpeed: 0.2 + lvl * 0.1,
                    windStrength: 0.5 + lvl * 0.3,
                    targetRadius: Math.max(18, 28 - lvl * 0.5),
                    ringCount: Math.max(4, 8 - Math.floor(lvl / 3))
                };
            }

            // --- Inicializar nivel ---
            function initLevel() {
                const config = getLevelConfig(level);
                target.radius = config.targetRadius;
                target.ring = config.ringCount;
                target.speed = config.targetSpeed;
                targetBaseX = W - 60 - Math.random() * 100;
                targetBaseY = 40 + Math.random() * 80;
                target.x = targetBaseX;
                target.y = targetBaseY;
                targetDirection = Math.random() > 0.5 ? 1 : -1;

                // Viento aleatorio por nivel
                wind = (Math.random() - 0.5) * config.windStrength * 2;
                updateWindDisplay();

                roundShots = 0;
                updateUI();
            }

            // --- Actualizar UI ---
            function updateUI() {
                scoreDisplay.textContent = score;
                shotsDisplay.textContent = shots;
                levelDisplay.textContent = level;
                roundDisplay.textContent = `${roundShots}/${SHOTS_PER_ROUND}`;
            }

            function updateWindDisplay() {
                const dir = wind > 0 ? '→' : '←';
                const strength = Math.abs(wind).toFixed(1);
                windDisplay.textContent = `🌬️ ${dir} ${strength}`;
                windDisplay.style.color = Math.abs(wind) > 1.5 ? '#ff5d5d' : Math.abs(wind) > 0.8 ? '#ffd166' : '#8b889a';
            }

            // --- Disparar ---
            function shootArrow() {
                console.log('🎯 shootArrow() llamado, gameRunning:', gameRunning, 'paused:', paused, 'arrow:', arrow);
                
                if (!gameRunning) {
                    console.log('❌ Juego no está corriendo');
                    return;
                }
                if (paused) {
                    console.log('❌ Juego en pausa');
                    return;
                }
                if (arrow) {
                    console.log('❌ Ya hay una flecha en vuelo');
                    return;
                }

                const angle = parseFloat(angleSlider.value) * Math.PI / 180;
                const power = parseFloat(powerSlider.value) / 100;
                const baseX = 60,
                    baseY = H - 15;
                
                // VELOCIDAD AUMENTADA
                const speed = 6 + power * 12;

                console.log('🏹 Disparando: ángulo=' + angleSlider.value + '°, potencia=' + powerSlider.value + '%', 'velocidad:', speed);

                // Aplicar viento al ángulo de salida
                const windEffect = wind * 0.02;
                const finalAngle = -Math.PI / 2 + angle + windEffect;

                arrow = {
                    x: baseX,
                    y: baseY,
                    vx: Math.cos(finalAngle) * speed,
                    vy: Math.sin(finalAngle) * speed,
                    trail: [],
                    rotation: 0
                };

                shots++;
                roundShots++;
                updateUI();
                
                animateArrow();
            }

            // --- Animar flecha ---
            function animateArrow() {
                if (!arrow) return;

                const dt = 0.5;
                arrow.x += arrow.vx * dt;
                arrow.y += arrow.vy * dt;
                arrow.vy += 0.08; // Gravedad reducida
                arrow.rotation += 0.05;

                // Guardar trail
                arrow.trail.push({ x: arrow.x, y: arrow.y });
                if (arrow.trail.length > 15) arrow.trail.shift();

                // Verificar colisión con la diana
                const dx = arrow.x - target.x;
                const dy = arrow.y - target.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const inTarget = dist < target.radius + 6;

                // Salir de pantalla o impacto
                if (arrow.x > W + 20 || arrow.y > H + 20 || arrow.x < -20 || inTarget) {
                    if (inTarget) {
                        // Calcular puntuación
                        const rings = Math.floor((target.radius - Math.min(dist, target.radius)) / target.ring);
                        const points = Math.max(0, 10 - rings);
                        score += points;
                        spawnParticles(arrow.x, arrow.y, '#ffd166', 20);

                        let msg = '';
                        if (points >= 9) msg = '🎯 ¡Centro perfecto! +10';
                        else if (points >= 7) msg = '👏 ¡Muy cerca! +' + points;
                        else if (points >= 4) msg = '👍 Bien! +' + points;
                        else msg = '💪 Sigue así! +' + points;

                        showToast(msg);

                        targetBaseX = W - 60 - Math.random() * 100;
                        targetBaseY = 40 + Math.random() * 80;

                        const config = getLevelConfig(level);
                        wind += (Math.random() - 0.5) * 0.4;
                        wind = Math.max(-config.windStrength, Math.min(config.windStrength, wind));
                        updateWindDisplay();

                        updateUI();
                    } else {
                        spawnParticles(arrow.x, arrow.y, '#ff5d5d', 8);
                        showToast('😅 ¡Fallaste! Intenta de nuevo');
                    }

                    arrow = null;

                    if (roundShots >= SHOTS_PER_ROUND) {
                        gameRunning = false;
                        showMessage('🏆', '¡Ronda completada!',
                            `Nivel ${level} · Puntuación: ${score}\nSiguiente nivel más difícil.`);
                        draw();
                        return;
                    }

                    draw();
                    return;
                }

                draw();
                requestAnimationFrame(animateArrow);
            }

            // --- Partículas ---
            function spawnParticles(x, y, color, count = 12) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 4;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1,
                        life: 1,
                        decay: 0.015 + Math.random() * 0.025,
                        size: 2 + Math.random() * 4,
                        color
                    });
                }
            }

            // --- Dibujar ---
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // Fondo con gradiente
                const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
                bgGrad.addColorStop(0, '#0a0a1a');
                bgGrad.addColorStop(0.5, '#14142a');
                bgGrad.addColorStop(1, '#0a0a12');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Montañas de fondo
                ctx.fillStyle = 'rgba(20,30,40,0.3)';
                ctx.beginPath();
                ctx.moveTo(0, H * 0.5);
                for (let x = 0; x <= W; x += 10) {
                    const y = H * 0.5 + Math.sin(x * 0.008) * 30 + Math.sin(x * 0.015 + 1) * 20;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(W, H);
                ctx.lineTo(0, H);
                ctx.closePath();
                ctx.fill();

                // Suelo
                ctx.fillStyle = 'rgba(40,60,30,0.25)';
                ctx.fillRect(0, H - 15, W, 15);

                ctx.strokeStyle = 'rgba(80,120,60,0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, H - 15);
                ctx.lineTo(W, H - 15);
                ctx.stroke();

                // --- Diana ---
                const t = target;
                const maxRings = t.ring;
                for (let i = maxRings; i >= 0; i--) {
                    const r = t.radius + i * t.ring;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
                    const isEven = i % 2 === 0;
                    ctx.fillStyle = isEven ? '#e8e6e3' : '#c65a3a';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
                ctx.beginPath();
                ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ff4d4d';
                ctx.fill();

                // Brillo de la diana
                const glow = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, t.radius + t.ring * maxRings);
                glow.addColorStop(0, 'rgba(255,215,0,0.05)');
                glow.addColorStop(1, 'rgba(255,215,0,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius + t.ring * maxRings, 0, Math.PI * 2);
                ctx.fill();

                // --- Arco (jugador) ---
                const baseX = 60,
                    baseY = H - 15;
                const angle = parseFloat(angleSlider.value) * Math.PI / 180;
                const power = parseFloat(powerSlider.value) / 100;
                const pull = 15 + power * 25;

                ctx.strokeStyle = '#c65a3a';
                ctx.lineWidth = 3;
                ctx.shadowColor = 'rgba(198,90,58,0.2)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(baseX, baseY, 45, -Math.PI * 0.65, -Math.PI * 0.35);
                ctx.stroke();
                ctx.shadowBlur = 0;

                const endX = baseX + Math.cos(-Math.PI / 2 + angle) * pull;
                const endY = baseY + Math.sin(-Math.PI / 2 + angle) * pull;
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(baseX - 28, baseY + 8);
                ctx.lineTo(endX, endY);
                ctx.moveTo(baseX + 28, baseY + 8);
                ctx.lineTo(endX, endY);
                ctx.stroke();

                ctx.strokeStyle = '#ffb347';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(255,179,71,0.2)';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.moveTo(endX, endY);
                ctx.lineTo(endX + 18 * Math.cos(-Math.PI / 2 + angle), endY + 18 * Math.sin(-Math.PI / 2 + angle));
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffb347';
                ctx.beginPath();
                ctx.arc(endX, endY, 3, 0, Math.PI * 2);
                ctx.fill();

                // --- Flecha en vuelo ---
                if (arrow) {
                    for (let i = 0; i < arrow.trail.length; i++) {
                        const alpha = (i / arrow.trail.length) * 0.3;
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = '#ffb347';
                        ctx.beginPath();
                        ctx.arc(arrow.trail[i].x, arrow.trail[i].y, 1.5 + i * 0.2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;

                    ctx.save();
                    ctx.translate(arrow.x, arrow.y);
                    ctx.rotate(arrow.rotation);
                    ctx.shadowColor = 'rgba(255,179,71,0.3)';
                    ctx.shadowBlur = 8;

                    ctx.fillStyle = '#e8e6e3';
                    ctx.fillRect(-2, -12, 4, 20);
                    ctx.fillStyle = '#ffb347';
                    ctx.beginPath();
                    ctx.moveTo(0, -16);
                    ctx.lineTo(-5, -8);
                    ctx.lineTo(5, -8);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#c65a3a';
                    ctx.beginPath();
                    ctx.moveTo(0, 10);
                    ctx.lineTo(-6, 4);
                    ctx.lineTo(6, 4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }

                // --- Partículas ---
                for (const p of particles) {
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                // --- HUD en canvas ---
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.font = '10px Inter, sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText(`Nivel ${level} · Disparos ${shots}`, 8, H - 4);

                if (paused) {
                    ctx.fillStyle = 'rgba(0,0,0,0.55)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ece9e4';
                    ctx.font = '600 20px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸️ Pausa', W / 2, H / 2);
                }
            }

            // --- UI ---
            function showToast(text) {
                const el = document.getElementById('toast');
                el.textContent = text;
                el.classList.add('show');
                clearTimeout(window._toastTimeout);
                window._toastTimeout = setTimeout(() => el.classList.remove('show'), 1600);
            }

            function showMessage(icon, title, text) {
                document.getElementById('msgIcon').textContent = icon;
                document.getElementById('msgTitle').textContent = title;
                document.getElementById('msgText').textContent = text;
                document.getElementById('msgBtn').textContent = 'Siguiente nivel';
                document.getElementById('gameMessage').classList.add('show');
            }

            function hideMessage() {
                document.getElementById('gameMessage').classList.remove('show');
            }

            document.getElementById('msgBtn').addEventListener('click', () => {
                hideMessage();
                level++;
                gameRunning = true;
                initLevel();
                updateUI();
                draw();
            });

            // --- Bucle de animación ---
            function gameLoop() {
                if (gameRunning && !paused) {
                    const config = getLevelConfig(level);
                    targetBaseX += target.speed * targetDirection * 0.5;

                    const minX = 100,
                        maxX = W - 100;
                    if (targetBaseX < minX || targetBaseX > maxX) {
                        targetDirection *= -1;
                        targetBaseX = Math.max(minX, Math.min(maxX, targetBaseX));
                    }

                    targetBaseY += Math.sin(Date.now() / 2000) * 0.15;

                    target.x = targetBaseX;
                    target.y = targetBaseY;

                    draw();
                }
                rafId = requestAnimationFrame(gameLoop);
            }

            // --- Reset ---
            function resetGame() {
                level = 1;
                score = 0;
                shots = 0;
                gameRunning = true;
                paused = false;
                arrow = null;
                particles = [];
                document.getElementById('pauseBtn').textContent = '⏸️';
                initLevel();
                updateUI();
                draw();
            }

            // --- Pausa ---
            function togglePause() {
                if (!gameRunning) return;
                paused = !paused;
                document.getElementById('pauseBtn').textContent = paused ? '▶️' : '⏸️';
                draw();
            }

            // --- Eventos ---
            const shootBtn = document.getElementById('shootBtn');
            if (shootBtn) {
                shootBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('🔫 Disparando por botón');
                    shootArrow();
                });
            }

            document.getElementById('resetBtn').addEventListener('click', resetGame);
            document.getElementById('pauseBtn').addEventListener('click', togglePause);

            angleSlider.addEventListener('input', function() {
                angleValue.textContent = this.value + '°';
                if (!arrow) draw();
            });

            powerSlider.addEventListener('input', function() {
                powerValue.textContent = this.value + '%';
                if (!arrow) draw();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    console.log('🔫 Disparando por tecla Espacio');
                    shootArrow();
                }
                if (e.key === 'p' || e.key === 'P') {
                    togglePause();
                }
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    const val = Math.min(80, parseInt(angleSlider.value) + 2);
                    angleSlider.value = val;
                    angleValue.textContent = val + '°';
                    if (!arrow) draw();
                }
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    const val = Math.max(10, parseInt(angleSlider.value) - 2);
                    angleSlider.value = val;
                    angleValue.textContent = val + '°';
                    if (!arrow) draw();
                }
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    const val = Math.min(100, parseInt(powerSlider.value) + 2);
                    powerSlider.value = val;
                    powerValue.textContent = val + '%';
                    if (!arrow) draw();
                }
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    const val = Math.max(20, parseInt(powerSlider.value) - 2);
                    powerSlider.value = val;
                    powerValue.textContent = val + '%';
                    if (!arrow) draw();
                }
            });

            canvas.addEventListener('click', function(e) {
                console.log('🔫 Disparando por click en canvas');
                shootArrow();
            });
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                console.log('🔫 Disparando por touch en canvas');
                shootArrow();
            }, { passive: false });

            document.addEventListener('visibilitychange', () => {
                if (document.hidden && gameRunning) {
                    paused = true;
                    document.getElementById('pauseBtn').textContent = '▶️';
                }
            });

            // --- Iniciar ---
            initLevel();
            updateUI();
            draw();
            gameLoop();

            window.resetGame = resetGame;
            window.shootArrow = shootArrow;
        })();
    </script>
