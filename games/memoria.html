<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .game-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            text-align: center;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 24px 0;
        }

        .card {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--umbra-dark);
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--accent-coral);
        }

        .card.flipped {
            background: rgba(198,90,58,0.2);
            border-color: var(--accent-coral);
        }

        .card.matched {
            background: rgba(76,175,80,0.2);
            border-color: #4caf50;
            cursor: default;
            opacity: 0.6;
        }

        .game-message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(8,8,9,0.92);
            backdrop-filter: blur(16px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .game-message.show {
            display: flex;
        }

        .game-message-content {
            background: linear-gradient(180deg, rgba(25,25,28,0.98), rgba(15,15,18,0.98));
            border: 1px solid var(--accent-border);
            border-radius: 32px;
            padding: 40px 48px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            animation: modalPop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .game-message-content .icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        .game-message-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: var(--umbra-light);
        }

        .game-message-content p {
            color: var(--umbra-ash);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .game-message-content .btn-primary {
            background: var(--accent-coral);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .game-message-content .btn-primary:hover {
            background: #b34a2e;
            transform: translateY(-2px);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 10px 24px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: var(--umbra-light);
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: var(--accent-coral);
            color: var(--accent-coral);
            transform: translateX(-3px);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 500px) {
            .game-grid {
                gap: 8px;
            }
            .card {
                font-size: 1.5rem;
                border-radius: 12px;
            }
            .game-message-content {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>🧠 Juego de Memoria</h2>
        <p style="color: var(--umbra-ash); margin-bottom: 8px;">Encuentra todas las parejas</p>
        <p id="status" style="color: var(--accent-coral); font-size: 1.2rem;">Movimientos: 0</p>

        <div class="game-grid" id="gameGrid"></div>

        <a href="/pages/calendario.html" class="back-btn">← Volver al calendario</a>
    </div>

    <!-- Modal de mensaje -->
    <div class="game-message" id="gameMessage">
        <div class="game-message-content">
            <div class="icon" id="msgIcon">🎉</div>
            <h2 id="msgTitle">¡Felicidades!</h2>
            <p id="msgText">Has completado el juego en 0 movimientos.</p>
            <button class="btn-primary" id="msgBtn">Entendido</button>
        </div>
    </div>

    <script>
        const emojis = ['❤️', '🌟', '🌈', '🎵', '🌸', '✨', '🌺', '💫'];
        let cards = [];
        let flipped = [];
        let matched = [];
        let moves = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showMessage(icon, title, text) {
            const modal = document.getElementById('gameMessage');
            document.getElementById('msgIcon').textContent = icon || '🎉';
            document.getElementById('msgTitle').textContent = title || '¡Bien hecho!';
            document.getElementById('msgText').textContent = text || '';
            modal.classList.add('show');
        }

        function hideMessage() {
            document.getElementById('gameMessage').classList.remove('show');
        }

        document.getElementById('msgBtn').addEventListener('click', hideMessage);

        function initGame() {
            const doubled = [...emojis, ...emojis];
            cards = shuffle(doubled);
            flipped = [];
            matched = [];
            moves = 0;
            document.getElementById('status').textContent = 'Movimientos: 0';
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;

                if (matched.includes(index)) {
                    card.classList.add('matched');
                    card.textContent = emoji;
                } else if (flipped.includes(index)) {
                    card.classList.add('flipped');
                    card.textContent = emoji;
                } else {
                    card.textContent = '❓';
                }

                card.addEventListener('click', () => flipCard(index));
                grid.appendChild(card);
            });
        }

        function flipCard(index) {
            if (flipped.includes(index)) return;
            if (matched.includes(index)) return;
            if (flipped.length >= 2) return;

            flipped.push(index);
            renderGrid();

            if (flipped.length === 2) {
                moves++;
                document.getElementById('status').textContent = `Movimientos: ${moves}`;

                const [i1, i2] = flipped;
                if (cards[i1] === cards[i2] && i1 !== i2) {
                    matched.push(i1, i2);
                    flipped = [];
                    setTimeout(renderGrid, 300);

                    if (matched.length === cards.length) {
                        setTimeout(() => {
                            showMessage('🎉', '¡Felicidades!', `Has completado el juego en ${moves} movimientos.`);
                        }, 500);
                    }
                } else {
                    setTimeout(() => {
                        flipped = [];
                        renderGrid();
                    }, 800);
                }
            }
        }

        initGame();
    </script>
</body>
</html>
