<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel · Control Global</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos (mantener los mismos) */
        .admin-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .admin-header { text-align: center; margin-bottom: 32px; padding: 20px; background: linear-gradient(135deg, rgba(198,90,58,0.1), rgba(0,0,0,0.3)); border-radius: 24px; }
        .admin-header h1 { font-family: 'Playfair Display', serif; color: var(--accent-coral); }
        .admin-card { background: rgba(0,0,0,0.6); border-radius: 24px; padding: 24px; margin-bottom: 24px; }
        .section-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-unlock, .btn-lock { border-radius: 20px; cursor: pointer; padding: 6px 16px; font-size: 0.8rem; }
        .btn-unlock { background: var(--accent-coral); border: none; color: white; }
        .btn-lock { background: transparent; border: 1px solid #f44336; color: #f44336; }
        .status-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; margin-left: 12px; }
        .status-unlocked { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-locked { background: rgba(244,67,54,0.2); color: #f44336; }
        .admin-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn-primary { background: var(--accent-coral); padding: 10px 20px; border: none; border-radius: 40px; color: white; cursor: pointer; flex: 1; }
        .btn-danger { background: #dc3545; padding: 10px 20px; border: none; border-radius: 40px; color: white; cursor: pointer; flex: 1; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--umbra-ash); text-decoration: none; margin-bottom: 20px; }
        .loading { text-align: center; padding: 40px; color: var(--umbra-ash); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a1a1c; border-left: 4px solid var(--accent-coral); padding: 12px 24px; border-radius: 40px; z-index: 2000; }
    </style>
</head>
<body style="background:#0f0f10;">
    <div class="admin-container">
        <a href="index.html" class="back-link">
            <i data-lucide="arrow-left"></i> Volver al Hub
        </a>

        <div class="admin-header">
            <h1>🔧 Panel de Control Global</h1>
            <p>Los cambios afectan a TODOS los usuarios</p>
        </div>

        <div id="loadingState" class="loading">
            ⏳ Cargando configuración...
        </div>

        <div id="adminContent" style="display: none;">
            <div class="admin-card">
                <h3 style="margin-bottom: 20px;">📱 Secciones del sitio</h3>
                <div id="sectionsList"></div>
            </div>

            <div class="admin-actions">
                <button id="unlockAllBtn" class="btn-primary">🔓 Desbloquear todas</button>
                <button id="lockAllBtn" class="btn-danger">🔒 Bloquear todas</button>
                <button id="resetAllBtn" class="btn-primary" style="background:#ff9800;">🔄 Resetear</button>
            </div>
        </div>
    </div>

    <!-- 🔥 FIREBASE SCRIPTS - MISMA VERSIÓN EN TODOS LADOS -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <!-- Tu configuración -->
    <script src="js/firebase-config.js"></script>
    <script src="js/progress.js"></script>
    
    <script>
        const PASSWORD = 'sY2LkBmX';
        
        const entered = prompt('🔐 Contraseña de administrador:');
        if (entered !== PASSWORD) {
            document.body.innerHTML = '<h1 style="text-align:center;margin-top:100px;">Acceso denegado</h1>';
            throw new Error('Acceso denegado');
        }

        const sections = [
            { id: 'canciones', name: 'Canciones', icon: '🎵' },
            { id: 'rincon', name: 'TuRincónFav', icon: '💖' },
            { id: 'sentimientos', name: 'Sentimientos', icon: '💭' },
            { id: 'thoseeyes', name: 'Those Eyes', icon: '👁️' },
            { id: 'series', name: 'Series', icon: '📺' },
            { id: 'razones', name: 'Razones', icon: '✨' },
            { id: 'openwhen', name: 'Open When', icon: '✉️' },
            { id: 'calendario', name: 'Calendario', icon: '📅' },
            { id: 'maldia', name: 'Mal Día', icon: '☀️' }
        ];

        let currentProgress = {};

        function showToast(message, isError = false) {
            let toast = document.querySelector('.toast');
            if (toast) toast.remove();
            
            toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            if (isError) toast.style.borderLeftColor = '#dc3545';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        let loadAttempts = 0;
        const MAX_LOAD_ATTEMPTS = 20;

        async function loadProgress() {
            const loading = document.getElementById('loadingState');
            const content = document.getElementById('adminContent');
            
            if (!window.db) {
                loadAttempts++;
                if (loadAttempts > MAX_LOAD_ATTEMPTS) {
                    loading.innerHTML = '❌ No se pudo conectar con Firebase. Verifica tu conexión o recarga la página.';
                    return;
                }
                loading.innerHTML = `⏳ Conectando con Firebase... (${loadAttempts}/${MAX_LOAD_ATTEMPTS})`;
                setTimeout(loadProgress, 500);
                return;
            }
            
            try {
                if (typeof getProgressAsync !== 'function') {
                    loading.innerHTML = '❌ Error: progress.js no cargado correctamente';
                    return;
                }
                currentProgress = await getProgressAsync();
                loading.style.display = 'none';
                content.style.display = 'block';
                renderSections();
                showToast('✅ Panel cargado — los cambios afectan a todos los usuarios');
            } catch (error) {
                console.error(error);
                loading.innerHTML = '❌ Error cargando datos. <button onclick="location.reload()" style="background:var(--accent-coral);border:none;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;margin-top:12px;">Recargar</button>';
            }
        }

        function renderSections() {
            const container = document.getElementById('sectionsList');
            if (!container) return;
            
            container.innerHTML = sections.map(section => {
                const isUnlocked = currentProgress[section.id] === true;
                return `
                    <div class="section-row">
                        <div>
                            <span style="margin-right: 12px;">${section.icon}</span>
                            <strong>${section.name}</strong>
                            <span class="status-badge ${isUnlocked ? 'status-unlocked' : 'status-locked'}">
                                ${isUnlocked ? '✅ Desbloqueada' : '🔒 Bloqueada'}
                            </span>
                        </div>
                        <div>
                            ${!isUnlocked ? `<button class="btn-unlock" onclick="unlockSectionHandler('${section.id}')">Desbloquear</button>` : ''}
                            ${isUnlocked ? `<button class="btn-lock" onclick="lockSectionHandler('${section.id}')">Bloquear</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function unlockSectionHandler(sectionId) {
            if (typeof unlockSection !== 'function') {
                showToast('Error: función unlockSection no disponible', true);
                return;
            }
            await unlockSection(sectionId);
            currentProgress = await getProgressAsync();
            renderSections();
            showToast(`✅ "${sectionId}" desbloqueada para todos`);
        }

        async function lockSectionHandler(sectionId) {
            if (typeof lockSection !== 'function') {
                showToast('Error: función lockSection no disponible', true);
                return;
            }
            await lockSection(sectionId);
            currentProgress = await getProgressAsync();
            renderSections();
            showToast(`🔒 "${sectionId}" bloqueada para todos`);
        }

        async function unlockAll() {
            if (!confirm('¿Desbloquear TODAS las secciones para todos los usuarios?')) return;
            for (const section of sections) {
                await unlockSection(section.id);
            }
            currentProgress = await getProgressAsync();
            renderSections();
            showToast('🔓 Todas las secciones desbloqueadas');
        }

        async function lockAll() {
            if (!confirm('¿Bloquear TODAS las secciones?')) return;
            for (const section of sections) {
                await lockSection(section.id);
            }
            currentProgress = await getProgressAsync();
            renderSections();
            showToast('🔒 Todas las secciones bloqueadas');
        }

        async function resetAll() {
            if (!confirm('⚠️ ¿Resetear todo al estado por defecto?')) return;
            if (typeof resetAllProgress !== 'function') return;
            await resetAllProgress();
            currentProgress = await getProgressAsync();
            renderSections();
            showToast('🔄 Todo reseteado');
        }

        document.getElementById('unlockAllBtn')?.addEventListener('click', unlockAll);
        document.getElementById('lockAllBtn')?.addEventListener('click', lockAll);
        document.getElementById('resetAllBtn')?.addEventListener('click', resetAll);

        window.unlockSectionHandler = unlockSectionHandler;
        window.lockSectionHandler = lockSectionHandler;

        loadProgress();
        if (typeof lucide !== 'undefined') lucide.createIcons();
    </script>
</body>
</html>
