<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open When</title>
    <meta name="description" content="Cartas digitales para abrir segun el momento">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="Gemini_Generated_Image_6wkfln6wk.png">
    <style>
        /* Estilos específicos de Open When */
        .letters-grid {
            display: grid;
            gap: var(--space-md);
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }
        .letter-card {
            text-align: left;
            padding: var(--space-lg);
            border-radius: var(--radius-xl);
            border: var(--border-subtle);
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(198, 90, 58, 0.04));
            transition: border-color var(--dur-fast), transform var(--dur-fast);
        }
        .letter-card:hover {
            border-color: var(--accent-border);
            transform: translateY(-2px);
        }
        .letter-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(198, 90, 58, 0.15);
            color: var(--accent-coral);
            margin-bottom: var(--space-md);
        }
        .letter-card small {
            display: block;
            color: var(--umbra-ash);
            margin-top: 6px;
            line-height: 1.7;
        }
        /* Modal del sobre */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .envelope-modal {
            background: #1e1b1a;
            border-radius: 2rem;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(198, 90, 58, 0.4);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6);
            transform: scale(0.95);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }
        .modal-overlay.active .envelope-modal {
            transform: scale(1);
        }
        .envelope-flap {
            background: #c65a3a;
            height: 6px;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 2rem 2rem 0 0;
        }
        .modal-content {
            padding: 2rem 1.8rem 2rem 1.8rem;
            text-align: center;
        }
        .modal-content i[data-lucide] {
            width: 48px;
            height: 48px;
            color: #c65a3a;
            margin-bottom: 1rem;
        }
        .modal-content h3 {
            font-size: 1.7rem;
            margin-top: 0;
            margin-bottom: 1rem;
            color: #f3e9e0;
        }
        .modal-message {
            color: #ddd2c5;
            line-height: 1.6;
            font-size: 1.05rem;
            margin: 1.5rem 0;
            white-space: pre-wrap;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 1.5rem;
        }
        .close-modal-btn {
            background: none;
            border: 1px solid #c65a3a;
            color: #c65a3a;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .close-modal-btn:hover {
            background: #c65a3a;
            color: #1e1b1a;
        }
        .open-btn {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="page">
    <!-- ========== HEADER ========== -->
    <header class="header glass">
        <div class="header-top">
            <div class="brand">
                <h1>Open When<i data-lucide="mail" style="width:1.2rem; margin-left: 4px;"></i></h1>
                <p>Cartas para abrir solo cuando toque</p>
            </div>
        </div>
        <nav class="nav-main" aria-label="Navegación principal">
            <button class="nav-btn" onclick="window.location.href='index.html'"><i data-lucide="home"></i> Inicio</button>
            <button class="nav-btn" onclick="window.location.href='canciones.html'"><i data-lucide="music"></i> Canciones</button>
            <button class="nav-btn" onclick="window.location.href='rincon.html'"><i data-lucide="heart"></i> TuRincónFav</button>
            <button class="nav-btn" onclick="window.location.href='planner.html'"><i data-lucide="gift"></i> Regalos</button>
            <button class="nav-btn" onclick="window.location.href='ThoseYourEyes.html'"><i data-lucide="eye"></i> Those Eyes</button>
            <button class="nav-btn" onclick="window.location.href='series.html'"><i data-lucide="tv"></i> Series</button>
            <button class="nav-btn" onclick="window.location.href='razones.html'"><i data-lucide="heart"></i> Razones</button>
            <button class="nav-btn active"><i data-lucide="mail"></i> Open When</button>
            <button class="nav-btn" onclick="window.location.href='calendario.html'"><i data-lucide="calendar-days"></i> Calendario</button>
            <button class="nav-btn" onclick="window.location.href='maldia.html'"><i data-lucide="sun-medium"></i> Mal dia</button>
        </nav>
    </header>

    <!-- ========== SECCIÓN PRINCIPAL ========== -->
    <section class="page-section">
        <button class="back-btn" onclick="window.location.href='index.html'" style="margin-bottom:20px;">
            <i data-lucide="arrow-left"></i> Volver al Hub
        </button>

        <div class="section-card" style="margin-bottom:var(--space-lg);">
            <h2><i data-lucide="mail-open"></i> Sobres virtuales</h2>
            <p>La idea es abrir cada carta solo en su momento. No hace falta trampear: ya están aquí para abrazarte cuando toque. Haz clic en "Abrir carta" y descubre el mensaje dentro del sobre.</p>
        </div>

        <div class="letters-grid" id="lettersGrid"></div>
    </section>
</div>

<!-- ========== MODAL DEL SOBRE ========== -->
<div id="envelopeModal" class="modal-overlay">
    <div class="envelope-modal">
        <div class="envelope-flap"></div>
        <div class="modal-content">
            <i data-lucide="mail-open"></i>
            <h3 id="modalTitle"></h3>
            <div id="modalMessage" class="modal-message"></div>
            <button class="close-modal-btn" id="closeModalBtn">Cerrar sobre ❤️</button>
        </div>
    </div>
</div>

<script>
    // ========== INICIALIZAR ICONOS ==========
    if (typeof lucide !== 'undefined') lucide.createIcons();

    // ========== DATOS DE LAS CARTAS ==========
    const letters = [
        { title: "Ábrela cuando estés triste", note: "Un empujoncito para los días grises.", message: "No tienes que poder con todo a la vez. Respira, descansa un poco y recuerda que ya has superado cosas muy difíciles antes. Sigues siendo increíble incluso en tus días flojitos." },
        { title: "Ábrela cuando me eches de menos", note: "Para cuando la distancia pese más.", message: "Si ahora mismo pudiera, iría a buscarte para darte un abrazo largo. Mientras tanto, piensa en todo lo bonito que ya tenemos y en todo lo que todavía vamos a vivir." },
        { title: "Ábrela cuando tengas un éxito", note: "Para celebrar contigo aunque sea en pantalla.", message: "Sabía que podías hacerlo. Estoy orgulloso de ti no solo por lograrlo, sino por todo lo que has trabajado para llegar hasta ahí. Hoy toca presumir de ti un poquito." },
        { title: "Ábrela cuando dudes de ti", note: "Para recordarte quién eres.", message: "A veces te miras más duro de lo que mereces. Yo veo a una persona valiente, lista, sensible y especial. No necesitas ser perfecta para ser maravillosa." },
        { title: "Ábrela cuando no puedas dormir", note: "Una carta tranquilita para bajar revoluciones.", message: "Imagina una noche calmada, una manta, una luz tenue y mi mano buscando la tuya. No corras. El mundo puede esperar a mañana. Ahora solo toca descansar." },
        { title: "Ábrela cuando quieras sonreír", note: "Un mini refugio para momentos random.", message: "Quiero que recuerdes esta verdad sencilla: haces bonito mi mundo. Incluso cuando no lo intentas. Incluso cuando no lo ves. Y eso ya es una razón enorme para sonreír." }
    ];

    const lettersGrid = document.getElementById('lettersGrid');
    lettersGrid.innerHTML = letters.map((letter, index) => `
        <article class="letter-card" data-id="${index}">
            <div class="letter-icon"><i data-lucide="mail"></i></div>
            <h3>${letter.title}</h3>
            <small>${letter.note}</small>
            <button class="nav-btn open-btn" data-title="${letter.title.replace(/['"]/g, '&quot;')}" data-message="${letter.message.replace(/['"]/g, '&quot;')}" style="margin-top:var(--space-md);"><i data-lucide="unlock"></i> Abrir carta</button>
        </article>
    `).join('');
    if (typeof lucide !== 'undefined') lucide.createIcons();

    // ========== LÓGICA DEL MODAL ==========
    const modal = document.getElementById('envelopeModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const closeBtn = document.getElementById('closeModalBtn');

    function openEnvelope(title, message) {
        modalTitle.textContent = title;
        modalMessage.textContent = message;
        modal.classList.add('active');
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function closeEnvelope() {
        modal.classList.remove('active');
    }

    document.querySelectorAll('.open-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const title = btn.getAttribute('data-title');
            const message = btn.getAttribute('data-message');
            if (title && message) openEnvelope(title, message);
        });
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeEnvelope();
    });
    closeBtn.addEventListener('click', closeEnvelope);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeEnvelope();
    });
</script>
</body>
</html>
