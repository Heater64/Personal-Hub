<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home ✦</title>
    <meta name="description" content="Tu lanzadera de proyectos personales">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages/home.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="assets/Gemini_Generated_Image_6wkfln6wk.png">
</head>
<body data-sidebar-root="." data-sidebar-page="home">
<button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
    <i data-lucide="menu"></i>
</button>
<div class="sidebar-overlay" data-sidebar-overlay></div>
<aside class="sidebar" data-sidebar></aside>

<main class="page-shell">
<div class="page">
    <section id="home" class="page-section">
        <div class="bento-hero glass">
            <p class="eyebrow"><i data-lucide="sparkles" style="width:0.9rem;"></i> centro de webs</p>
            <h2>Bienvenida<br> mi<em> princesa</em></h2>
            <p>Explora las webs que iré subiendo a lo largo del tiempo. Cada tarjeta es una diferente pero con el mismo propósito.</p>
        </div>

        <div class="bento-grid">
            <!-- Sección: Música -->
            <button class="bento-card" onclick="window.location.href='pages/canciones.html'">
                <i data-lucide="music" class="icon"></i>
                <h3>Canciones</h3>
                <p>Trozos de canciones que me recuerdan a ti, mi princesa.</p>
            </button>

            <button class="bento-card" onclick="window.location.href='pages/rincon.html'">
                <i data-lucide="heart" class="icon"></i>
                <h3>TuRincónFav</h3>
                <p>Galería, gatos, memes, gustos y tu rincón especial.</p>
            </button>

            <button class="bento-card" onclick="window.location.href='pages/thoseeyes.html'">
                <i data-lucide="eye" class="icon"></i>
                <h3>Those Eyes</h3>
                <p>Una web más poética con la canción, la letra y una atmósfera especial.</p>
            </button>

            <!-- Sección: Entretenimiento -->
            <button class="bento-card" onclick="window.location.href='pages/series.html'">
                <i data-lucide="tv" class="icon"></i>
                <h3>Series</h3>
                <p>Seguimiento de series, enlaces y progreso de episodios.</p>
            </button>

            <button class="bento-card" onclick="window.location.href='pages/razones.html'">
                <i data-lucide="heart" class="icon"></i>
                <h3>Razones</h3>
                <p>Razones por las que te quiero con sorpresa aleatoria cada vez.</p>
            </button>

            <button class="bento-card" onclick="window.location.href='pages/openwhen.html'">
                <i data-lucide="mail" class="icon"></i>
                <h3>Open When</h3>
                <p>Cartas digitales para abrir según el momento que estés viviendo.</p>
            </button>

            <button class="bento-card" onclick="window.location.href='pages/calendario.html'">
                <i data-lucide="calendar-days" class="icon"></i>
                <h3>Calendario</h3>
                <p>Casillas con sorpresas pequeñas, recuerdos y retos bonitos.</p>
            </button>

            <button class="bento-card" onclick="window.location.href='pages/maldia.html'">
                <i data-lucide="sun-medium" class="icon"></i>
                <h3>Mal día</h3>
                <p>Un botón de emergencia emocional con frases, alegría y música.</p>
            </button>

            <!-- ⚡ NUEVA SECCIÓN: EstudIA -->
            <div class="bento-grid-full" style="grid-column: 1/-1; margin-top: 20px;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                    <i data-lucide="brain" style="width: 28px; height: 28px; color: var(--accent-coral);"></i>
                    <h3 style="margin: 0;">EstudIA · Aprendizaje adaptativo con IA</h3>
                </div>
                <div class="bento-grid" style="margin-top: 0;">
                    <button class="bento-card" onclick="window.location.href='pages/decks.html'">
                        <i data-lucide="layers" class="icon"></i>
                        <h3>Mis Decks</h3>
                        <p>Crea y organiza tus mazos de estudio con tarjetas generadas por IA.</p>
                    </button>

                    <button class="bento-card" onclick="window.location.href='pages/dashboard.html'">
                        <i data-lucide="bar-chart-2" class="icon"></i>
                        <h3>Progreso</h3>
                        <p>Visualiza tu avance, estadísticas, rachas y temas que necesitan refuerzo.</p>
                    </button>

                    <button class="bento-card" onclick="window.location.href='pages/tutor.html'">
                        <i data-lucide="brain" class="icon"></i>
                        <h3>Tutor IA</h3>
                        <p>Asistente personal con IA para resolver dudas y explicar conceptos.</p>
                    </button>
                </div>
            </div>
        </div>

        <div style="text-align:center; margin-top:40px; padding: 20px;">
            <p style="font-size:0.75rem; color:var(--umbra-ash); letter-spacing:0.06em; font-weight:300;">
                Hecho con amor · Se irán añadiendo más páginas <i data-lucide="asterisk" style="width:0.7rem;"></i>
            </p>
        </div>
    </section>
</div>
</main>

<div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-content" id="lightboxContent"></div>
    <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script src="js/core.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/data.js"></script>
<script src="js/progress.js"></script>
<script src="js/access-control.js"></script>
</body>
</html>
