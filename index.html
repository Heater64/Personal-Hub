<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Hub ✦</title>
    <meta name="description" content="Tu lanzadera de proyectos personales - Estilo Apple Vision Pro">
    <meta name="theme-color" content="#000000">
    <link rel="canonical" href="https://personal-hub.vercel.app/">

    <!-- Estilos compartidos -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">
        <!-- ========================================== -->
        <!-- HEADER -->
        <!-- ========================================== -->
        <header class="header glass">
            <div class="header-top">
                <div class="brand">
                    <h1>Personal Hub ✦</h1>
                    <p>Tu lanzadera de proyectos</p>
                </div>
            </div>
            <nav class="nav-main" aria-label="Navegación principal">
                <button class="nav-btn active" onclick="window.location.href='index.html'">Inicio</button>
                <button class="nav-btn" onclick="window.location.href='canciones.html'">🎵 Canciones</button>
                <button class="nav-btn" onclick="window.location.href='rincon.html'">🏠 Rincón</button>
                <button class="nav-btn" onclick="window.location.href='planner.html'">🎁 Planner</button>
            </nav>
        </header>

        <!-- ========================================== -->
        <!-- HOME: BENTO GRID -->
        <!-- ========================================== -->
        <section id="home" class="page-section">
            <div class="bento-hero glass">
                <h2>Bienvenido a tu Hub personal</h2>
                <p>Explora tus proyectos en un entorno visual inmerso. Haz clic en cualquier tarjeta para acceder directamente.</p>
                <div class="bento-stats">
                    <div class="bento-stat">
                        <span>Proyectos</span>
                        <strong>3</strong>
                    </div>
                    <div class="bento-stat">
                        <span>Canciones</span>
                        <strong id="songsCount">14</strong>
                    </div>
                    <div class="bento-stat">
                        <span>Secciones</span>
                        <strong>7</strong>
                    </div>
                    <div class="bento-stat">
                        <span>Estado</span>
                        <strong>SPA</strong>
                    </div>
                </div>
            </div>

            <div class="bento-grid">
                <button class="bento-card large" onclick="navigateToPage('canciones')">
                    <div class="icon">🎵</div>
                    <h3>Canciones</h3>
                    <p>14 canciones que me recuerdan a ti con reproductor y letras completas.</p>
                </button>
                <button class="bento-card" onclick="navigateToPage('rincon')">
                    <div class="icon">🏠</div>
                    <h3>Mi Rincón</h3>
                    <p>Galería, gatos, memes, gustos y más.</p>
                </button>
                <button class="bento-card" onclick="navigateToPage('planner')">
                    <div class="icon">🎁</div>
                    <h3>Planner</h3>
                    <p>Planificador de regalos con persistencia local.</p>
                </button>
            </div>
        </section>
    </div>

    <!-- ========================================== -->
    <!-- LIGHTBOX (compartido) -->
    <!-- ========================================== -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <div class="lightbox-content" id="lightboxContent"></div>
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <!-- Datos compartidos -->
    <script src="datos.js"></script>

    <!-- Scripts compartidos -->
    <script src="script.js"></script>
</body>
</html>
