<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('personalHub.theme');if(t){if(t==='auto'){t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}document.documentElement.setAttribute('data-theme',t)}})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Home</title>
    <meta name="description" content="Tu lanzadera de proyectos personales">
    <meta name="theme-color" content="#0c0b0b">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hub">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dcsent4fs/image/upload/v1783958827/imagen_192x192_cqgclt.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://res.cloudinary.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://res.cloudinary.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Dancing+Script:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages/home.css">
    <link rel="stylesheet" href="css/pages/welcome.css">
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dcsent4fs/image/upload/v1783958827/imagen_192x192_cqgclt.png">
    <link rel="manifest" href="manifest.json">
</head>

<body data-sidebar-root="." data-sidebar-page="home" data-bottom-nav="home">

    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <section id="home" class="page-section home-section">
                <div class="bento-hero glass">
                    <p class="eyebrow"><i data-lucide="sparkles" style="width:0.9rem;"></i> centro de webs</p>
                    <h2>Bienvenida<br> mi<em> princesa</em></h2>
                    <p>Explora las webs que irá subiendo a lo largo del tiempo. Cada tarjeta es una diferente pero con el mismo propósito.</p>
                    <div class="day-counter"><i data-lucide="heart" style="width:0.9rem;"></i> <span id="homeDayCounter"></span></div>
                    <button id="installBtn" class="install-btn" type="button" hidden>
                        <i data-lucide="download" style="width:0.9rem;"></i> Instalar app
                    </button>
                </div>

                <div class="news-banner" id="newsBanner">
                    <div class="news-header">
                        <span class="news-icon">✨</span>
                        <span class="news-title">Novedades</span>
                        <span class="news-badge">Nuevo</span>
                    </div>
                    <div class="news-content" id="newsContent"></div>
                    <button class="news-toggle" id="newsToggle" type="button" aria-label="Mostrar más noticias">
                        <i data-lucide="chevron-down"></i>
                    </button>
                </div>

                <div id="hubGrid" class="bento-grid" aria-label="Secciones del hub"></div>

                <div class="curiosities-section">
                    <div class="curiosities-header">
                        <span class="curiosities-icon">✨</span>
                        <h3>Datos curiosos de esta web</h3>
                    </div>
                    <div class="curiosities-grid" id="curiositiesGrid"></div>
                </div>

                <footer class="home-footer">
                    <p>
                        Hecho con amor ♥ Se irán añadiendo más páginas
                        <i data-lucide="asterisk" style="width:0.7rem;"></i>
                    </p>
                </footer>
            </section>
        </div>
    </main>

    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" id="lightboxCloseBtn" type="button">✕</button>
        <div class="lightbox-content" id="lightboxContent"></div>
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <!-- ===== BOTTOM NAV (móvil) ===== -->
    <nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="Navegación principal"></nav>

    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script defer src="js/firebase-config.js"></script>
    <script defer src="js/core/profile.js"></script>
    <script defer src="js/core.js"></script>
    <script defer src="js/core/authGuard.js"></script>
    <script defer src="js/sidebar.js"></script>
    <script defer src="js/core/haptica.js"></script>
    <script defer src="js/core/memoria.js"></script>
    <script defer src="js/core/connection-indicator.js"></script>
    <script defer src="js/core/notifications.js"></script>
    <script defer src="js/core/update-manager.js"></script>
    <script defer src="js/core/install.js"></script>
    <script defer src="js/ui/pull-to-refresh.js"></script>
    <script defer src="js/ui/skeleton.js"></script>
    <script defer src="features/welcome/welcome.screen.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof renderBottomNav === 'function') {
            setTimeout(renderBottomNav, 150);
        }
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
    window.addEventListener('pageshow', function() {
        if (typeof renderBottomNav === 'function') {
            setTimeout(renderBottomNav, 150);
        }
    });
    </script>
    <script type="module" src="js/pages/home.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW error:', err); });
    }

    // Sistema PWA: conexión, actualizaciones, instalación
    window.addEventListener('load', function () {
      if (window.ConnectionIndicator) window.ConnectionIndicator.init();
      if (window.UpdateManager) { window.UpdateManager.init(); window.UpdateManager.mostrarPendiente(); }
      if (window.InstallManager) window.InstallManager.init();
      if (window.Notifications) window.Notifications.reiniciarDiarias();
    });
    </script>

</body>
</html>
