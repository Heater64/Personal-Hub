<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home ✦</title>
    <meta name="description" content="Tu lanzadera de proyectos personales">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages/home.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="assets/Gemini_Generated_Image_6wkfln6wk.png">
</head>
<body data-sidebar-root="." data-sidebar-page="home">
    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <section id="home" class="page-section home-section">
                <!-- Hero -->
                <div class="bento-hero glass">
                    <p class="eyebrow"><i data-lucide="sparkles" style="width:0.9rem;"></i> centro de webs</p>
                    <h2>Bienvenida<br> mi<em> princesa</em></h2>
                    <p>Explora las webs que iré subiendo a lo largo del tiempo. Cada tarjeta es una diferente pero con el mismo propósito.</p>
                    <div class="day-counter"><i data-lucide="heart" style="width:0.9rem;"></i> <span id="homeDayCounter"></span></div>
                </div>

                <!-- ========== BANNER DE NOVEDADES ========== -->
                <div class="news-banner" id="newsBanner">
                    <div class="news-header">
                        <span class="news-icon">📢</span>
                        <span class="news-title">Novedades</span>
                        <span class="news-badge">Nuevo</span>
                    </div>
                    <div class="news-content" id="newsContent">
                        <!-- Las noticias se cargan desde JS -->
                    </div>
                    <button class="news-toggle" id="newsToggle" type="button" aria-label="Mostrar más noticias">
                        <i data-lucide="chevron-down"></i>
                    </button>
                </div>

                <!-- Grid de secciones -->
                <div id="hubGrid" class="bento-grid" aria-label="Secciones del hub"></div>

                <!-- ========== DATOS CURIOSOS ========== -->
                <div class="curiosities-section">
                    <div class="curiosities-header">
                        <span class="curiosities-icon">✨</span>
                        <h3>Datos curiosos de esta web</h3>
                    </div>
                    <div class="curiosities-grid" id="curiositiesGrid">
                        <!-- Los datos curiosos se cargan desde JS -->
                    </div>
                </div>

                <!-- Footer -->
                <footer class="home-footer">
                    <p>
                        Hecho con amor · Se irán añadiendo más páginas
                        <i data-lucide="asterisk" style="width:0.7rem;"></i>
                    </p>
                </footer>
            </section>
        </div>
    </main>

    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <div class="lightbox-content" id="lightboxContent"></div>
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/core.js"></script>
    <script src="js/sidebar.js"></script>
    <script type="module" src="js/pages/home.js"></script>
</body>
</html>
