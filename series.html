<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series · Seguimiento</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Mantén aquí todos los estilos que ya funcionaban bien */
        .series-form-container { margin-bottom: var(--space-lg); }
        .toggle-form-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border: var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: var(--space-md) var(--space-lg);
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--umbra-light);
            cursor: pointer;
            transition: background var(--dur-fast);
        }
        .toggle-form-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--accent-border);
        }
        .series-form {
            margin-top: var(--space-md);
            padding: var(--space-md);
            background: rgba(255,255,255,0.02);
            border: var(--border-subtle);
            border-radius: var(--radius-lg);
            display: none;
        }
        .series-form.open { display: flex; flex-direction: column; gap: var(--space-sm); }
        .form-group { display: flex; flex-direction: column; gap: var(--space-xs); }
        .form-group label { font-size: 0.75rem; letter-spacing: 0.1em; color: var(--umbra-ash); }
        .big-input {
            padding: 14px 16px;
            font-size: 1rem;
            background: rgba(255,255,255,0.03);
            border: var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--umbra-light);
        }
        .big-input:focus { outline: none; border-color: var(--accent-coral); }
        .btn-primary {
            background: var(--accent-coral);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-pill);
            font-weight: 500;
            cursor: pointer;
            transition: opacity var(--dur-fast);
        }
        .btn-primary:hover { opacity: 0.8; }
        .series-grid {
            display: grid;
            gap: var(--space-md);
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            margin-top: var(--space-lg);
        }
        .series-card {
            aspect-ratio: 1 / 1;
            background: rgba(255,255,255,0.02);
            border: var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            transition: all var(--dur-fast);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .series-card:hover { border-color: var(--accent-border); transform: translateY(-2px); }
        .series-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .series-header h3 {
            margin: 0;
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            font-size: 1.2rem;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .series-url {
            margin: var(--space-xs) 0;
            font-size: 0.7rem;
            color: var(--umbra-ash);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .progress-bar-bg {
            background: rgba(255,255,255,0.1);
            border-radius: var(--radius-pill);
            height: 6px;
            margin: var(--space-sm) 0;
            overflow: hidden;
        }
        .progress-fill-serie {
            background: var(--accent-coral);
            height: 100%;
            width: 0%;
            border-radius: var(--radius-pill);
            transition: width 0.2s ease;
        }
        .series-counter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-sm);
            margin-top: auto;
        }
        .counter-btn {
            background: transparent;
            border: 1px solid var(--accent-coral);
            border-radius: 60px;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--accent-coral);
        }
        .counter-btn:hover {
            background: var(--accent-coral);
            color: var(--umbra-black);
        }
        .counter-btn i[data-lucide] {
            width: 20px;
            height: 20px;
            stroke-width: 2;
        }
        .series-counter span {
            font-size: 1rem;
            font-weight: 500;
            background: rgba(255,255,255,0.03);
            padding: 6px 12px;
            border-radius: var(--radius-pill);
            flex: 1;
            text-align: center;
        }
        .delete-serie {
            background: transparent;
            border: none;
            color: var(--umbra-ash);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius-pill);
            transition: all 0.2s;
        }
        .delete-serie:hover { color: var(--accent-coral); background: rgba(255,255,255,0.05); }
        .reset-all-btn {
            background: transparent;
            border: 1px solid var(--umbra-ash);
            border-radius: var(--radius-pill);
            padding: 8px 20px;
            color: var(--umbra-ash);
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-bottom: var(--space-md);
            transition: all var(--dur-fast);
        }
        .reset-all-btn:hover { border-color: var(--accent-coral); color: var(--accent-coral); }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--umbra-dark);
            border-left: 4px solid var(--accent-coral);
            color: var(--umbra-light);
            padding: 14px 24px;
            border-radius: var(--radius-pill);
            font-size: 0.9rem;
            z-index: 2000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            animation: fadeInUp 0.3s ease;
            pointer-events: none;
        }
        .modal-confirm {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--umbra-dark);
            border: var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: var(--space-lg);
            max-width: 300px;
            width: 80%;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            gap: var(--space-md);
            justify-content: center;
            margin-top: var(--space-lg);
        }
        .modal-btn {
            padding: 8px 20px;
            border-radius: var(--radius-pill);
            border: none;
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--umbra-ash);
            color: var(--umbra-light);
        }
        .modal-btn.confirm { background: var(--accent-coral); border: none; color: white; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @media (max-width: 640px) {
            .series-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
            .counter-btn { width: 40px; height: 40px; }
            .toast-message { width: 90%; white-space: normal; text-align: center; }
        }
        .empty-state { text-align: center; padding: var(--space-xl); color: var(--umbra-ash); }
    </style>
</head>
<body>
<div class="page">
    <header class="header glass">
        <div class="brand">
            <h1>Mi Serie<i data-lucide="tv" style="width:1.2rem; margin-left: 4px;"></i></h1>
            <p>Capítulos vistos · Enlaces directos</p>
        </div>
        <nav class="nav-main">
            <button class="nav-btn" onclick="window.location.href='index.html'"><i data-lucide="home"></i> Inicio</button>
            <button class="nav-btn" onclick="window.location.href='canciones.html'"><i data-lucide="music"></i> Canciones</button>
            <button class="nav-btn" onclick="window.location.href='rincon.html'"><i data-lucide="heart"></i> TuRincónFav</button>
            <button class="nav-btn" onclick="window.location.href='planner.html'"><i data-lucide="gift"></i> Regalos</button>
            <button class="nav-btn" onclick="window.location.href='ThoseYourEyes.html'"><i data-lucide="eye"></i> Those Eyes</button>
            <button class="nav-btn active"><i data-lucide="tv"></i> Series</button>
            <button class="nav-btn" onclick="window.location.href='razones.html'"><i data-lucide="heart"></i> Razones</button>
            <button class="nav-btn" onclick="window.location.href='openwhen.html'"><i data-lucide="mail"></i> Open When</button>
            <button class="nav-btn" onclick="window.location.href='calendario.html'"><i data-lucide="calendar-days"></i> Calendario</button>
            <button class="nav-btn" onclick="window.location.href='maldia.html'"><i data-lucide="sun-medium"></i> Mal dia</button>
        </nav>
    </header>

    <section class="page-section">
        <button class="back-btn" onclick="window.location.href='index.html'" style="margin-bottom:20px;">
            <i data-lucide="arrow-left"></i> Volver al Hub
        </button>

        <div class="series-form-container">
            <button class="toggle-form-btn" id="toggleFormBtn">
                <span> Añadir serie</span>
                <i data-lucide="chevron-down" id="toggleIcon"></i>
            </button>
            <div id="seriesForm" class="series-form">
                <div class="form-group">
                    <label>NOMBRE DE LA SERIE</label>
                    <input type="text" id="serieName" class="big-input" placeholder="Ej: Gravity Falls">
                </div>
                <div class="form-group">
                    <label>ENLACE DONDE LA VES</label>
                    <input type="url" id="serieUrl" class="big-input" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>TOTAL DE CAPÍTULOS</label>
                    <input type="number" id="serieTotal" class="big-input" placeholder="24" min="1">
                </div>
                <button id="addSerieBtn" class="btn-primary">Guardar serie</button>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end;">
            <button id="resetAllBtn" class="reset-all-btn"><i data-lucide="rotate-ccw"></i> Reiniciar todo</button>
        </div>

        <div id="seriesList" class="series-grid"></div>
    </section>
</div>

<script>
    if (typeof lucide !== 'undefined') lucide.createIcons();

    let series = [];

    function showMessage(text, isError = false) {
        let existingToast = document.querySelector('.toast-message');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerHTML = text;
        if(isError) toast.style.borderLeftColor = '#ff4d4d';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function confirmAction(message, onConfirm) {
        const modal = document.createElement('div');
        modal.className = 'modal-confirm';
        modal.innerHTML = `
            <div class="modal-content">
                <p>${message}</p>
                <div class="modal-buttons">
                    <button class="modal-btn cancel">Cancelar</button>
                    <button class="modal-btn confirm">Aceptar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('.cancel').addEventListener('click', () => modal.remove());
        modal.querySelector('.confirm').addEventListener('click', () => {
            modal.remove();
            onConfirm();
        });
    }

    function loadSeries() {
        const stored = localStorage.getItem('misSeries');
        if (stored) {
            series = JSON.parse(stored);
        } else {
            series = [
                { id: Date.now(), name: "DragonBall-Niño", url: "https://tioanime.com/anime/dragon-ball", total: 153, watched: 0 }
            ];
            saveSeries();
        }
        renderSeries();
    }

    function saveSeries() {
        localStorage.setItem('misSeries', JSON.stringify(series));
    }

    function addSerie() {
        const name = document.getElementById('serieName').value.trim();
        const url = document.getElementById('serieUrl').value.trim();
        const total = parseInt(document.getElementById('serieTotal').value);
        if (!name || !url || isNaN(total) || total <= 0) {
            showMessage('❌ Completa todos los campos correctamente', true);
            return;
        }
        const newSerie = { id: Date.now(), name, url, total, watched: 0 };
        series.push(newSerie);
        saveSeries();
        renderSeries();
        document.getElementById('serieName').value = '';
        document.getElementById('serieUrl').value = '';
        document.getElementById('serieTotal').value = '';
        showMessage(`✅ "${name}" añadida`);
        document.getElementById('seriesForm').classList.remove('open');
        document.getElementById('toggleIcon').setAttribute('data-lucide', 'chevron-down');
        if(typeof lucide !== 'undefined') lucide.createIcons();
    }

    function incrementWatched(id) {
        const serie = series.find(s => s.id === id);
        if (serie && serie.watched < serie.total) {
            serie.watched++;
            saveSeries();
            renderSeries();
            if(serie.watched === serie.total) showMessage(`🎉 ¡Completaste ${serie.name}!`);
        } else if (serie && serie.watched === serie.total) {
            showMessage(`🏁 Ya viste todos los capítulos de ${serie.name}`);
        }
    }

    function decrementWatched(id) {
        const serie = series.find(s => s.id === id);
        if (serie && serie.watched > 0) {
            serie.watched--;
            saveSeries();
            renderSeries();
        }
    }

    function deleteSerie(id) {
        const serie = series.find(s => s.id === id);
        if (!serie) return;
        confirmAction(`¿Eliminar "${serie.name}"?`, () => {
            series = series.filter(s => s.id !== id);
            saveSeries();
            renderSeries();
            showMessage(`🗑️ "${serie.name}" eliminada`);
        });
    }

    function resetAllProgress() {
        confirmAction('¿Reiniciar el progreso de TODAS las series? Se pondrán a 0 capítulos vistos.', () => {
            series = series.map(s => ({ ...s, watched: 0 }));
            saveSeries();
            renderSeries();
            showMessage('🔄 Progreso reiniciado en todas las series');
        });
    }

    function renderSeries() {
        const container = document.getElementById('seriesList');
        if (!container) return;
        if (series.length === 0) {
            container.innerHTML = `<div class="empty-state"><i data-lucide="tv-off" style="width:40px;height:40px;"></i><p>Aún no hay series añadidas.</p></div>`;
        } else {
            container.innerHTML = series.map(s => {
                const percent = (s.watched / s.total) * 100;
                return `
                    <div class="series-card" data-id="${s.id}" data-url="${s.url}">
                        <div class="series-header">
                            <h3>${escapeHtml(s.name)}</h3>
                            <button class="delete-serie" data-id="${s.id}" title="Eliminar"><i data-lucide="trash-2"></i></button>
                        </div>
                        <div class="series-url">
                            <span><i data-lucide="external-link"></i> ${s.url.length > 40 ? s.url.substring(0,40)+'…' : s.url}</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-fill-serie" style="width: ${percent}%;"></div>
                        </div>
                        <div class="series-counter">
                            <button class="counter-btn dec" data-id="${s.id}"><i data-lucide="minus"></i></button>
                            <span>${s.watched} / ${s.total}</span>
                            <button class="counter-btn inc" data-id="${s.id}"><i data-lucide="plus"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        if (typeof lucide !== 'undefined') lucide.createIcons();

        document.querySelectorAll('.series-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.closest('.counter-btn') || e.target.closest('.delete-serie')) return;
                const url = card.dataset.url;
                if(url) window.open(url, '_blank', 'noopener noreferrer');
            });
        });

        document.querySelectorAll('.counter-btn.inc').forEach(btn => {
            btn.removeEventListener('click', incHandler);
            btn.addEventListener('click', incHandler);
        });
        document.querySelectorAll('.counter-btn.dec').forEach(btn => {
            btn.removeEventListener('click', decHandler);
            btn.addEventListener('click', decHandler);
        });
        document.querySelectorAll('.delete-serie').forEach(btn => {
            btn.removeEventListener('click', deleteHandler);
            btn.addEventListener('click', deleteHandler);
        });
    }

    function incHandler(e) {
        e.stopPropagation();
        const id = parseInt(e.currentTarget.dataset.id);
        incrementWatched(id);
    }
    function decHandler(e) {
        e.stopPropagation();
        const id = parseInt(e.currentTarget.dataset.id);
        decrementWatched(id);
    }
    function deleteHandler(e) {
        e.stopPropagation();
        const id = parseInt(e.currentTarget.dataset.id);
        deleteSerie(id);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadSeries();
        const toggleBtn = document.getElementById('toggleFormBtn');
        const form = document.getElementById('seriesForm');
        const icon = document.getElementById('toggleIcon');
        toggleBtn.addEventListener('click', () => {
            form.classList.toggle('open');
            icon.setAttribute('data-lucide', form.classList.contains('open') ? 'chevron-up' : 'chevron-down');
            if(typeof lucide !== 'undefined') lucide.createIcons();
        });
        document.getElementById('addSerieBtn').addEventListener('click', addSerie);
        document.getElementById('resetAllBtn').addEventListener('click', resetAllProgress);
    });
</script>
</body>
</html>
