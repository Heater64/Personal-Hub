<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario</title>
    <meta name="description" content="Calendario de sorpresas virtual">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="Gemini_Generated_Image_6wkfln6wk.png">
    <style>
        /* ========== ESTILOS DEL CALENDARIO ========== */
        .calendar-grid {
            display: grid;
            gap: var(--space-sm);
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        }
        .day-card {
            min-height: 120px;
            padding: var(--space-md);
            border-radius: var(--radius-lg);
            border: var(--border-subtle);
            background: rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform var(--dur-fast), border-color var(--dur-fast);
        }
        .day-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-border);
        }
        .day-card.opened {
            background: rgba(198, 90, 58, 0.08);
            border-color: var(--accent-coral);
        }
        .day-number {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
        }
        .surprise-box {
            margin-top: var(--space-lg);
            padding: var(--space-lg);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(198, 90, 58, 0.25);
            background: rgba(198, 90, 58, 0.08);
            display: none;
        }
        .surprise-box.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="page">
    <!-- ========== HEADER ========== -->
    <header class="header glass">
        <div class="header-top">
            <div class="brand">
                <h1>Calendario<i data-lucide="calendar-days" style="width:1.2rem; margin-left: 4px;"></i></h1>
                <p>Casillas con mini sorpresas para abrir cuando quieras</p>
            </div>
        </div>
        <nav class="nav-main" aria-label="Navegación principal">
            <button class="nav-btn" onclick="window.location.href='index.html'"><i data-lucide="home"></i> Inicio</button>
            <button class="nav-btn" onclick="window.location.href='canciones.html'"><i data-lucide="music"></i> Canciones</button>
            <button class="nav-btn" onclick="window.location.href='rincon.html'"><i data-lucide="heart"></i> TuRincónFav</button>
            <button class="nav-btn" onclick="window.location.href='planner.html'"><i data-lucide="gift"></i> Regalos</button>
            <button class="nav-btn" onclick="window.location.href='ThoseYourEyes.html'"><i data-lucide="eye"></i> Those Eyes</button>
            <button class="nav-btn" onclick="window.location.href='series.html'"><i data-lucide="tv"></i> Series</button>
            <button class="nav-btn" onclick="window.location.href='razones.html'"><i data-lucide="heart"></i> Razones</button>
            <button class="nav-btn" onclick="window.location.href='openwhen.html'"><i data-lucide="mail"></i> Open When</button>
            <button class="nav-btn active"><i data-lucide="calendar-days"></i> Calendario</button>
            <button class="nav-btn" onclick="window.location.href='maldia.html'"><i data-lucide="sun-medium"></i> Mal dia</button>
        </nav>
    </header>

    <!-- ========== SECCIÓN PRINCIPAL ========== -->
    <section class="page-section">
        <button class="back-btn" onclick="window.location.href='index.html'" style="margin-bottom:20px;">
            <i data-lucide="arrow-left"></i> Volver al Hub
        </button>

        <div class="section-card">
            <h2><i data-lucide="gift"></i> Calendario de sorpresas</h2>
            <p style="margin-bottom:var(--space-lg);">Abre una casilla, descubre una sorpresa y queda marcada como ya abierta en este navegador.</p>
            <div id="calendarGrid" class="calendar-grid"></div>
            <div id="surpriseBox" class="surprise-box">
                <small style="display:block; margin-bottom:8px; color:var(--umbra-ash); text-transform:uppercase; letter-spacing:0.1em;">sorpresa abierta</small>
                <h3 id="surpriseTitle">Dia 1</h3>
                <p id="surpriseText"></p>
            </div>
        </div>
    </section>
</div>

<script>
    // ========== DATOS (rellenar con tus sorpresas) ==========
    const surprises = [
        "", "", "", "", "", "", "", "", "", "",
        "", "", "", "", "", "", "", "", "", "",
        "", "", "", "", "", "", "", "", "", ""
    ];

    const openedKey = 'calendarioSorpresasAbiertas';
    const opened = JSON.parse(localStorage.getItem(openedKey) || '[]');
    const grid = document.getElementById('calendarGrid');
    const surpriseBox = document.getElementById('surpriseBox');
    const surpriseTitle = document.getElementById('surpriseTitle');
    const surpriseText = document.getElementById('surpriseText');

    // ========== RENDERIZAR CALENDARIO ==========
    function renderCalendar() {
        grid.innerHTML = surprises.map((text, index) => `
            <button class="day-card ${opened.includes(index) ? 'opened' : ''}" data-day="${index}">
                <span class="day-number">${index + 1}</span>
                <span class="muted">${opened.includes(index) ? 'abierto' : 'abrir sorpresa'}</span>
            </button>
        `).join('');
    }

    // ========== MANEJAR APERTURA ==========
    grid.addEventListener('click', (event) => {
        const card = event.target.closest('.day-card');
        if (!card) return;
        const day = Number(card.dataset.day);
        if (!opened.includes(day)) {
            opened.push(day);
            localStorage.setItem(openedKey, JSON.stringify(opened));
            renderCalendar();
        }
        surpriseTitle.textContent = `Dia ${day + 1}`;
        surpriseText.textContent = surprises[day];
        surpriseBox.classList.add('show');
    });

    renderCalendar();
</script>
</body>
</html>
