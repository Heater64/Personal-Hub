<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hub">
    <link rel="apple-touch-icon" href="assets/icon-180.png">
    <title>Iniciar sesión · Personal Hub</title>
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages/login.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/Gemini_Generated_Image_6wkfln6wk.png">
    <link rel="manifest" href="manifest.json">

<body>
    <!-- Decoraciones flotantes -->
    <div class="login-decor d1">?</div>
    <div class="login-decor d2">?</div>
    <div class="login-decor d3">?</div>
    <div class="login-decor d4">??</div>

    <main class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="brand-icon">
                        <i data-lucide="heart"></i>
                    </div>
                    <h1>Personal Hub</h1>
                    <p>Inicia sesión para continuar</p>
                </div>

                <div class="login-error" id="loginError">
                    <i data-lucide="alert-circle"></i>
                    <span id="loginErrorText">Error al iniciar sesión</span>
                </div>

                <form class="login-form" id="loginForm" autocomplete="on">
                    <div class="form-group">
                        <label for="loginEmail">Correo electrónico</label>
                        <input type="email" id="loginEmail" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Contraseńa</label>
                        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="btn-text">Iniciar sesión</span>
                        <span class="btn-loader"></span>
                    </button>
                </form>

                <p class="login-footer">Hecho con amor · Solo para nosotros ??</p>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/core.js"></script>
    <script>
    (function () {
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('loginEmail');
        const passwordInput = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const errorEl = document.getElementById('loginError');
        const errorText = document.getElementById('loginErrorText');

        function getRedirectParam() {
            const params = new URLSearchParams(window.location.search);
            return params.get('redirect') || 'index.html';
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorEl.classList.add('visible');
            emailInput.classList.add('error');
            passwordInput.classList.add('error');
        }

        function hideError() {
            errorEl.classList.remove('visible');
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        function redirectAfterLogin() {
            const redirect = getRedirectParam();
            window.location.href = redirect;
        }

        // Si ya hay sesión iniciada, redirigir
        function checkExistingSession() {
            if (typeof window.auth !== 'undefined' && window.auth) {
                const user = window.auth.currentUser;
                if (user) {
                    redirectAfterLogin();
                }
            }
        }

        // Login con email/contraseńa
        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Por favor completa todos los campos.');
                return;
            }

            setLoading(loginBtn, true);

            try {
                if (typeof loginWithEmail !== 'function') {
                    throw new Error('Firebase no está listo. Espera un momento y recarga.');
                }
                await loginWithEmail(email, password);
                redirectAfterLogin();
            } catch (err) {
                let msg = 'Error al iniciar sesión.';
                if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                    msg = 'Correo o contraseńa incorrectos.';
                } else if (err.code === 'auth/invalid-email') {
                    msg = 'El formato del correo no es válido.';
                } else if (err.code === 'auth/too-many-requests') {
                    msg = 'Demasiados intentos. Intenta más tarde.';
                } else if (err.message) {
                    msg = err.message;
                }
                showError(msg);
            } finally {
                setLoading(loginBtn, false);
            }
        });

        // Limpiar errores al escribir
        emailInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);

        // Verificar sesión existente
        function waitForAuthAndCheck() {
            if (typeof window.auth !== 'undefined' && window.auth) {
                window.auth.onAuthStateChanged(function (user) {
                    if (user) {
                        redirectAfterLogin();
                    }
                });
            } else {
                setTimeout(waitForAuthAndCheck, 200);
            }
        }
        waitForAuthAndCheck();
    })();
    </script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW error:', err); });
    }
    </script>

</html>
