<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('personalHub.theme');if(t){if(t==='auto'){t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}document.documentElement.setAttribute('data-theme',t)}})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hub">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dcsent4fs/image/upload/v1783958827/imagen_192x192_cqgclt.png">
    <title>Iniciar sesion · Personal Hub</title>
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pages/login.css">
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/Gemini_Generated_Image_6wkfln6wk.png">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div class="login-decor d1">?</div>
    <div class="login-decor d2">?</div>
    <div class="login-decor d3">?</div>
    <div class="login-decor d4">??</div>

    <main class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="brand-icon">
                        <i data-lucide="heart"></i>
                    </div>
                    <h1>Personal Hub</h1>
                    <p>Inicia sesion para continuar</p>
                </div>

                <div class="login-error" id="loginError">
                    <i data-lucide="alert-circle"></i>
                    <span id="loginErrorText">Error al iniciar sesion</span>
                </div>

                <form class="login-form" id="loginForm" autocomplete="on">
                    <div class="form-group">
                        <label for="loginEmail">Correo electronico</label>
                        <input type="email" id="loginEmail" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Contrasena</label>
                        <div class="password-wrapper">
                            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                            <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar contrasena" tabindex="-1">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>

                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Recuerdame</span>
                    </label>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="btn-text">Iniciar sesion</span>
                        <span class="btn-loader"></span>
                    </button>
                </form>

                <p class="login-footer">Hecho con amor · Solo para nosotros ??</p>
            </div>
        </div>
    </main>

    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script defer src="js/firebase-config.js"></script>
    <script defer src="services/auth/encryption.js"></script>
    <script defer src="services/auth/session-manager.js"></script>
    <script defer src="services/auth/auth.service.js"></script>
    <script defer src="services/auth/user.service.js"></script>
    <script defer src="js/core.js"></script>
    <script>
    (function () {
        var form = document.getElementById('loginForm');
        var emailInput = document.getElementById('loginEmail');
        var passwordInput = document.getElementById('loginPassword');
        var loginBtn = document.getElementById('loginBtn');
        var errorEl = document.getElementById('loginError');
        var errorText = document.getElementById('loginErrorText');
        var toggleBtn = document.getElementById('togglePassword');
        var rememberCheck = document.getElementById('rememberMe');

        function getRedirectParam() {
            var params = new URLSearchParams(window.location.search);
            return params.get('redirect') || 'index.html';
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorEl.classList.add('visible');
            emailInput.classList.add('error');
            passwordInput.classList.add('error');
        }

        function hideError() {
            errorEl.classList.remove('visible');
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');
        }

        function setLoading(btn, loading) {
            if (loading) { btn.classList.add('loading'); btn.disabled = true; }
            else { btn.classList.remove('loading'); btn.disabled = false; }
        }

        function redirectAfterLogin() {
            window.location.href = getRedirectParam();
        }

        // Toggle visibilidad de contrasena
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function() {
                var isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                var icon = toggleBtn.querySelector('i');
                if (icon) icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
                if (typeof lucide !== 'undefined') lucide.createIcons({ root: toggleBtn });
            });
        }

        // Cargar email recordado
        try {
            var savedEmail = localStorage.getItem('personalHub.rememberEmail');
            if (savedEmail) {
                emailInput.value = savedEmail;
                if (rememberCheck) rememberCheck.checked = true;
            }
        } catch(e) {}

        // Esperar a que los servicios estén listos
        async function waitForServices() {
            for (var i = 0; i < 50; i++) {
                if (window.db && window.AuthService && window.SessionManager) return true;
                await new Promise(function (r) { setTimeout(r, 200); });
            }
            return false;
        }

        // Login principal - prueba Custom Auth primero, luego Firebase Auth
        async function doLogin(username, password) {
            // 1. Intentar Custom Auth (AuthService busca en Firestore users collection)
            try {
                var session = await window.AuthService.login(username, password);
                console.log('✅ Custom Auth login exitoso:', session.username);
                return;
            } catch (err) {
                if (err.message === 'USER_NOT_FOUND' || err.message === 'WRONG_PASSWORD') {
                    // Intentar con Firebase Auth como fallback
                } else {
                    throw err;
                }
            }

            // 2. Fallback: Firebase Auth directo (signInWithEmailAndPassword)
            if (!window.auth || typeof window.auth.signInWithEmailAndPassword !== 'function') {
                throw new Error('Firebase no esta listo. Espera un momento y recarga.');
            }

            var result = await window.auth.signInWithEmailAndPassword(username, password);
            var user = result.user;

            // 3. Sincronizar con SessionManager (crear usuario en Firestore si no existe)
            await syncFirebaseUserToSession(user);
        }

        // Sincronizar un usuario de Firebase Auth al sistema SessionManager
        async function syncFirebaseUserToSession(firebaseUser) {
            if (!window.db) throw new Error('Firestore no disponible');

            var email = firebaseUser.email || '';
            var usersSnap = await window.db.collection('users')
                .where('username', '==', email)
                .limit(1)
                .get();

            var userData;
            if (usersSnap.empty) {
                // Crear nuevo usuario en Firestore
                var isAdmin = email === 'admin@personalhub.com';
                var name = firebaseUser.displayName || email.split('@')[0] || 'Usuario';
                var newUser = {
                    username: email,
                    name: name,
                    photo: firebaseUser.photoURL || '',
                    role: isAdmin ? 'admin' : 'user',
                    enabled: true,
                    password: '',
                    createdAt: new Date().toISOString(),
                    lastLogin: new Date().toISOString(),
                    preferences: { theme: 'dark', accessibility: {} },
                    profile: {}
                };
                var ref = await window.db.collection('users').add(newUser);
                userData = { id: ref.id, ...newUser };
                console.log('✅ Usuario creado en Firestore desde Firebase Auth:', email);
            } else {
                var doc = usersSnap.docs[0];
                userData = { id: doc.id, ...doc.data() };
                // Actualizar último acceso
                await window.db.collection('users').doc(doc.id).update({
                    lastLogin: new Date().toISOString()
                });
            }

            // Crear sesión en SessionManager
            window.SessionManager.createSession({
                id: userData.id,
                username: userData.username,
                name: userData.name || userData.username,
                photo: userData.photo || '',
                role: userData.role || 'user',
                enabled: userData.enabled !== false,
                preferences: userData.preferences || {},
                profile: userData.profile || {}
            });
        }

        // Login
        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError();

            var email = emailInput.value.trim();
            var password = passwordInput.value;

            if (!email || !password) {
                showError('Por favor completa todos los campos.');
                return;
            }

            setLoading(loginBtn, true);

            try {
                // Guardar preferencia "recuerdame"
                if (rememberCheck && rememberCheck.checked) {
                    try { localStorage.setItem('personalHub.rememberEmail', email); } catch(e) {}
                } else {
                    try { localStorage.removeItem('personalHub.rememberEmail'); } catch(e) {}
                }

                var ready = await waitForServices();
                if (!ready) throw new Error('Los servicios no estan listos. Recarga la pagina.');

                await doLogin(email, password);
                redirectAfterLogin();
            } catch (err) {
                var msg = 'Error al iniciar sesion.';
                if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                    msg = 'Correo o contrasena incorrectos.';
                } else if (err.code === 'auth/invalid-email') {
                    msg = 'El formato del correo no es valido.';
                } else if (err.code === 'auth/too-many-requests') {
                    msg = 'Demasiados intentos. Intenta mas tarde.';
                } else if (err.message === 'USER_NOT_FOUND' || err.message === 'WRONG_PASSWORD') {
                    msg = 'Usuario o contrasena incorrectos.';
                } else if (err.message) {
                    msg = err.message;
                }
                showError(msg);
            } finally {
                setLoading(loginBtn, false);
            }
        });

        emailInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);

        // Al cargar, comprobar si ya hay sesión (Firebase Auth o SessionManager)
        function waitForAuthAndCheck() {
            // Comprobar SessionManager primero
            if (typeof SessionManager !== 'undefined' && SessionManager.isLoggedIn()) {
                redirectAfterLogin();
                return;
            }
            // Luego Firebase Auth
            if (typeof window.auth !== 'undefined' && window.auth) {
                window.auth.onAuthStateChanged(function (user) {
                    if (user) redirectAfterLogin();
                });
            } else {
                setTimeout(waitForAuthAndCheck, 200);
            }
        }
        waitForAuthAndCheck();
    })();
    </script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW error:', err); });
    }
    </script>
</body>
</html>
