<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razones</title>
    <meta name="description" content="Razones por las que te quiero con sorpresa aleatoria">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="Gemini_Generated_Image_6wkfln6wk.png">
    <style>
        .reasons-hero {
            text-align: center;
            padding: var(--space-xl) var(--space-lg);
            background: linear-gradient(180deg, rgba(198, 90, 58, 0.08), rgba(255, 255, 255, 0.02));
            border-radius: var(--radius-xl);
            border: var(--border-subtle);
            margin-bottom: var(--space-lg);
        }
        .random-card {
            padding: var(--space-lg);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(198, 90, 58, 0.28);
            background: rgba(198, 90, 58, 0.08);
            margin-top: var(--space-md);
        }
        .random-card small {
            display: block;
            color: var(--umbra-ash);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: var(--space-sm);
        }
        .random-card h3 {
            margin-bottom: var(--space-sm);
        }
        .reasons-actions {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            margin-top: var(--space-md);
            justify-content: center;
        }
        .reason-list {
            display: grid;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
        }
        .reason-item {
            width: 100%;
            text-align: left;
            padding: var(--space-md);
            border-radius: var(--radius-lg);
            border: var(--border-subtle);
            background: rgba(255,255,255,0.02);
            transition: border-color var(--dur-fast), background var(--dur-fast);
        }
        .reason-item:hover,
        .reason-item.active {
            border-color: var(--accent-coral);
            background: rgba(198, 90, 58, 0.08);
        }
        .reason-top {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: 8px;
        }
        .reason-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(198, 90, 58, 0.15);
            color: var(--accent-coral);
            font-size: 0.85rem;
        }
        .reason-extra {
            display: none;
            color: var(--umbra-ash);
            margin-top: var(--space-sm);
            line-height: 1.8;
        }
        .reason-item.active .reason-extra {
            display: block;
        }
    </style>
</head>
<body>
<div class="page">
    <header class="header glass">
        <div class="header-top">
            <div class="brand">
                <h1>Razones<i data-lucide="heart" style="width:1.2rem; margin-left: 4px;"></i></h1>
                <p>Pequenas razones que explican algo enorme</p>
            </div>
        </div>
        <nav class="nav-main" aria-label="Navegación principal">
            <button class="nav-btn" onclick="window.location.href='index.html'"><i data-lucide="home"></i> Inicio</button>
            <button class="nav-btn" onclick="window.location.href='canciones.html'"><i data-lucide="music"></i> Canciones</button>
            <button class="nav-btn" onclick="window.location.href='rincon.html'"><i data-lucide="heart"></i> TuRincónFav</button>
            <button class="nav-btn" onclick="window.location.href='planner.html'"><i data-lucide="gift"></i> Regalos</button>
            <button class="nav-btn" onclick="window.location.href='ThoseYourEyes.html'"><i data-lucide="eye"></i> Those Eyes</button>
            <button class="nav-btn" onclick="window.location.href='series.html'"><i data-lucide="tv"></i> Series</button>
            <button class="nav-btn active"><i data-lucide="heart"></i> Razones</button>
            <button class="nav-btn" onclick="window.location.href='openwhen.html'"><i data-lucide="mail"></i> Open When</button>
            <button class="nav-btn" onclick="window.location.href='calendario.html'"><i data-lucide="calendar-days"></i> Calendario</button>
            <button class="nav-btn" onclick="window.location.href='maldia.html'"><i data-lucide="sun-medium"></i> Mal dia</button>
        </nav>
    </header>

    <section class="page-section">
        <button class="back-btn" onclick="window.location.href='index.html'" style="margin-bottom:20px;">
            <i data-lucide="arrow-left"></i> Volver al Hub</button>

        <div class="reasons-hero section-card">
            <p class="eyebrow" style="color:var(--accent-coral); margin-bottom:var(--space-sm);">lista interactiva</p>
            <h2>Razones por las que te quiero</h2>
            <p style="max-width:620px;margin:0 auto;color:var(--umbra-ash);">No es una lista completa pero puedes llegar a hacerte una idea. Pulsa el bot&oacute;n para dejar que aparezca una distinta.</p>
            <div class="reasons-actions">
                <button class="nav-btn" id="randomReasonBtn" style="border-color:var(--accent-coral); color:var(--accent-coral);">
                    <i data-lucide="shuffle"></i> Nueva razon aleatoria
                </button>
            </div>
            <div class="random-card" id="randomReasonCard">
                <small>razon destacada</small>
                <h3 id="randomReasonTitle">Cargando...</h3>
                <p id="randomReasonText"></p>
            </div>
        </div>

        <div class="section-card">
            <h3><i data-lucide="list-ordered"></i> Lista</h3>
            <div id="reasonsList" class="reason-list"></div>
        </div>
    </section>
</div>

<script>
    if (typeof lucide !== 'undefined') lucide.createIcons();

    const reasons = [
        { short: "", long: "" },
        { short: "", long: "" },
        { short: "", long: "" },
        { short: "", long: "" },
        { short: "", long: "" },
        { short: "", long: "" },
        { short: "", long: "" },
        { short: "", long: "" },
        { short: "", long: "" },
        { short: "", long: "" }
    ];

    const randomTitle = document.getElementById('randomReasonTitle');
    const randomText = document.getElementById('randomReasonText');
    const list = document.getElementById('reasonsList');

    function paintRandomReason() {
        const item = reasons[Math.floor(Math.random() * reasons.length)];
        randomTitle.textContent = item.short;
        randomText.textContent = item.long;
    }

    function renderReasons() {
        list.innerHTML = reasons.map((item, index) => `
            <button class="reason-item" data-index="${index}">
                <div class="reason-top">
                    <span class="reason-number">${index + 1}</span>
                    <strong>${item.short}</strong>
                </div>
                <div class="reason-extra">${item.long}</div>
            </button>
        `).join('');
    }

    document.getElementById('randomReasonBtn').addEventListener('click', paintRandomReason);
    list.addEventListener('click', (event) => {
        const button = event.target.closest('.reason-item');
        if (!button) return;
        document.querySelectorAll('.reason-item').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
    });

    renderReasons();
    paintRandomReason();
</script>
</body>
</html>
