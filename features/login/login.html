<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('personalHub.theme');if(t){if(t==='auto'){t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}document.documentElement.setAttribute('data-theme',t)}})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hub">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dcsent4fs/image/upload/v1783958827/imagen_192x192_cqgclt.png">
    <title>Iniciar sesion · Personal Hub</title>
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="login.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="../../assets/images/Gemini_Generated_Image_6wkfln6wk.png">
    <link rel="manifest" href="../../manifest.json">
</head>

<body>
    <div class="login-decor d1">?</div>
    <div class="login-decor d2">?</div>
    <div class="login-decor d3">?</div>
    <div class="login-decor d4">??</div>

    <main class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="brand-icon">
                        <i data-lucide="heart"></i>
                    </div>
                    <h1>Personal Hub</h1>
                    <p>Inicia sesion para continuar</p>
                </div>

                <div class="login-error" id="loginError">
                    <i data-lucide="alert-circle"></i>
                    <span id="loginErrorText">Error al iniciar sesion</span>
                </div>

                <form class="login-form" id="loginForm" autocomplete="on">
                    <div class="form-group">
                        <label for="loginUsername">Usuario</label>
                        <input type="text" id="loginUsername" class="form-input" placeholder="Tu usuario" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Contrasena</label>
                        <input type="password" id="loginPassword" class="form-input" placeholder="********" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="btn-text">Entrar</span>
                        <span class="btn-loader"></span>
                    </button>
                </form>

                <p class="login-footer">Hecho con amor · Solo para nosotros ??</p>
            </div>
        </div>
    </main>
<nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="Navegación principal"></nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../../services/firebase/firebase-config.js"></script>
    <script src="../../services/auth/encryption.js"></script>
    <script src="../../services/auth/session-manager.js"></script>
    <script src="../../services/auth/auth.service.js"></script>
    <script src="../../shared/utils/core.js"></script>
    <script src="login.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../../sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW error:', err); });
    }
    </script>
</body>
</html>
