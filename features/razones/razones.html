<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="theme-color" content="#0F0F10">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="razones.css">

    <link rel="icon" type="image/png" href="../../assets/images/Gemini_Generated_Image_6wkfln6wk.png">

<body data-sidebar-root="../.." data-sidebar-page="razones">

    <!-- Sidebar -->
    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <section class="page-section">
                <!-- Botón volver -->
                <button class="back-btn" onclick="window.location.href='../../index.html'">
                    <i data-lucide="arrow-left"></i> Volver al Hub
                </button>

                <div class="razones-header">
                    <h1>Razones por las que te quiero</h1>
                    <p>Un pequeño recordatorio de todo lo que te hace especial para mí.</p>
                </div>

                <!-- Grid de razones -->
                <div class="razones-grid" id="razonesGrid"></div>
            </section>
        </div>
    </main>
<nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="Navegación principal"></nav>

    <!-- Botón flotante de razón aleatoria -->
    <button class="random-trigger" id="randomBtn" title="Razón aleatoria">
        <i data-lucide="shuffle"></i>
    </button>

    <!-- Modal para razón aleatoria -->
    <div class="modal" id="randomModal">
        <div class="modal-content glass">
            <button class="close-modal" id="closeModal">?</button>
            <div class="modal-icon">
                <i data-lucide="heart"></i>
            </div>
            <h3>? Una razón especial ?</h3>
            <p id="randomText" class="modal-text"></p>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-message" id="toast" style="display: none;"></div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="../../services/firebase/firebase-config.js"></script>

    <script src="../../shared/utils/core.js"></script>
    <script src="../../shared/utils/authGuard.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="razones.js"></script>
    <script>
if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../../sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW error:', err); });
