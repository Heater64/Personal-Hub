<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Calendario · Experiencias</title>
    <meta name="description" content="Calendario de sorpresas interactivas">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/calendario.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
    <script src="../js/sentimientos-nav.js"></script>
</head>
<body data-sidebar-root=".." data-sidebar-page="calendario">

    <!-- Sidebar -->
    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <section class="page-section calendario-page">
                
                <button class="back-btn" onclick="window.location.href='../index.html'" style="margin-bottom:20px;">
                    <i data-lucide="arrow-left"></i> Volver al Hub
                </button>

                <div class="calendario-intro">
                    <h2>Calendario de experiencias</h2>
                    <p>31 días, 31 sorpresas distintas. Toca, escucha, juega y siente.</p>
                    <p class="calendario-hint">✨ <em>Doble clic en el título para administración</em> ✨</p>
                </div>

                <div id="calendarGrid" class="calendar-grid"></div>

            </section>
        </div>
    </main>

    <!-- Modal flotante para sorpresas -->
    <div id="surpriseModal" class="surprise-modal">
        <div class="surprise-modal-content">
            <button class="surprise-modal-close" id="closeModalBtn">✕</button>
            <h3 id="modalSurpriseTitle" style="margin-bottom: 20px;">Día 1</h3>
            <div id="modalSurpriseContent"></div>
            <button id="modalCloseFooterBtn" style="margin-top: 20px; padding: 10px 20px; background: #c65a3a; border: none; border-radius: 40px; color: white; cursor: pointer; width: 100%;">Cerrar</button>
        </div>
    </div>

    <!-- Lightbox para imágenes -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <div class="lightbox-content" id="lightboxContent"></div>
    </div>

    <!-- Scripts -->
    <script src="../js/core.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/progress.js"></script>
    <script src="../js/access-control.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/pages/calendario.js"></script>
</body>
</html>
