<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Calendario · Experiencias</title>
    <meta name="description" content="Calendario de sorpresas interactivas: carta flotante, cassette, polaroids, cine y mucho más">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/calendario.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Courier+New&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
</head>
<body data-sidebar-root=".." data-sidebar-page="calendario">
    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <section class="page-section calendario-page">
                <div class="calendario-intro">
                    <h2>Calendario de experiencias</h2>
                    <p>24 días, 24 sorpresas distintas. Toca, escucha, juega y siente.</p>
                </div>

                <div class="calendario-panel">
                    <div id="calendarGrid" class="calendar-grid"></div>

                    <div id="surpriseBox" class="surprise-box">
                        <button class="surprise-close-btn" id="closeSurpriseBtn" type="button" aria-label="Cerrar sorpresa" style="position: absolute; top: 16px; right: 20px; background: none; border: none; color: var(--umbra-ash); cursor: pointer; z-index: 15;">
                            <i data-lucide="x"></i>
                        </button>
                        <div class="surprise-eyebrow">✨ sorpresa especial ✨</div>
                        <h3 id="surpriseTitle">Día 1</h3>
                        <div id="surpriseDynamicContent"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <div class="lightbox-content" id="lightboxContent"></div>
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/progress.js"></script>
    <script src="../js/access-control.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/pages/calendario.js"></script>
</body>
</html>
