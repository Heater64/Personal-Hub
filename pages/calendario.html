<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Calendario · Experiencias</title>
    <meta name="description" content="Calendario de sorpresas interactivas">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/calendario.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
    <script src="../js/sentimientos-nav.js"></script>
    <link rel="manifest" href="../manifest.json">

<body data-sidebar-root=".." data-sidebar-page="calendario">

    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <section class="page-section calendario-page">

                <button class="back-btn" onclick="window.location.href='../index.html'" style="margin-bottom:20px;">
                    <i data-lucide="arrow-left"></i> Volver al Hub
                </button>

                <div class="calendario-intro">
                    <h2>Calendario de experiencias</h2>
                    <p>31 días, 31 sorpresas distintas. Toca, escucha, juega y siente.</p>
                </div>

                <div id="calendarGrid" class="calendar-grid"></div>

            </section>
        </div>
    </main>

    <!-- Capa de experiencias (nueva arquitectura) -->
    <div id="experience-layer" class="experience-layer" aria-hidden="true">
        <div id="experience-container" class="experience-container"></div>
    </div>

    <!-- Modal legacy (coexistencia) -->
    <div id="surpriseModal" class="surprise-modal" aria-hidden="true">
        <div class="surprise-modal-content">
            <button class="surprise-modal-close" id="closeModalBtn" type="button">✕</button>
            <h3 id="modalSurpriseTitle" style="margin-bottom: 20px;">Día 1</h3>
            <div id="modalSurpriseContent"></div>
            <button id="modalCloseFooterBtn" type="button" style="margin-top: 20px; padding: 10px 20px; background: #c65a3a; border: none; border-radius: 40px; color: white; cursor: pointer; width: 100%;">Cerrar</button>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" type="button" id="calLightboxClose">✕</button>
        <div class="lightbox-content" id="lightboxContent"></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/core/profile.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/core/authGuard.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
        document.getElementById('calLightboxClose')?.addEventListener('click', closeLightbox);
        window.USE_GIFT_PLATFORM = true;
    </script>
    <script type="module" src="../js/pages/calendario.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW error:', err); });
    }
    </script>

</html>
