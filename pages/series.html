<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series · Seguimiento</title>
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/series.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
</head>
<body data-sidebar-root=".." data-sidebar-page="series">
<button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
    <i data-lucide="menu"></i>
</button>
<div class="sidebar-overlay" data-sidebar-overlay></div>
<aside class="sidebar" data-sidebar></aside>

<main class="page-shell">
<div class="page">
    <section class="page-section">
        <div class="series-intro section-card">
            <p class="eyebrow">seguimiento en lista</p>
            <h2>Mis series</h2>
            <p>Una vista más limpia para llevar el progreso, abrir enlaces rápido y seguir lo que vas viendo sin perder el estilo Umbra.</p>
        </div>

        <div class="series-toolbar">
            <div class="series-form-container">
                <button class="toggle-form-btn" id="toggleFormBtn" type="button">
                    <span>Añadir serie</span>
                    <i data-lucide="chevron-down" id="toggleIcon"></i>
                </button>
                <div id="seriesForm" class="series-form">
                    <div class="form-group">
                        <label for="serieName">Nombre de la serie</label>
                        <input type="text" id="serieName" class="big-input" placeholder="Ej: Gravity Falls">
                    </div>
                    <div class="form-group">
                        <label for="serieUrl">Enlace donde la ves</label>
                        <input type="url" id="serieUrl" class="big-input" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label for="serieTotal">Total de capítulos</label>
                        <input type="number" id="serieTotal" class="big-input" placeholder="24" min="1">
                    </div>
                    <div class="form-group">
                        <label for="serieCover">URL de la portada</label>
                        <input type="url" id="serieCover" class="big-input" placeholder="https://imagen.jpg">
                    </div>
                    <button id="addSerieBtn" class="btn-primary" type="button">Guardar serie</button>
                </div>
            </div>

            <div class="series-actions">
                <button id="resetAllBtn" class="reset-all-btn" type="button">
                    <i data-lucide="rotate-ccw"></i> Reiniciar todo
                </button>
            </div>
        </div>

        <div id="seriesList" class="series-grid"></div>
    </section>
</div>
</main>

    <script src="../js/core.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/pages/series.js"></script>
</body>
</html>
