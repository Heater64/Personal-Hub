<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series y Películas</title>
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/series.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
</head>
<body data-sidebar-root=".." data-sidebar-page="series">
<button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
    <i data-lucide="menu"></i>
</button>
<div class="sidebar-overlay" data-sidebar-overlay></div>
<aside class="sidebar" data-sidebar></aside>

<main class="page-shell">
    <div class="page">
        <section class="page-section">
            <div class="series-page-header">
                <h2 class="series-page-title">Lista de películas o series que quiero ver contigo.</h2>
                <p>Edita películas y series sin miedo. Compartimos la misma lista. 🤍👑</p>
                <div class="series-header-actions">
                    <button class="add-series-btn" id="addSeriesBtn" type="button">
                        <span>Añadir</span>
                        <i data-lucide="chevron-down" class="chevron-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Formulario desplegable -->
            <div id="addFormDropdown" class="add-form-dropdown">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="serieName">Nombre</label>
                        <input type="text" id="serieName" class="big-input" placeholder="Ej: Breaking Bad">
                    </div>
                    <div class="form-group">
                        <label for="serieUrl">Enlace</label>
                        <input type="url" id="serieUrl" class="big-input" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label for="serieTotal">Total episodios</label>
                        <input type="number" id="serieTotal" class="big-input" placeholder="24" min="1">
                    </div>
                    <div class="form-group">
                        <label for="serieCover">Portada (URL)</label>
                        <input type="url" id="serieCover" class="big-input" placeholder="https://imagen.jpg">
                    </div>
                    <div class="form-group">
                        <label for="serieTipo">Tipo</label>
                        <select id="serieTipo" class="big-input">
                            <option value="serie">Serie</option>
                            <option value="pelicula">Película</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="serieEstado">Estado</label>
                        <select id="serieEstado" class="big-input">
                            <option value="viendo">Viendo</option>
                            <option value="quiero_ver">Quiero ver</option>
                            <option value="visto">Visto</option>
                        </select>
                    </div>
                </div>
                <button id="addSerieBtn" class="btn-primary" type="button">Guardar</button>
            </div>

            <div class="main-tabs series-main-tabs">
                <button class="main-tab active" data-type="serie" type="button">
                    <i data-lucide="tv"></i>
                    <span>Series</span>
                </button>
                <button class="main-tab" data-type="pelicula" type="button">
                    <i data-lucide="film"></i>
                    <span>Peliculas</span>
                </button>
            </div>

            <div class="sub-nav series-filter-nav">
                <button class="sub-tab active" data-estado="viendo" type="button">
                    <i data-lucide="eye"></i>
                    <span>Viendo</span>
                </button>
                <button class="sub-tab" data-estado="quiero_ver" type="button">
                    <i data-lucide="clock-3"></i>
                    <span>Quiero ver</span>
                </button>
                <button class="sub-tab" data-estado="visto" type="button">
                    <i data-lucide="check-circle-2"></i>
                    <span>Visto</span>
                </button>
            </div>

            <!-- Grid de tarjetas -->
            <div id="seriesList" class="series-grid-new"></div>
            <div id="seriesPagination" class="series-pagination"></div>
        </section>
    </div>
</main>

<!-- Scripts en orden: core, sidebar, data, después series -->
<script src="../js/core.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/data.js"></script>
<script src="../js/progress.js"></script>
<script src="../js/access-control.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/pages/series.js"></script>
</body>
</html>
