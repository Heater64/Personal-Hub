<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hub">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dcsent4fs/image/upload/v1783958827/imagen_192x192_cqgclt.png">
    <title>Razones · por las que te quiero</title>
    <meta name="description" content="Razones por las que te quiero — UI Umbra">
    <meta name="theme-color" content="#0F0F10">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/razones.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
    <script src="../js/sentimientos-nav.js"></script>
    <link rel="manifest" href="../manifest.json">
</head>

<body data-sidebar-root=".." data-sidebar-page="razones" data-bottom-nav="razones">

    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <section class="page-section">
                <button class="back-btn" onclick="window.location.href='../index.html'" style="margin-bottom:20px;">
                    <i data-lucide="arrow-left"></i> Volver al Hub
                </button>

                <div class="razones-header">
                    <h1>Razones por las que te quiero</h1>
                    <p>Un pequeño recordatorio de todo lo que te hace especial para mí.</p>
                </div>

                <div class="razones-grid" id="razonesGrid"></div>
            </section>
        </div>
    </main>

    <button class="random-trigger" id="randomBtn" title="Razón aleatoria">
        <i data-lucide="shuffle"></i>
    </button>

    <div class="modal" id="randomModal">
        <div class="modal-content glass">
            <button class="close-modal" id="closeModal">✕</button>
            <div class="modal-icon">
                <i data-lucide="heart"></i>
            </div>
            <h3>✨ Una razón especial ✨</h3>
            <p id="randomText" class="modal-text"></p>
        </div>
    </div>

    <div class="toast-message" id="toast" style="display: none;"></div>

    <!-- ===== BOTTOM NAV (móvil) ===== -->
    <nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="Navegación principal"></nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/core/profile.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/core/authGuard.js"></script>
    <script src="../js/sidebar.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof renderBottomNav === 'function') setTimeout(renderBottomNav, 100);
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
    window.addEventListener('pageshow', function() {
        if (typeof renderBottomNav === 'function') setTimeout(renderBottomNav, 100);
    });
    </script>
    <script src="../js/pages/razones.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW error:', err); });
    }
    </script>

</body>
</html>
