<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razones</title>
    <meta name="description" content="Razones por las que te quiero con sorpresa aleatoria">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/razones.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
</head>
<body data-sidebar-root=".." data-sidebar-page="razones">
<button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
    <i data-lucide="menu"></i>
</button>
<div class="sidebar-overlay" data-sidebar-overlay></div>
<aside class="sidebar" data-sidebar></aside>

<main class="page-shell">
<div class="page">
    <section class="page-section reasons-page">
        <div class="reasons-intro">
            <h2>Razones por las que te quiero</h2>
            <p>Pequeñas razones que hacen que tú seas tú, y que a mí me encantes.</p>
        </div>

        <div class="random-reason-card" id="randomReasonCard">
            <div class="random-reason-icon">
                <i data-lucide="heart"></i>
            </div>
            <p class="random-reason-quote" id="randomReasonTitle">Cargando...</p>
            <p class="random-reason-support" id="randomReasonText"></p>
        </div>

        <div class="reasons-actions">
            <button class="random-reason-btn" id="randomReasonBtn" type="button">
                <i data-lucide="shuffle"></i>
                <span>Nueva razón aleatoria</span>
            </button>
        </div>

        <div class="reasons-list-wrap">
            <div class="reason-list" id="reasonsList"></div>
        </div>
    </section>
</div>
</main>
    <script src="../js/core.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/pages/razones.js"></script>
</body>
</html>
