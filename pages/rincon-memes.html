<body data-sidebar-root=".." data-sidebar-page="rincon" data-bottom-nav="rincon">

    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <section id="rincon" class="page-section rincon-sub-page">

                <button class="back-btn" onclick="window.location.href='rincon.html'">
                    <i data-lucide="arrow-left"></i> Volver a TuRincónFav
                </button>

                <div class="rincon-section">
                    <div class="rincon-section-header">
                        <span class="rincon-section-icon"><i data-lucide="smile"></i></span>
                        <div>
                            <h3 class="rincon-section-title">Memes</h3>
                            <p class="rincon-section-subtitle">Primero elige una carpeta, luego los memes</p>
                        </div>
                    </div>
                    <div class="rincon-section-body">
                        <div id="memesFoldersNav" class="rincon-folder-nav"></div>
                        <div id="memesGrid"></div>
                    </div>
                </div>

                <div id="reelLightbox" class="lightbox-reel" aria-hidden="true">
                    <div class="lightbox-reel-backdrop"></div>
                    <div class="lightbox-reel-shell">
                        <button id="reelCloseBtn" class="reel-ui-btn reel-close-btn" type="button" aria-label="Cerrar visor">
                            <i data-lucide="x"></i>
                        </button>
                        <button id="reelPrevBtn" class="reel-ui-btn reel-nav-btn reel-prev-btn" type="button" aria-label="Anterior">
                            <i data-lucide="chevron-left"></i>
                        </button>
                        <div class="lightbox-reel-stage">
                            <div id="reelLightboxContent" class="reel-lightbox-content"></div>
                        </div>
                        <button id="reelNextBtn" class="reel-ui-btn reel-nav-btn reel-next-btn" type="button" aria-label="Siguiente">
                            <i data-lucide="chevron-right"></i>
                        </button>
                        <div class="reel-meta">
                            <div id="reelLightboxCaption" class="reel-lightbox-caption"></div>
                            <div id="reelLightboxCounter" class="reel-lightbox-counter"></div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" id="lightboxCloseBtn" type="button">✕</button>
        <div class="lightbox-content" id="lightboxContent"></div>
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="Navegación principal"></nav>

    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

    <script defer src="../js/core.js"></script>

    <script defer src="../js/sidebar.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof renderBottomNav === 'function') setTimeout(renderBottomNav, 100);
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
    window.addEventListener('pageshow', function() {
        if (typeof renderBottomNav === 'function') setTimeout(renderBottomNav, 100);
    });
    </script>
