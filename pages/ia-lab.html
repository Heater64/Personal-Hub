<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Lab · Asistente Inteligente</title>
    <meta name="description" content="Asistente de IA con Groq y Mistral">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/ia-lab.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
</head>
<body data-sidebar-root=".." data-sidebar-page="ialab">

<button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
    <i data-lucide="menu"></i>
</button>
<div class="sidebar-overlay" data-sidebar-overlay></div>
<aside class="sidebar" data-sidebar></aside>

<main class="page-shell">
    <div class="ia-lab-container">
        
        <div class="ia-header">
            <h1><i data-lucide="message-circle"></i>IAs para mi Princesa</h1>
            <p>Elige tu modelo favorito y empieza a conversar</p>
        </div>

        <div class="model-selector-card">
            <div class="model-buttons">
                <button class="model-btn active" data-model="groq">
                    <i data-lucide="zap"></i> Groq ⚡
                    <span class="model-badge">Rápido</span>
                </button>
                <button class="model-btn" data-model="mistral">
                    <i data-lucide="cloud"></i> Mistral 🚀
                    <span class="model-badge">Preciso</span>
                </button>
            </div>
            
            <div class="api-status" id="apiStatus">
                <span id="statusIndicator" class="status-dot"></span>
                <span id="statusText">Selecciona un modelo</span>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            
            <div class="quick-suggestions" id="quickSuggestions">
                <button class="suggestion" data-prompt="¿Qué puedes hacer?">✨ ¿Qué puedes hacer?</button>
                <button class="suggestion" data-prompt="Dame un consejo para mi día">💫 Un consejo para hoy</button>
                <button class="suggestion" data-prompt="Cuéntame algo interesante">📚 Algo interesante</button>
                <button class="suggestion" data-prompt="Hazme una pregunta divertida">🎭 Pregunta divertida</button>
            </div>
            
            <div class="chat-input-area">
                <textarea id="chatInput" class="chat-input" placeholder="Escribe tu mensaje..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <i data-lucide="send"></i>
                </button>
                <button id="clearBtn" class="clear-btn" title="Limpiar conversación">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
            
            <div class="api-config">
                <button id="configApiBtn" class="config-btn">
                    <i data-lucide="key"></i> Configurar API Keys
                </button>
            </div>
        </div>

    </div>
</main>

<div id="apiModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i data-lucide="key"></i> Configurar API Keys</h3>
            <button class="modal-close" id="closeModalBtn">✕</button>
        </div>
        <div class="modal-body">
            <p>Introduce tus claves (se guardan en tu navegador)</p>
            
            <div class="api-input-group">
                <label><i data-lucide="zap"></i> Groq API Key</label>
                <input type="password" id="groqKey" placeholder="gsk_xxxxxxxxxxxx" class="api-input">
         <a href="https://console.groq.com" target="_blank"></a>
            </div>
            
            <div class="api-input-group">
                <label><i data-lucide="cloud"></i> Mistral API Key</label>
                <input type="password" id="mistralKey" placeholder="xxxxxxxxxxxx" class="api-input">
                <a href="https://console.mistral.ai" target="_blank">
            </div>
        </div>
        <div class="modal-footer">
            <button id="saveApiBtn" class="btn-primary">Guardar</button>
            <button id="cancelApiBtn" class="btn-secondary">Cancelar</button>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<script src="../js/core.js"></script>
<script src="../js/sidebar.js"></script>
    <script src="../js/pages/ia-lab.js"></script>
</body>
</html>
