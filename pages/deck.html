<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudiar · Deck</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/decks.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-sidebar-root=".." data-sidebar-page="decks">

<button class="sidebar-toggle" type="button" data-sidebar-toggle>
    <i data-lucide="menu"></i>
</button>
<div class="sidebar-overlay" data-sidebar-overlay></div>
<aside class="sidebar" data-sidebar></aside>

<main class="page-shell">
    <div class="study-container">
        <div class="study-header">
            <button id="backBtn" class="back-btn">
                <i data-lucide="arrow-left"></i> Volver
            </button>
            <h2 id="deckTitle">Cargando...</h2>
            <div class="study-progress">
                <span id="cardCounter">0 / 0</span>
            </div>
        </div>
        
        <div class="flashcard" id="flashcard">
            <div class="flashcard-inner">
                <div class="flashcard-front">
                    <div class="card-question" id="questionText"></div>
                    <div class="card-hint">Toca para ver respuesta</div>
                </div>
                <div class="flashcard-back">
                    <div class="card-answer" id="answerText"></div>
                    <div class="card-actions">
                        <button id="correctBtn" class="study-btn correct">
                            <i data-lucide="check-circle"></i> Lo sabía
                        </button>
                        <button id="wrongBtn" class="study-btn wrong">
                            <i data-lucide="refresh-cw"></i> Repetir
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="study-navigation">
            <button id="prevBtn" class="nav-btn" disabled>
                <i data-lucide="chevron-left"></i> Anterior
            </button>
            <div class="progress-dots" id="progressDots"></div>
            <button id="nextBtn" class="nav-btn">
                Siguiente <i data-lucide="chevron-right"></i>
            </button>
        </div>
    </div>
</main>

<script src="../js/core.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/pages/study.js"></script>
</body>
</html>
