<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('personalHub.theme');if(t){if(t==='auto'){t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}document.documentElement.setAttribute('data-theme',t)}})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hub">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dcsent4fs/image/upload/v1783958827/imagen_192x192_cqgclt.png">
    <title>Open When · Cartas para momentos</title>
    <meta name="description" content="Cartas digitales para abrir cuando lo necesites">
    <meta name="theme-color" content="#0F0F10">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/openwhen.css">
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
    <script defer src="../js/sentimientos-nav.js"></script>
    <link rel="manifest" href="../manifest.json">
</head>

<body data-sidebar-root=".." data-sidebar-page="openwhen" data-bottom-nav="openwhen">

    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <button class="back-btn" onclick="window.location.href='/'">
                <i data-lucide="arrow-left"></i> Volver al Hub
            </button>

            <div class="openwhen-container">
                <div class="openwhen-header">
                    <h1>Open When</h1>
                    <p>Aquí añadiré cartitas para mi princesa jsjsj</p>
                </div>

                <div class="letters-grid" id="lettersGrid"></div>

                <div class="floating-ornament ornament-1">❤️</div>
                <div class="floating-ornament ornament-2">❤️</div>
                <div class="floating-ornament ornament-3">✦</div>
                <div class="floating-ornament ornament-4">✦</div>
            </div>
        </div>
    </main>

    <!-- ===== BOTTOM NAV (móvil) ===== -->
    <nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="Navegación principal"></nav>

    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script defer src="../js/firebase-config.js"></script>
    <script defer src="../js/core/profile.js"></script>
    <script defer src="../js/core.js"></script>
    <script defer src="../js/core/authGuard.js"></script>
    <script defer src="../js/sidebar.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof renderBottomNav === 'function') setTimeout(renderBottomNav, 100);
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
    window.addEventListener('pageshow', function() {
        if (typeof renderBottomNav === 'function') setTimeout(renderBottomNav, 100);
    });
    </script>
    <script defer src="../js/pages/openwhen.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW error:', err); });
    }
    </script>

</body>
</html>
