<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Decks · EstudIA</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/decks.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body data-sidebar-root=".." data-sidebar-page="decks">

<button class="sidebar-toggle" type="button" data-sidebar-toggle>
    <i data-lucide="menu"></i>
</button>
<div class="sidebar-overlay" data-sidebar-overlay></div>
<aside class="sidebar" data-sidebar></aside>

<main class="page-shell">
    <div class="decks-container">
        
        <!-- Header estilo Gizmo -->
        <div class="decks-header">
            <div class="header-left">
                <h1><i data-lucide="layers"></i> Mis Decks</h1>
                <p id="deckCount">0 decks</p>
            </div>
            <button id="createDeckBtn" class="btn-primary">
                <i data-lucide="plus"></i> Crear deck
            </button>
        </div>

        <!-- Modal para crear deck -->
        <div id="createModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i data-lucide="sparkles"></i> Crear nuevo deck</h2>
                    <button class="modal-close" id="closeModalBtn">✕</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Nombre del deck</label>
                        <input type="text" id="deckName" placeholder="Ej: Exámenes GM, Castellano T-5..." class="form-input">
                    </div>
                    
                    <div class="form-group">
                        <label>¿Cómo quieres crear las tarjetas?</label>
                        <div class="creation-methods">
                            <button class="method-btn" data-method="paste">
                                <i data-lucide="clipboard-paste"></i> Pegar texto
                            </button>
                            <button class="method-btn" data-method="youtube">
                                <i data-lucide="youtube"></i> Video de YouTube
                            </button>
                            <button class="method-btn" data-method="url">
                                <i data-lucide="link"></i> Enlace web
                            </button>
                            <button class="method-btn" data-method="manual">
                                <i data-lucide="edit-3"></i> Crear manual
                            </button>
                        </div>
                    </div>
                    
                    <div id="pasteSection" class="method-section">
                        <label>Pega tus apuntes o texto</label>
                        <textarea id="sourceText" class="form-textarea" placeholder="Pega aquí el contenido que quieres convertir en tarjetas..."></textarea>
                        <div class="provider-selector">
                            <label><i data-lucide="cpu"></i> Proveedor IA:</label>
                            <select id="providerSelect">
                                <option value="groq">Groq ⚡ (recomendado)</option>
                                <option value="gemini">Google Gemini 🌟</option>
                                <option value="mistral">Mistral AI 🚀</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="manualSection" class="method-section" style="display: none;">
                        <div id="manualCardsList">
                            <div class="manual-card">
                                <input type="text" placeholder="Pregunta..." class="manual-question">
                                <input type="text" placeholder="Respuesta..." class="manual-answer">
                                <button class="remove-card-btn">✕</button>
                            </div>
                        </div>
                        <button id="addManualCardBtn" class="btn-secondary">
                            <i data-lucide="plus"></i> Añadir tarjeta
                        </button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="cancelBtn" class="btn-secondary">Cancelar</button>
                    <button id="confirmCreateBtn" class="btn-primary">Generar deck</button>
                </div>
            </div>
        </div>

        <!-- Grid de decks -->
        <div class="decks-grid" id="decksGrid">
            <!-- Los decks se cargan dinámicamente -->
        </div>

    </div>
</main>

<script src="../js/core.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/pages/decks.js"></script>
</body>
</html>
