<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canciones</title>
    <meta name="description" content="Tus canciones favoritas con reproductor y letras completas">
    <meta name="theme-color" content="#0c0b0b">
        <link rel="stylesheet" href="../css/themes/theme-umbra.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/canciones.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
</head>
<body>
<div class="page">

    <!-- ========== HEADER ========== -->
    <header class="header glass">
        <div class="header-top">
            <div class="brand">
                <h1>Canciones<i data-lucide="music" style="width:1.2rem; margin-left: 4px;"></i></h1>
            </div>
        </div>
        <nav class="nav-main" aria-label="Navegación principal">
            <button class="nav-btn" onclick="window.location.href='../index.html'"><i data-lucide="home"></i> Inicio</button>
            <button class="nav-btn active"><i data-lucide="music"></i> Canciones</button>
            <button class="nav-btn" onclick="window.location.href='rincon.html'"><i data-lucide="heart"></i> TuRincónFav</button>
            <button class="nav-btn" onclick="window.location.href='planner.html'"><i data-lucide="gift"></i> Regalos</button>
            <button class="nav-btn" onclick="window.location.href='thoseeyes.html'"><i data-lucide="eye"></i> Those Eyes</button>
            <button class="nav-btn" onclick="window.location.href='series.html'"><i data-lucide="tv"></i> Series</button>
            <button class="nav-btn" onclick="window.location.href='razones.html'"><i data-lucide="heart"></i> Razones</button>
            <button class="nav-btn" onclick="window.location.href='openwhen.html'"><i data-lucide="mail"></i> Open When</button>
            <button class="nav-btn" onclick="window.location.href='calendario.html'"><i data-lucide="calendar-days"></i> Calendario</button>
            <button class="nav-btn" onclick="window.location.href='maldia.html'"><i data-lucide="sun-medium"></i> Mal dia</button>
        </nav>
    </header>

    <!-- ========== SECCIÓN REPRODUCTOR ========== -->
    <section id="canciones" class="page-section">
        <button class="back-btn" onclick="window.location.href='../index.html'" style="margin-bottom:20px;">
            <i data-lucide="arrow-left"></i> Volver al Hub
        </button>

        <div class="player-layout">
            <!-- Panel izquierdo: reproductor -->
            <div class="player-panel">
                <div style="font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent-coral);margin-bottom:4px;">Reproduciendo ahora</div>
                <div class="player-album">
                    <img id="currentCover" src="" alt="Portada del álbum">
                </div>
                <div class="player-title" id="currentTitle">Cargando…</div>
                <div class="player-subtitle" id="currentSubtitle"></div>

                <div class="player-controls">
                    <button class="player-btn" id="prevBtn" title="Anterior"><i data-lucide="skip-back"></i></button>
                    <button class="player-btn play" id="playBtn" title="Reproducir"><i data-lucide="play"></i></button>
                    <button class="player-btn" id="nextBtn" title="Siguiente"><i data-lucide="skip-forward"></i></button>
                </div>

                <div class="progress-bar">
                    <div class="progress-time">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <audio id="audioPlayer"></audio>
            </div>

            <div style="display:grid;gap:16px;">
                <!-- Panel de letras -->
                <div class="section-card lyrics-card">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
                        <i data-lucide="file-text"></i>
                        <h3 style="margin:0; flex:1;">Letra</h3>
                        <button class="icon-btn" id="toggleLyricsBtn" title="Ocultar/Mostrar letra">
                            <i data-lucide="eye"></i>
                        </button>
                        <button class="icon-btn" id="expandLyricsBtn" title="Ver letra en pantalla completa">
                            <i data-lucide="maximize-2"></i>
                        </button>
                    </div>
                    <div class="lyrics-panel" id="lyricsPanel"></div>
                </div>

                <!-- Lista de canciones -->
                <div class="section-card">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
                        <i data-lucide="list-music"></i>
                        <h3 style="margin:0;">Todas las canciones</h3>
                        <span style="margin-left:auto;font-size:0.75rem;font-family:'Inter', monospace;color:var(--umbra-ash);background:rgba(255,255,255,0.03);border:1px solid var(--border-subtle);padding:3px 10px;border-radius:var(--radius-pill);">14</span>
                    </div>
                    <div class="songs-grid" id="songsList"></div>
                </div>
            </div>
        </div>
    </section>
</div>

<!-- ========== LIGHTBOX PARA LETRAS EXPANDIDAS ========== -->
<div id="lyricsLightbox" class="lightbox lyrics-lightbox">
    <button class="lightbox-close" onclick="closeLyricsLightbox()">✕</button>
    <div class="lightbox-content lyrics-lightbox-content" id="lyricsLightboxContent">
        <div class="lyrics-expanded" id="expandedLyricsText"></div>
    </div>
</div>

<!-- ========== LIGHTBOX GENERAL ========== -->
<div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-content" id="lightboxContent"></div>
    <div class="lightbox-caption" id="lightboxCaption"></div>
</div>
    <script src="../js/themes.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/pages/canciones.js"></script>
</body>
</html>
