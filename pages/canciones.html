<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>(function(){var t=localStorage.getItem('personalHub.theme');if(t){if(t==='auto'){t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}document.documentElement.setAttribute('data-theme',t)}})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hub">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dcsent4fs/image/upload/v1783958827/imagen_192x192_cqgclt.png">
    <title>Canciones</title>
    <meta name="description" content="Tus canciones favoritas con reproductor y letras completas">
    <meta name="theme-color" content="#0c0b0b">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Dancing+Script:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/canciones.css">
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="../assets/Gemini_Generated_Image_6wkfln6wk.png">
    <link rel="manifest" href="../manifest.json">
</head>

<body data-sidebar-root=".." data-sidebar-page="canciones" data-bottom-nav="canciones">

    <button class="sidebar-toggle" type="button" aria-label="Abrir navegación" data-sidebar-toggle>
        <i data-lucide="menu"></i>
    </button>
    <div class="sidebar-overlay" data-sidebar-overlay></div>
    <aside class="sidebar" data-sidebar></aside>

    <main class="page-shell">
        <div class="page">
            <section id="canciones" class="page-section">
                <button class="back-btn" onclick="window.location.href='../index.html'" style="margin-bottom:20px;">
                    <i data-lucide="arrow-left"></i> Volver al Hub
                </button>

                <div class="player-layout">
                    <!-- Reproductor -->
                    <div class="player-panel">
                        <div class="player-label">Reproduciendo ahora</div>
                        <div class="player-album">
                            <img id="currentCover" src="" alt="Portada del álbum">
                        </div>
                        <div class="player-title" id="currentTitle">Cargando…</div>
                        <div class="player-subtitle" id="currentSubtitle"></div>

                        <div class="player-controls">
                            <button class="player-btn" id="shuffleBtn" title="Modo aleatorio">
                                <i data-lucide="shuffle"></i>
                            </button>
                            <button class="player-btn" id="prevBtn" title="Anterior"><i data-lucide="skip-back"></i></button>
                            <button class="player-btn play" id="playBtn" title="Reproducir"><i data-lucide="play"></i></button>
                            <button class="player-btn" id="nextBtn" title="Siguiente"><i data-lucide="skip-forward"></i></button>
                            <button class="player-btn" id="randomBtn" title="Canción aleatoria">
                                <i data-lucide="dices"></i>
                            </button>
                        </div>

                        <div class="progress-bar">
                            <div class="progress-time">
                                <span id="currentTime">0:00</span>
                                <span id="totalTime">0:00</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                        </div>
                        <audio id="audioPlayer"></audio>
                    </div>

                    <!-- Columna derecha -->
                    <div class="canc-right-col">
                        <div class="canc-section">
                            <div class="canc-section-header">
                                <div class="canc-section-icon"><i data-lucide="file-text"></i></div>
                                <h3 class="canc-section-title">Letra</h3>
                                <button class="icon-btn" id="toggleLyricsBtn" title="Ocultar/Mostrar letra">
                                    <i data-lucide="eye"></i>
                                </button>
                                <button class="icon-btn" id="expandLyricsBtn" title="Ver letra en pantalla completa">
                                    <i data-lucide="maximize-2"></i>
                                </button>
                            </div>
                            <div class="lyrics-panel" id="lyricsPanel"></div>
                        </div>

                        <div class="canc-section">
                            <div class="sub-nav">
                                <button class="sub-tab active" data-tab="recuerdan">
                                    <i data-lucide="heart"></i> Canciones que me recuerdan a ti
                                </button>
                                <button class="sub-tab" data-tab="todas">
                                    <i data-lucide="music"></i> Todas las canciones completas
                                </button>
                            </div>
                            <div id="songsListContainer">
                                <div class="songs-grid" id="songsList"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="lyricsLightbox" class="lightbox lyrics-lightbox">
        <button class="lightbox-close" onclick="closeLyricsLightbox()">✕</button>
        <div class="lightbox-content lyrics-lightbox-content" id="lyricsLightboxContent">
            <div class="lyrics-expanded" id="expandedLyricsText"></div>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" id="lightboxCloseBtn" type="button">✕</button>
        <div class="lightbox-content" id="lightboxContent"></div>
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <!-- ===== BOTTOM NAV (móvil) ===== -->
    <nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="Navegación principal"></nav>

    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script defer src="../js/firebase-config.js"></script>
    <script defer src="../js/core/profile.js"></script>
    <script defer src="../js/core.js"></script>
    <script defer src="../js/core/authGuard.js"></script>
    <script defer src="../js/sidebar.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof renderBottomNav === 'function') setTimeout(renderBottomNav, 100);
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
    window.addEventListener('pageshow', function() {
        if (typeof renderBottomNav === 'function') setTimeout(renderBottomNav, 100);
    });
    </script>
    <script defer src="../js/data/canciones.js"></script>
    <script defer src="../js/pages/canciones.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js')
        .then(function(reg) { console.log('SW registered:', reg.scope); })
        .catch(function(err) { console.warn('SW error:', err); });
    }
    </script>

</body>
</html>
